<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Browser - Theo Armour Work</title>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #f6f8fa;
    }

    header {
      background: #24292f;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    header a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 14px;
    }

    header a:hover {
      text-decoration: underline;
    }

    .container {
      display: flex;
      height: calc(100vh - 48px);
    }

    /* Left Panel - Tree View */
    .tree-panel {
      width: 280px;
      min-width: 200px;
      max-width: 400px;
      background: #ffffff;
      border-right: 1px solid #d0d7de;
      overflow-y: auto;
      resize: horizontal;
    }

    .tree-header {
      padding: 8px 12px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      font-size: 14px;
      color: #24292f;
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tree-header span {
      font-weight: 600;
    }

    .tree-header button {
      padding: 2px 8px;
      font-size: 11px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #57606a;
    }

    .tree-header button:hover {
      background: #eaeef2;
    }

    .tree-search {
      padding: 6px 12px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      position: sticky;
      top: 34px;
    }

    .tree-search input {
      width: 100%;
      padding: 5px 8px;
      font-size: 13px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      outline: none;
    }

    .tree-search input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.2);
    }

    .tree-item.hidden {
      display: none;
    }

    .tree-children.filter-expanded {
      display: block;
    }

    .tree-content {
      padding: 8px 0;
    }

    .tree-item {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      cursor: pointer;
      color: #24292f;
      font-size: 14px;
      transition: background 0.1s;
      user-select: none;
    }

    .tree-item:hover {
      background: #f6f8fa;
    }

    .tree-item.selected {
      background: #ddf4ff;
    }

    .tree-item.folder {
      font-weight: 500;
    }

    .tree-item .icon {
      width: 20px;
      margin-right: 8px;
      text-align: center;
      flex-shrink: 0;
    }

    .tree-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-children {
      display: none;
    }

    .tree-children.expanded {
      display: block;
    }

    .tree-children .tree-item {
      padding-left: 32px;
    }

    .tree-children .tree-children .tree-item {
      padding-left: 48px;
    }

    .tree-children .tree-children .tree-children .tree-item {
      padding-left: 64px;
    }

    /* Right Panel - Content View */
    .content-panel {
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
    }

    .content-header {
      padding: 12px 20px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
    }

    .content-path {
      font-size: 14px;
      color: #57606a;
      font-family: monospace;
    }

    .content-path .breadcrumb {
      cursor: pointer;
      color: #0969da;
    }

    .content-path .breadcrumb:hover {
      text-decoration: underline;
    }

    .content-path .separator {
      color: #57606a;
      margin: 0 2px;
    }

    .content-actions {
      display: flex;
      gap: 8px;
    }

    .content-actions button {
      padding: 5px 12px;
      font-size: 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #f6f8fa;
      cursor: pointer;
      color: #24292f;
    }

    .content-actions button:hover {
      background: #eaeef2;
    }

    .content-body {
      padding: 24px;
    }


    .content-raw {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
    }

    .content-image {
      max-width: 100%;
      height: auto;
    }

    .content-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #57606a;
      font-size: 16px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #57606a;
    }

    .loading::after {
      content: "";
      width: 20px;
      height: 20px;
      border: 2px solid #d0d7de;
      border-top-color: #0969da;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      color: #cf222e;
      padding: 20px;
      background: #ffebe9;
      border-radius: 6px;
      margin: 20px;
    }

    /* Folder icons */
    .folder-icon::before {
      content: "📁";
    }

    .folder-icon.open::before {
      content: "📂";
    }

    .file-icon::before {
      content: "📄";
    }

    .md-icon::before {
      content: "📝";
    }

    .pdf-icon::before {
      content: "📕";
    }

    .xlsx-icon::before {
      content: "📊";
    }

    .json-icon::before {
      content: "📋";
    }

    .html-icon::before {
      content: "🌐";
    }

    .yml-icon::before {
      content: "⚙️";
    }

    .image-icon::before {
      content: "🖼️";
    }
  </style>
</head>

<body>
  <header>
    <h1 style="cursor:pointer;" onclick="window.location.href=window.location.pathname">📂 Theo Armour Work</h1>
    <a href="https://github.com/theo-armour/work" target="_blank">View on GitHub</a>
    <span style="flex:1"></span>
    <span id="tokenStatus" style="color:#3fb950;font-size:13px;"></span>
    <input id="tokenInput" type="password" placeholder="GitHub token (for private repos)"
      style="width:260px;padding:5px 10px;border:1px solid #444;border-radius:6px;background:#161b22;color:#c9d1d9;font-size:13px;">
    <button id="btnConnect"
      style="padding:5px 12px;border:1px solid #444;border-radius:6px;background:#238636;color:white;cursor:pointer;font-size:13px;">Connect</button>
    <button id="btnDisconnect"
      style="padding:5px 12px;border:1px solid #444;border-radius:6px;background:#da3633;color:white;cursor:pointer;font-size:13px;display:none;">Disconnect</button>
  </header>

  <div class="container">
    <div class="tree-panel">
      <div class="tree-header"><span>Files</span><button id="btnCollapseAll" title="Collapse all">⊟</button></div>
      <div class="tree-search"><input id="treeFilter" type="text" placeholder="Filter files..."></div>
      <div class="tree-content" id="tree"></div>
    </div>

    <div class="content-panel">
      <div class="content-header" id="contentHeader" style="display: none;">
        <span class="content-path" id="contentPath"></span>
        <div class="content-actions">
          <button id="btnCopyPath" title="Copy file path">📋 Copy</button>
          <button id="btnRaw">Raw</button>
          <button id="btnGitHub">GitHub</button>
        </div>
      </div>
      <div class="content-body" id="contentBody">
        <div class="content-placeholder">
          Select a file from the tree to view its contents
        </div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const CONFIG = {
      owner: "theo-armour",
      repo: "pages",
      branch: "main"
    };

    // State
    let currentFile = null;
    let showRaw = false;
    let treeData = null;
    let ghToken = localStorage.getItem( "gh-token" ) || "";

    // Token UI
    const tokenInput = document.getElementById( "tokenInput" );
    const btnConnect = document.getElementById( "btnConnect" );
    const btnDisconnect = document.getElementById( "btnDisconnect" );
    const tokenStatus = document.getElementById( "tokenStatus" );

    // Show/hide token UI based on whether a token is stored
    const updateTokenUI = () => {
      if ( ghToken ) {
        tokenInput.style.display = "none";
        btnConnect.style.display = "none";
        btnDisconnect.style.display = "";
        tokenStatus.textContent = "Connected";
      } else {
        tokenInput.style.display = "";
        btnConnect.style.display = "";
        btnDisconnect.style.display = "none";
        tokenStatus.textContent = "";
      }
    };
    updateTokenUI();

    btnConnect.addEventListener( "click", () => {
      const val = tokenInput.value.trim();
      if ( !val ) return;
      ghToken = val;
      localStorage.setItem( "gh-token", ghToken );
      tokenInput.value = "";
      updateTokenUI();
      // Clear cached tree so it re-fetches with the token
      const cacheKey = `tree-${ CONFIG.owner }-${ CONFIG.repo }-${ CONFIG.branch }`;
      sessionStorage.removeItem( cacheKey );
      initTree();
    } );

    btnDisconnect.addEventListener( "click", () => {
      ghToken = "";
      localStorage.removeItem( "gh-token" );
      updateTokenUI();
      const cacheKey = `tree-${ CONFIG.owner }-${ CONFIG.repo }-${ CONFIG.branch }`;
      sessionStorage.removeItem( cacheKey );
      initTree();
    } );

    // Lightweight markdown to HTML converter
    const mdToHtml = ( md ) => {
      const escaped = ( s ) => s.replace( /&/g, "&amp;" ).replace( /</g, "&lt;" ).replace( />/g, "&gt;" );

      // Fenced code blocks
      const blocks = [];
      md = md.replace( /```(\w*)\n([\s\S]*?)```/g, ( _, lang, code ) => {
        blocks.push( `<pre><code>${ escaped( code.trimEnd() ) }</code></pre>` );
        return `\x00BLOCK${ blocks.length - 1 }\x00`;
      } );

      const lines = md.split( "\n" );
      const out = [];
      let i = 0;

      while ( i < lines.length ) {
        const line = lines[ i ];

        // Block placeholder
        const blockMatch = line.match( /^\x00BLOCK(\d+)\x00$/ );
        if ( blockMatch ) { out.push( blocks[ +blockMatch[ 1 ] ] ); i++; continue; }

        // Blank line
        if ( line.trim() === "" ) { i++; continue; }

        // Headings
        const hMatch = line.match( /^(#{1,6})\s+(.+)/ );
        if ( hMatch ) { out.push( `<h${ hMatch[ 1 ].length }>${ inline( hMatch[ 2 ] ) }</h${ hMatch[ 1 ].length }>` ); i++; continue; }

        // Horizontal rule
        if ( /^(---|\*\*\*|___)\s*$/.test( line ) ) { out.push( "<hr>" ); i++; continue; }

        // Unordered list
        if ( /^[\-\*]\s/.test( line ) ) {
          const items = [];
          while ( i < lines.length && /^[\-\*]\s/.test( lines[ i ] ) ) {
            items.push( `<li>${ inline( lines[ i ].replace( /^[\-\*]\s+/, "" ) ) }</li>` );
            i++;
          }
          out.push( `<ul>${ items.join( "" ) }</ul>` ); continue;
        }

        // Ordered list
        if ( /^\d+\.\s/.test( line ) ) {
          const items = [];
          while ( i < lines.length && /^\d+\.\s/.test( lines[ i ] ) ) {
            items.push( `<li>${ inline( lines[ i ].replace( /^\d+\.\s+/, "" ) ) }</li>` );
            i++;
          }
          out.push( `<ol>${ items.join( "" ) }</ol>` ); continue;
        }

        // Paragraph (collect consecutive non-blank lines)
        const para = [];
        while ( i < lines.length && lines[ i ].trim() !== "" && !/^#{1,6}\s/.test( lines[ i ] ) && !/^[\-\*]\s/.test( lines[ i ] ) && !/^\d+\.\s/.test( lines[ i ] ) && !/^(---|\*\*\*|___)\s*$/.test( lines[ i ] ) && !/^\x00BLOCK/.test( lines[ i ] ) ) {
          para.push( lines[ i ] );
          i++;
        }
        out.push( `<p>${ inline( para.join( "\n" ) ) }</p>` );
      }

      return out.join( "\n" );
    };

    // Inline markdown: bold, italic, code, links, images
    const inline = ( text ) => {
      return text
        .replace( /&/g, "&amp;" ).replace( /</g, "&lt;" ).replace( />/g, "&gt;" )
        .replace( /`([^`]+)`/g, "<code>$1</code>" )
        .replace( /!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">' )
        .replace( /\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>' )
        .replace( /\*\*([^*]+)\*\*/g, "<strong>$1</strong>" )
        .replace( /__([^_]+)__/g, "<strong>$1</strong>" )
        .replace( /\*([^*]+)\*/g, "<em>$1</em>" )
        .replace( /_([^_]+)_/g, "<em>$1</em>" )
        .replace( /~~([^~]+)~~/g, "<del>$1</del>" );
    };

    // DOM Elements
    const treeEl = document.getElementById( "tree" );
    const contentHeader = document.getElementById( "contentHeader" );
    const contentPath = document.getElementById( "contentPath" );
    const contentBody = document.getElementById( "contentBody" );
    const btnRaw = document.getElementById( "btnRaw" );
    const btnGitHub = document.getElementById( "btnGitHub" );
    const btnCopyPath = document.getElementById( "btnCopyPath" );
    const btnCollapseAll = document.getElementById( "btnCollapseAll" );
    const treeFilter = document.getElementById( "treeFilter" );

    // Get file icon class
    function getIconClass ( name, isDir ) {
      if ( isDir ) return "folder-icon";
      const ext = name.split( "." ).pop().toLowerCase();
      const iconMap = {
        md: "md-icon",
        pdf: "pdf-icon",
        xlsx: "xlsx-icon",
        xls: "xlsx-icon",
        json: "json-icon",
        html: "html-icon",
        htm: "html-icon",
        yml: "yml-icon",
        yaml: "yml-icon",
        png: "image-icon",
        jpg: "image-icon",
        jpeg: "image-icon",
        gif: "image-icon",
        svg: "image-icon",
        webp: "image-icon"
      };
      return iconMap[ ext ] || "file-icon";
    }

    // Build tree from flat list
    function buildTree ( items ) {
      const tree = { children: {}, isDir: true };

      items.forEach( item => {
        const parts = item.path.split( "/" );
        let current = tree;

        parts.forEach( ( part, i ) => {
          if ( !current.children[ part ] ) {
            current.children[ part ] = {
              name: part,
              path: parts.slice( 0, i + 1 ).join( "/" ),
              isDir: i < parts.length - 1 || item.type === "tree",
              children: {}
            };
          }
          current = current.children[ part ];
        } );
      } );

      return tree;
    }

    // Sort tree items (folders first, then alphabetically)
    function sortTreeItems ( items ) {
      return Object.values( items ).sort( ( a, b ) => {
        if ( a.isDir && !b.isDir ) return -1;
        if ( !a.isDir && b.isDir ) return 1;
        return a.name.localeCompare( b.name );
      } );
    }

    // Render tree recursively
    function renderTree ( node, container, level = 0 ) {
      const items = sortTreeItems( node.children );

      items.forEach( item => {
        // Skip hidden files and common non-content files
        if ( item.name.startsWith( "." ) || item.name === "node_modules" ) return;

        const itemEl = document.createElement( "div" );
        itemEl.className = `tree-item ${ item.isDir ? "folder" : "file" }`;
        itemEl.dataset.path = item.path;
        itemEl.innerHTML = `
          <span class="icon ${ getIconClass( item.name, item.isDir ) }"></span>
          <span class="name">${ item.name }</span>
        `;

        // Create children container for folders (even if empty initially)
        let childrenEl = null;
        if ( item.isDir ) {
          childrenEl = document.createElement( "div" );
          childrenEl.className = "tree-children";
          if ( Object.keys( item.children ).length > 0 ) {
            renderTree( item, childrenEl, level + 1 );
          }
        }

        itemEl.addEventListener( "click", ( e ) => {
          e.stopPropagation();
          if ( item.isDir && childrenEl ) {
            toggleFolder( itemEl, childrenEl, item );
          } else if ( !item.isDir ) {
            selectFile( item, itemEl );
          }
        } );

        container.appendChild( itemEl );
        if ( childrenEl ) {
          container.appendChild( childrenEl );
        }
      } );
    }

    // Toggle folder open/close
    function toggleFolder ( itemEl, childrenEl, folderItem ) {
      const icon = itemEl.querySelector( ".icon" );
      const isOpen = childrenEl.classList.contains( "expanded" );

      if ( isOpen ) {
        childrenEl.classList.remove( "expanded" );
        icon.classList.remove( "open" );
      } else {
        childrenEl.classList.add( "expanded" );
        icon.classList.add( "open" );

        // Auto-display the folder's README.md if it exists
        if ( folderItem && folderItem.children[ "README.md" ] ) {
          const readme = folderItem.children[ "README.md" ];
          contentHeader.style.display = "flex";
          contentPath.innerHTML = buildBreadcrumbs( readme.path );
          currentFile = readme;
          showRaw = false;
          btnRaw.textContent = "Raw";
          loadFileContent( readme );
        }
      }
    }

    // Select file and load content
    async function selectFile ( item, itemEl ) {
      // Update selection UI
      document.querySelectorAll( ".tree-item.selected" ).forEach( el => {
        el.classList.remove( "selected" );
      } );
      itemEl.classList.add( "selected" );

      currentFile = item;
      showRaw = false;
      btnRaw.textContent = "Raw";

      // Update header with clickable breadcrumbs
      contentHeader.style.display = "flex";
      contentPath.innerHTML = buildBreadcrumbs( item.path );

      // Update URL hash
      location.hash = encodeURIComponent( item.path );

      // Load content
      await loadFileContent( item );
    }

    // Load file content
    async function loadFileContent ( item ) {
      contentBody.innerHTML = '<div class="loading">Loading</div>';

      try {
        const ext = item.name.split( "." ).pop().toLowerCase();
        // Use relative path for local/GitHub Pages, no API needed
        const fileUrl = "./" + item.path;

        // Handle different file types
        if ( [ "png", "jpg", "jpeg", "gif", "svg", "webp" ].includes( ext ) ) {
          contentBody.innerHTML = `<img class="content-image" src="${ fileUrl }" alt="${ item.name }">`;
        } else if ( [ "pdf" ].includes( ext ) ) {
          contentBody.innerHTML = `
            <p>PDF file: <strong>${ item.name }</strong></p>
            <p><a href="${ fileUrl }" target="_blank">Open PDF in new tab</a></p>
            <iframe src="${ fileUrl }" style="width:100%;height:600px;border:1px solid #d0d7de;border-radius:6px;"></iframe>
          `;
        } else if ( [ "xlsx", "xls" ].includes( ext ) ) {
          contentBody.innerHTML = `
            <p>Excel file: <strong>${ item.name }</strong></p>
            <p><a href="${ fileUrl }" target="_blank">Download ${ item.name }</a></p>
          `;
        } else {
          // Fetch text content
          const response = await fetch( fileUrl );
          if ( !response.ok ) throw new Error( `HTTP ${ response.status }` );
          const text = await response.text();

          if ( ext === "md" && !showRaw ) {
            const html = mdToHtml( text );
            contentBody.innerHTML = `<div class="markdown-body">${ html }</div>`;
          } else {
            contentBody.innerHTML = `<pre class="content-raw">${ escapeHtml( text ) }</pre>`;
          }
        }
      } catch ( error ) {
        contentBody.innerHTML = `<div class="error">Error loading file: ${ error.message }</div>`;
      }
    }

    // Escape HTML
    function escapeHtml ( text ) {
      const div = document.createElement( "div" );
      div.textContent = text;
      return div.innerHTML;
    }

    // Toggle raw/rendered view
    btnRaw.addEventListener( "click", async () => {
      if ( !currentFile ) return;
      showRaw = !showRaw;
      btnRaw.textContent = showRaw ? "Rendered" : "Raw";
      await loadFileContent( currentFile );
    } );

    // Copy file path to clipboard
    btnCopyPath.addEventListener( "click", () => {
      if ( !currentFile ) return;
      navigator.clipboard.writeText( currentFile.path );
      btnCopyPath.textContent = "✓ Copied";
      setTimeout( () => btnCopyPath.textContent = "📋 Copy", 1500 );
    } );

    // Collapse all folders
    btnCollapseAll.addEventListener( "click", () => {
      treeEl.querySelectorAll( ".tree-children.expanded" ).forEach( el => {
        el.classList.remove( "expanded" );
        el.previousElementSibling?.querySelector( ".icon" )?.classList.remove( "open" );
      } );
    } );

    // Filter tree items by name
    treeFilter.addEventListener( "input", () => {
      const query = treeFilter.value.toLowerCase().trim();
      const allItems = treeEl.querySelectorAll( ".tree-item" );
      const allChildren = treeEl.querySelectorAll( ".tree-children" );

      if ( !query ) {
        // Reset: show all items, remove filter-expanded
        allItems.forEach( el => el.classList.remove( "hidden" ) );
        allChildren.forEach( el => el.classList.remove( "filter-expanded" ) );
        return;
      }

      // Hide all, then show matches and their parents
      allItems.forEach( el => el.classList.add( "hidden" ) );
      allChildren.forEach( el => el.classList.remove( "filter-expanded" ) );

      allItems.forEach( el => {
        const path = ( el.dataset.path || "" ).toLowerCase();
        const name = ( el.querySelector( ".name" )?.textContent || "" ).toLowerCase();
        if ( name.includes( query ) || path.includes( query ) ) {
          el.classList.remove( "hidden" );
          // Expand and show parent folders
          let parent = el.parentElement;
          while ( parent && parent !== treeEl ) {
            if ( parent.classList.contains( "tree-children" ) ) {
              parent.classList.add( "filter-expanded" );
              parent.previousElementSibling?.classList.remove( "hidden" );
            }
            parent = parent.parentElement;
          }
        }
      } );
    } );

    // Build clickable breadcrumb path
    const buildBreadcrumbs = ( path ) => {
      const parts = path.split( "/" );
      return parts.map( ( part, i ) => {
        const safe = ( s ) => s.replace( /&/g, "&amp;" ).replace( /</g, "&lt;" ).replace( />/g, "&gt;" ).replace( /"/g, "&quot;" );
        if ( i === parts.length - 1 ) return `<span>${ safe( part ) }</span>`;
        const folderPath = parts.slice( 0, i + 1 ).join( "/" );
        return `<span class="breadcrumb" data-folder="${ safe( folderPath ) }">${ safe( part ) }</span>`;
      } ).join( '<span class="separator">/</span>' );
    };

    // Breadcrumb click delegation
    contentPath.addEventListener( "click", ( e ) => {
      const crumb = e.target.closest( ".breadcrumb" );
      if ( crumb?.dataset.folder ) window.openFolder( crumb.dataset.folder );
    } );

    // Open a folder by path (for breadcrumb clicks)
    window.openFolder = ( path ) => {
      const parts = path.split( "/" );
      let current = treeData;
      for ( const part of parts ) {
        if ( current.children?.[ part ] ) current = current.children[ part ];
        else return;
      }
      if ( !current.isDir ) return;
      // Find and expand the folder in the DOM
      const folderEl = treeEl.querySelector( `[data-path="${ path }"]` );
      if ( folderEl ) {
        const childrenEl = folderEl.nextElementSibling;
        if ( childrenEl?.classList.contains( "tree-children" ) && !childrenEl.classList.contains( "expanded" ) ) {
          toggleFolder( folderEl, childrenEl, current );
        }
      }
    };

    // Keyboard navigation
    const highlightItem = ( el ) => {
      document.querySelectorAll( ".tree-item.selected" ).forEach( s => s.classList.remove( "selected" ) );
      el.classList.add( "selected" );
      el.scrollIntoView( { block: "nearest" } );
    };

    document.addEventListener( "keydown", ( e ) => {
      // Only handle when not typing in an input
      if ( e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" ) return;

      const visible = [ ...treeEl.querySelectorAll( ".tree-item:not(.hidden)" ) ]
        .filter( el => {
          // Only items whose parent tree-children are expanded (or top level)
          let parent = el.parentElement;
          while ( parent && parent !== treeEl ) {
            if ( parent.classList.contains( "tree-children" ) && !parent.classList.contains( "expanded" ) && !parent.classList.contains( "filter-expanded" ) ) return false;
            parent = parent.parentElement;
          }
          return true;
        } );

      if ( !visible.length ) return;

      const currentIdx = visible.findIndex( el => el.classList.contains( "selected" ) );

      if ( e.key === "ArrowDown" ) {
        e.preventDefault();
        const next = visible[ currentIdx + 1 ] || visible[ 0 ];
        highlightItem( next );
      } else if ( e.key === "ArrowUp" ) {
        e.preventDefault();
        const prev = visible[ currentIdx - 1 ] || visible[ visible.length - 1 ];
        highlightItem( prev );
      } else if ( e.key === "Enter" || e.key === " " ) {
        e.preventDefault();
        if ( currentIdx >= 0 ) visible[ currentIdx ].click();
      } else if ( e.key === "ArrowRight" ) {
        // Expand a folder
        if ( currentIdx >= 0 ) {
          const el = visible[ currentIdx ];
          const childrenEl = el.nextElementSibling;
          if ( childrenEl?.classList.contains( "tree-children" ) && !childrenEl.classList.contains( "expanded" ) ) {
            e.preventDefault();
            el.click();
          }
        }
      } else if ( e.key === "ArrowLeft" ) {
        // Collapse a folder
        if ( currentIdx >= 0 ) {
          const el = visible[ currentIdx ];
          const childrenEl = el.nextElementSibling;
          if ( childrenEl?.classList.contains( "tree-children" ) && childrenEl.classList.contains( "expanded" ) ) {
            e.preventDefault();
            el.click();
          }
        }
      }
    } );

    // Open in GitHub
    btnGitHub.addEventListener( "click", () => {
      if ( !currentFile ) return;
      const url = `https://github.com/${ CONFIG.owner }/${ CONFIG.repo }/blob/${ CONFIG.branch }/${ currentFile.path }`;
      window.open( url, "_blank" );
    } );

    // Fetch tree from GitHub API with sessionStorage caching
    async function fetchTree () {
      const cacheKey = `tree-${ CONFIG.owner }-${ CONFIG.repo }-${ CONFIG.branch }`;
      const cached = sessionStorage.getItem( cacheKey );

      if ( cached ) {
        return JSON.parse( cached );
      }

      const url = `https://api.github.com/repos/${ CONFIG.owner }/${ CONFIG.repo }/git/trees/${ CONFIG.branch }?recursive=1`;
      const headers = {};
      if ( ghToken ) headers.Authorization = `token ${ ghToken }`;
      const response = await fetch( url, { headers } );

      if ( !response.ok ) {
        const hint = response.status === 404
          ? " (repo may be private — enter a token above)"
          : "";
        throw new Error( `GitHub API error: HTTP ${ response.status }${ hint }` );
      }

      const data = await response.json();
      sessionStorage.setItem( cacheKey, JSON.stringify( data.tree ) );
      return data.tree;
    }

    // Initialize tree from GitHub API
    async function initTree () {
      treeEl.innerHTML = '<div class="loading">Loading</div>';

      try {
        const items = await fetchTree();
        treeData = buildTree( items );
        treeEl.innerHTML = "";
        renderTree( treeData, treeEl );

        // Check for hash and load that file, or show root README.md
        if ( location.hash ) {
          const path = decodeURIComponent( location.hash.slice( 1 ) );
          selectFileByPath( path );
        } else if ( treeData.children[ "README.md" ] ) {
          const readme = treeData.children[ "README.md" ];
          contentHeader.style.display = "flex";
          contentPath.innerHTML = buildBreadcrumbs( readme.path );
          currentFile = readme;
          showRaw = false;
          btnRaw.textContent = "Raw";
          loadFileContent( readme );
        }
      } catch ( error ) {
        treeEl.innerHTML = `<div class="error">
          ${ error.message }
          <br><br>
          <button onclick="initTree()" style="padding:5px 12px;border:1px solid #d0d7de;border-radius:6px;background:#f6f8fa;cursor:pointer;">Retry</button>
        </div>`;
      }
    }

    // Select file by path (for hash navigation)
    function selectFileByPath ( path ) {
      const parts = path.split( "/" );
      let current = treeData;

      for ( const part of parts ) {
        if ( current.children && current.children[ part ] ) {
          current = current.children[ part ];
        } else {
          return; // Path not found
        }
      }

      if ( !current.isDir ) {
        // Find and click the tree item
        const items = document.querySelectorAll( ".tree-item" );
        for ( const item of items ) {
          if ( item.dataset.path === current.path ) {
            // Expand parent folders
            let parent = item.parentElement;
            while ( parent && parent !== treeEl ) {
              if ( parent.classList.contains( "tree-children" ) ) {
                parent.classList.add( "expanded" );
                parent.previousElementSibling?.querySelector( ".icon" )?.classList.add( "open" );
              }
              parent = parent.parentElement;
            }
            item.click();
            break;
          }
        }
      }
    }

    // Handle hash changes
    window.addEventListener( "hashchange", () => {
      if ( location.hash ) {
        const path = decodeURIComponent( location.hash.slice( 1 ) );
        selectFileByPath( path );
      }
    } );

    // Initialize
    initTree();
  </script>
</body>
