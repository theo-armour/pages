  <style>
    /* ── Custom Properties ── */
    :root {
      --primary-bg: #f3f4f6;
      --secondary-bg: #ffffff;
      --text-color: #1f2937;
      --border-color: #d1d5db;
      --highlight-color: #2563eb;
      --hover-bg: #e5e7eb;
      --font-family: system-ui, -apple-system, sans-serif;
      --sidebar-width: 300px;
      --font-size: 16px;
      --resizer-bg: rgba(37, 99, 235, 0.7);
      --warning-bg: #fff3cd;
      --warning-border: #ffc107;
      --error-bg: #fff0f0;
      --error-border: #dc3545;
      --iframe-bg: #ffffff;
    }

    /* ── Dark Mode Overrides ── */
    body.dark-mode {
      --primary-bg: #1f2937;
      --secondary-bg: #111827;
      --text-color: #f3f4f6;
      --border-color: #374151;
      --highlight-color: #3b82f6;
      --hover-bg: #374151;
      --warning-bg: #3a3000;
      --warning-border: #665200;
      --error-bg: #2d0000;
      --error-border: #ff6b6b;
    }

    /* ── Font size on html so rem units scale ── */
    html {
      font-size: var(--font-size);
    }

    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    /* ── Body ── */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      overflow-x: hidden;
      font-family: var(--font-family);
      color: var(--text-color);
      background-color: var(--primary-bg);
    }

    /* ── Header ── */
    header {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--primary-bg);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      z-index: 10;
    }

    #headerGitHub {
      display: flex;
      align-items: center;
      color: var(--text-color);
      text-decoration: none;
    }

    #headerTitle {
      font-weight: bold;
      font-size: 1.1rem;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    /* ── Shared button hover/active ── */
    .header-btn,
    button.primary,
    button.secondary,
    .file-btn {
      transition: opacity 0.2s, transform 0.1s;
    }

    .header-btn:hover,
    button.primary:hover,
    button.secondary:hover,
    .file-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .header-btn:active,
    button.primary:active,
    button.secondary:active,
    .file-btn:active {
      transform: translateY(0);
    }

    /* ── Header Utility Buttons ── */
    .header-btn {
      background: var(--secondary-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .dark-mode-btn {
      margin-left: auto;
    }

    /* ── Rate limit badge ── */
    .rate-limit-badge {
      display: none;
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: var(--hover-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    .rate-limit-badge.low {
      background: var(--warning-bg);
      border-color: var(--warning-border);
    }

    .rate-limit-badge.critical {
      background: var(--error-bg);
      border-color: var(--error-border);
    }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: row;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--primary-bg);
      padding: 0;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.5rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--primary-bg);
    }

    .panel-header h3 {
      margin: 0;
      font-size: 0.95rem;
    }

      position: relative;
      margin: 0.4rem 0.5rem 0 0.5rem;
    }

    #treeFilter {
      margin: 0;
      width: 100%;
      box-sizing: border-box;
      padding: 0.3rem 1.6rem 0.3rem 0.5rem;
      font-size: 0.85rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--secondary-bg);
      color: var(--text-color);
      outline: none;
    }

    #treeFilter:focus {
      border-color: var(--highlight-color);
    }

    #btnFilterClear {
      position: absolute;
      right: 0.3rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-color);
      opacity: 0.5;
      font-size: 0.9rem;
      display: none;
      padding: 0;
    }

    #btnFilterClear:hover {
      opacity: 1;
    }

    /* ── Tree list ── */
    #treeList {
      padding: 0 0.5rem;
      flex: 1;
      overflow-y: auto;
    }

    /* ── Resizer ── */
    .resizer {
      width: 8px;
      background: var(--resizer-bg);
      cursor: col-resize;
      touch-action: none;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--highlight-color);
    }

    /* ── Content Area ── */
    .content-area {
      flex: 1;
      min-width: 0;
      padding: 0;
      overflow-y: auto;
      background: var(--secondary-bg);
      position: relative;
    }

    #contentBody {
      padding: 0 1rem 1rem 1rem;
      background: var(--secondary-bg);
    }

    /* ── Action Buttons (primary / secondary) ── */
    button.primary,

      background: var(--highlight-color);
      color: #ffffff;
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    /* ── Back to Top ── */
    .back-to-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 20;
      background-color: var(--highlight-color);
      color: #ffffff;
      border: none;
      border-radius: 50%;
      width: 2.5rem;
      height: 2.5rem;
      font-size: 1.2rem;
      display: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      align-items: center;
      justify-content: center;

    /* ── Inline repo form ── */
    .repo-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 300px;
      padding: 1rem;
    }

    .repo-form label {
      font-size: 0.9rem;
      font-weight: bold;
    }

    .repo-form input {
      padding: 0.4rem 0.5rem;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--secondary-bg);
      color: var(--text-color);
      outline: none;
    }

    .repo-form input:focus {
      border-color: var(--highlight-color);
    }

    /* ── Treeview ── */
    .tree-folder {
      display: flex;
      align-items: center;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      user-select: none;
      list-style: none;
    }

    .tree-folder::-webkit-details-marker {
      display: none;
    }

    .tree-folder:hover {
      background: var(--hover-bg);
    }

    .tree-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.2rem 0.4rem;
      cursor: pointer;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    details .tree-item {
      padding-left: 1.2rem;
    }

    .tree-item:hover {
      background: var(--hover-bg);
    }

    .tree-item.active {
      background: var(--highlight-color);
      color: #fff;
    }

    .tree-item-size {
      font-size: 0.8rem;
      opacity: 0.65;
      margin-left: 0.75rem;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    details details {
      padding-left: 0.8rem;
    }

    details {
      padding-left: 0;
    }

    /* ── Content Viewer ── */
    .markdown-body {
      max-width: 700px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
    }

    pre {
      max-width: 700px;
      overflow-x: auto;
      padding: 1rem;
      border-radius: 6px;
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    body.dark-mode .markdown-body {
      color: var(--text-color);
    }

    body.dark-mode pre {
      background-color: var(--secondary-bg);
    }

    /* ── Content area sticky header ── */
    .file-header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--secondary-bg);
    }

    .file-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
      flex-wrap: wrap;
    }

    .file-title a.breadcrumb-link {
      color: var(--highlight-color);
      cursor: pointer;
      text-decoration: none;
    }

    .file-title a.breadcrumb-link:hover {
      text-decoration: underline;
    }

    .file-actions {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-shrink: 0;
    }

    .file-btn {
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background: var(--secondary-bg);
      color: var(--text-color);
    }

    .file-btn[aria-pressed="false"] {
      opacity: 0.5;
    }

    .file-btn[aria-pressed="true"] {
      opacity: 1;
    }


    .media-content {
      max-width: 100%;
      border-radius: 4px;
    }

    .iframe-content {
      width: 100%;
      height: 70vh;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--iframe-bg);
    }

    .xlsx-sheet table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1rem;
    }

    .xlsx-sheet td,
    .xlsx-sheet th {
      border: 1px solid var(--border-color);
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
    }

    .xlsx-sheet th {
      background: var(--primary-bg);
      font-weight: bold;
    }

    .md-error {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      padding: 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }

    .error-panel {
      background: var(--error-bg);
      border: 2px solid var(--error-border);
      color: var(--text-color);
      padding: 1rem;
      border-radius: 6px;
      margin: 1rem;
      font-size: 0.9rem;
    }

    .error-panel button {
      margin-top: 0.5rem;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--secondary-bg);
      cursor: pointer;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .resizer {
        width: 4px;
      }

      .file-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        transition: none !important;
        animation: none !important;
      }
    }

    /* ── Hidden-by-filter helper ── */
    .is-hidden {
      display: none !important;
    }

    /* Accessibility helpers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .skip-link {
      position: absolute;
      left: 0.5rem;
      top: -40px;
      z-index: 1000;
      padding: 0.4rem 0.8rem;
      background: var(--highlight-color);
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }

    .skip-link:focus {
      top: 0.5rem;
    }
  </style>
</head>

  <script>
    'use strict';

    /* ── 1. Utility ── */
    const escapeHTML = ( str ) => {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return String( str ).replace( /[&<>"']/g, ( c ) => map[ c ] );
    };

    const encodePath = ( path ) =>
      path.split( '/' ).map( encodeURIComponent ).join( '/' );

    // Resolve a Markdown link target against the current file's directory.
    const resolveRepoPath = ( targetPath, currentDir = '' ) => {
      const isRootRelative = targetPath.startsWith( '/' );
      const resolved = isRootRelative
        ? targetPath.slice( 1 )
        : ( currentDir ? currentDir + '/' + targetPath : targetPath );
      return resolved.split( '/' ).reduce( ( acc, part ) => {
        if ( part === '..' ) acc.pop();
        else if ( part !== '.' && part !== '' ) acc.push( part );
        return acc;
      }, [] ).join( '/' );
    };

    const rawUrl = ( path ) =>
      `https://raw.githubusercontent.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/${ encodeURIComponent( state.branch ) }/${ encodePath( path ) }`;

    const contentsApiUrl = ( path ) =>
      `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/contents/${ encodePath( path ) }?ref=${ encodeURIComponent( state.branch ) }`;

    const GITHUB_SVG_ICON = '<svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>';

    /* ══════════════════════════════════════════════════════════════════
       ── FORK CUSTOMIZATION ZONE ──
       Most forks only need to touch the things in this block:

         1. CONFIG.owner / .repo / .branch  (below) — pre-load a specific
            repo. Empty values fall through to URL params, GitHub Pages
            URL, .git/config (file:// only), and the manual repo form.
         2. CONFIG.storagePrefix             (below) — localStorage
            namespace. Change this if your fork should keep its own
            state separate from TooToo's.
         3. CONFIG.appName                   (below) — drives <title>,
            the header label, and the About heading.
         4. CONFIG.sourceRepoUrl             (below) — top-header GitHub
            icon target and About page "Source code" link. Point this
            at your fork so the header always links back to your repo.
         5. <link rel="icon" ...>            in <head>     — SVG favicon

       CONFIG_DEFAULTS just snapshots the starter values so detectRepo
       can fall back to them after auto-detection fails.
       ══════════════════════════════════════════════════════════════════ */
    /* ── 2. CONFIG & state ── */
    const CONFIG = {
      owner: '',                // e.g. 'octocat'
      repo: '',                 // e.g. 'hello-world'
      branch: '',               // e.g. 'main' (empty = use the default branch)
      storagePrefix: 'tootoo',  // localStorage namespace; change for forks
      appName: 'TooToo',        // <title>, header label, About heading
      sourceRepoUrl: 'https://github.com/pushme-pullyou/tootoo', // top-header GitHub icon target; About page "Source code" link
    };

    const CONFIG_DEFAULTS = {
      owner: CONFIG.owner,
      repo: CONFIG.repo,
      branch: CONFIG.branch,
    };

    const state = {
      owner: '',
      repo: '',
      branch: '',
      tree: null,
      currentFilePath: '',
      pagesEnabled: null,
      localBase: null,   // prefix from app to repo root (e.g. '../' or ''); null = unknown
      localMode: false,  // true when a probe confirmed local file reads work
    };

    /* ── 3. Extension constants ── */
    const IMAGE_EXTS = [ 'png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico' ];
    const AUDIO_EXTS = [ 'mp3', 'wav', 'ogg' ];
    const VIDEO_EXTS = [ 'mp4', 'webm' ];
    const SHEET_EXTS = [ 'xlsx', 'xls', 'csv', 'ods' ];
    const STREAMABLE_EXTS = [ ...IMAGE_EXTS, ...AUDIO_EXTS, ...VIDEO_EXTS, 'pdf' ];
    const NO_COPY_EXTS = [ ...STREAMABLE_EXTS, ...SHEET_EXTS ];
    const LARGE_FILE_WARNING_BYTES = 1024 * 1024;
    const approvedLargeFiles = new Set();
    const RATE_LIMIT_MESSAGE = 'Rate limited. Add a GitHub token for higher limits.';

    /* ── 4. Storage key helper ── */
    const storageKey = ( suffix ) => `${ CONFIG.storagePrefix }:${ location.pathname }:${ suffix }`;

    // One-time migration: rename legacy `tootoo-lt:*` keys to the current prefix.
    // Safe to keep indefinitely — no-op once the user's localStorage is migrated.
    const migrateStorageKeys = () => {
      try {
        const oldPrefix = 'tootoo-lt:';
        const newPrefix = `${ CONFIG.storagePrefix }:`;
        if ( oldPrefix === newPrefix ) return;
        const oldKeys = [];
        for ( let i = 0; i < localStorage.length; i++ ) {
          const k = localStorage.key( i );
          if ( k && k.startsWith( oldPrefix ) ) oldKeys.push( k );
        }
        for ( const oldKey of oldKeys ) {
          const newKey = newPrefix + oldKey.slice( oldPrefix.length );
          if ( localStorage.getItem( newKey ) === null ) {
            const value = localStorage.getItem( oldKey );
            if ( value !== null ) localStorage.setItem( newKey, value );
          }
          localStorage.removeItem( oldKey );
        }
      } catch ( _ ) { /* storage disabled or quota exceeded */ }
    };

    const getCurrentFileKey = () => {
      const owner = state.owner || CONFIG.owner || '';
      const repo = state.repo || CONFIG.repo || '';
      const branch = state.branch || CONFIG.branch || '';
      return storageKey( `currentFile:${ owner }/${ repo }/${ branch }` );
    };

    const clearCurrentFilePreference = () => {
      try {
        localStorage.removeItem( getCurrentFileKey() );
        localStorage.removeItem( storageKey( 'currentFile' ) );
      } catch ( _ ) { /* storage disabled */ }
    };

    /* ── 5. Blob URL tracking ── */
    const activeBlobUrls = new Set();

    const createBlobUrl = ( blob ) => {
      const url = URL.createObjectURL( blob );
      activeBlobUrls.add( url );
      return url;
    };

    const revokeAllBlobUrls = () => {
      activeBlobUrls.forEach( ( url ) => URL.revokeObjectURL( url ) );
      activeBlobUrls.clear();
    };

    /* ── 6. File text cache ── */
    const fileTextCache = new Map();
    const FILE_CACHE_LIMIT = 25;
    const FILE_CACHE_MAX_CHARS = 300000;

    const getFileCacheKey = ( path ) => `${ state.owner }/${ state.repo }/${ state.branch }/${ path }`;

    const getCachedFileText = ( path ) => {
      const key = getFileCacheKey( path );
      if ( !fileTextCache.has( key ) ) return null;
      const text = fileTextCache.get( key );
      // LRU refresh: move to end
      fileTextCache.delete( key );
      fileTextCache.set( key, text );
      return text;
    };

    const setCachedFileText = ( path, text ) => {
      if ( text.length > FILE_CACHE_MAX_CHARS ) return;
      const key = getFileCacheKey( path );
      if ( fileTextCache.has( key ) ) fileTextCache.delete( key );
      while ( fileTextCache.size >= FILE_CACHE_LIMIT ) {
        const oldest = fileTextCache.keys().next().value;
        fileTextCache.delete( oldest );
      }
      fileTextCache.set( key, text );
      persistFileCache();
    };

    const persistFileCacheNow = () => {
      const key = storageKey( 'fileTextCache' );
      const entries = Array.from( fileTextCache.entries() );
      // On quota failure, drop oldest entries and retry until it fits or empties.
      while ( entries.length ) {
        try {
          localStorage.setItem( key, JSON.stringify( entries ) );
          return;
        } catch ( _ ) {
          entries.shift();
        }
      }
      try { localStorage.removeItem( key ); } catch ( _ ) { /* disabled */ }
    };

    let persistFileCacheTimer = null;
    const persistFileCache = () => {
      if ( persistFileCacheTimer ) clearTimeout( persistFileCacheTimer );
      persistFileCacheTimer = setTimeout( () => {
        persistFileCacheTimer = null;
        persistFileCacheNow();
      }, 1000 );
    };

    window.addEventListener( 'beforeunload', () => {
      if ( persistFileCacheTimer ) {
        clearTimeout( persistFileCacheTimer );
        persistFileCacheTimer = null;
        persistFileCacheNow();
      }
      activeBlobUrls.forEach( ( url ) => URL.revokeObjectURL( url ) );
    } );

    const restoreFileCache = () => {
      try {
        const raw = localStorage.getItem( storageKey( 'fileTextCache' ) );
        if ( !raw ) return;
        const arr = JSON.parse( raw );
        for ( const [ key, text ] of arr ) {
          fileTextCache.set( key, text );
        }
      } catch ( _ ) { /* malformed — ignore */ }
    };

    const clearFileCache = () => {
      fileTextCache.clear();
      try { localStorage.removeItem( storageKey( 'fileTextCache' ) ); } catch ( _ ) { /* quota or disabled */ }
    };

    /* ── 7. View preference helpers ── */
    const getViewPrefKey = ( ext ) => storageKey( `viewPref:${ ext }` );
    const getPreferredView = ( ext ) => localStorage.getItem( getViewPrefKey( ext ) ) || 'rendered';
    const setPreferredView = ( ext, view ) => localStorage.setItem( getViewPrefKey( ext ), view );

    /* ── 8. updateHeaderFromConfig ──
       The top header identifies *where this app instance lives* — the
       owner/repo serving the HTML. On GitHub Pages that's parsed from
       the URL; on file:// we read .git/config from the surrounding
       repo; otherwise we fall back to CONFIG.sourceRepoUrl. The header
       does not follow the currently browsed repo (the lower-panel
       breadcrumbs do that). */
    const APP_ORIGIN = { owner: '', repo: '', url: '.' };

    const detectAppOrigin = async () => {
      // GitHub Pages: subdomain = owner, first path segment = repo
      if ( location.hostname.endsWith( '.github.io' ) ) {
        const owner = location.hostname.split( '.' )[ 0 ];
        const segments = location.pathname.split( '/' ).filter( Boolean );
        const repo = segments[ 0 ] || `${ owner }.github.io`;
        APP_ORIGIN.owner = owner;
        APP_ORIGIN.repo = repo;
        APP_ORIGIN.url = `https://github.com/${ owner }/${ repo }`;
        return;
      }

      // file://: walk up looking for .git/config
      if ( location.protocol === 'file:' ) {
        const prefixes = [ '', '../', '../../', '../../../', '../../../../' ];
        const gitRegex = /github\.com[:/]([^/\n]+)\/([^\s\n]+?)(?:\.git)?\s*$/m;
        for ( const prefix of prefixes ) {
          let text = null;
          try {
            const res = await fetch( `${ prefix }.git/config` );
            if ( res.ok ) text = await res.text();
          } catch ( _ ) { /* fetch blocked on file:// in some browsers */ }
          if ( text === null ) {
            try {
              const xhr = new XMLHttpRequest();
              xhr.open( 'GET', `${ prefix }.git/config`, false );
              xhr.send( null );
              if ( ( xhr.status === 200 || xhr.status === 0 ) && xhr.responseText ) {
                text = xhr.responseText;
              }
            } catch ( _ ) { /* XHR also blocked */ }
          }
          if ( !text ) continue;
          const m = text.match( gitRegex );
          if ( m ) {
            APP_ORIGIN.owner = m[ 1 ];
            APP_ORIGIN.repo = m[ 2 ];
            APP_ORIGIN.url = `https://github.com/${ m[ 1 ] }/${ m[ 2 ] }`;
            return;
          }
        }
      }

      // Fallback: CONFIG.sourceRepoUrl
      const m = ( CONFIG.sourceRepoUrl || '' ).match( /github\.com\/([^/]+)\/([^/?#]+)/ );
      if ( m ) {
        APP_ORIGIN.owner = m[ 1 ];
        APP_ORIGIN.repo = m[ 2 ];
        APP_ORIGIN.url = CONFIG.sourceRepoUrl;
      }
    };

    const updateHeaderFromConfig = () => {
      const label = APP_ORIGIN.owner && APP_ORIGIN.repo
        ? `${ APP_ORIGIN.owner } / ${ APP_ORIGIN.repo }`
        : CONFIG.appName;
      document.title = label;
      document.getElementById( 'headerTitle' ).textContent = label;
      document.getElementById( 'headerGitHub' ).href = APP_ORIGIN.url;
    };

    /* ── 9. detectRepo ── */
    const detectRepo = async () => {
      const params = new URLSearchParams( location.search );
      if ( params.get( 'owner' ) ) CONFIG.owner = params.get( 'owner' );
      if ( params.get( 'repo' ) ) CONFIG.repo = params.get( 'repo' );
      if ( params.get( 'branch' ) ) CONFIG.branch = params.get( 'branch' );

      if ( params.get( 'owner' ) && params.get( 'repo' ) ) return;

      const cached = localStorage.getItem( storageKey( 'repo' ) );
      if ( cached ) {
        try {
          const parsed = JSON.parse( cached );
          if ( parsed.owner && parsed.repo ) {
            CONFIG.owner = parsed.owner;
            CONFIG.repo = parsed.repo;
            if ( parsed.branch ) CONFIG.branch = parsed.branch;
            return;
          }
        } catch ( _ ) { /* ignore malformed cache */ }
      }

      if ( location.hostname.endsWith( '.github.io' ) ) {
        const owner = location.hostname.split( '.' )[ 0 ];
        const segments = location.pathname.split( '/' ).filter( Boolean );
        const repo = segments[ 0 ] || `${ owner }.github.io`;
        CONFIG.owner = owner;
        CONFIG.repo = repo;
        localStorage.setItem( storageKey( 'repo' ), JSON.stringify( { owner, repo } ) );
        return;
      }

      const gitConfigPrefixes = [ '', '../', '../../', '../../../', '../../../../' ];
      const gitConfigRegex = /github\.com[:/]([^/\n]+)\/([^\s\n]+?)(?:\.git)?\s*$/m;

      // .git/config probing is only useful from file:// (drop-in mode).
      // Real servers typically deny dotfile access and the failed requests
      // surface as console errors, so skip them on http/https.
      if ( location.protocol === 'file:' ) {
        for ( const prefix of gitConfigPrefixes ) {
          let text = null;
          try {
            const res = await fetch( `${ prefix }.git/config` );
            if ( res.ok ) text = await res.text();
          } catch ( _ ) { /* fetch blocked on file:// in Chromium — fall through to sync XHR */ }

          if ( text === null ) {
            try {
              const xhr = new XMLHttpRequest();
              xhr.open( 'GET', `${ prefix }.git/config`, false );
              xhr.send( null );
              if ( ( xhr.status === 200 || xhr.status === 0 ) && xhr.responseText ) {
                text = xhr.responseText;
              }
            } catch ( _ ) { /* XHR also blocked */ }
          }

          if ( !text ) continue;
          const match = text.match( gitConfigRegex );
          if ( match ) {
            CONFIG.owner = match[ 1 ];
            CONFIG.repo = match[ 2 ];
            state.localBase = prefix;
            localStorage.setItem( storageKey( 'repo' ), JSON.stringify( { owner: CONFIG.owner, repo: CONFIG.repo } ) );
            return;
          }
        }
      }

      if ( CONFIG_DEFAULTS.owner && CONFIG_DEFAULTS.repo ) {
        CONFIG.owner = CONFIG_DEFAULTS.owner;
        CONFIG.repo = CONFIG_DEFAULTS.repo;
        if ( !CONFIG.branch && CONFIG_DEFAULTS.branch ) CONFIG.branch = CONFIG_DEFAULTS.branch;
        return;
      }

      return new Promise( ( resolve ) => {
        const cb = document.getElementById( 'contentBody' );
        cb.innerHTML = `
          <div class="repo-form">
            <p>Could not auto-detect the repository. Please enter the details below.</p>
            <label for="inpOwner">GitHub Owner</label>
            <input id="inpOwner" type="text" placeholder="e.g. octocat" autocomplete="off">
            <label for="inpRepo">Repository</label>
            <input id="inpRepo" type="text" placeholder="e.g. hello-world" autocomplete="off">
            <button id="btnSetRepo" class="primary" title="Set repository owner and name">Set Repository</button>
          </div>
        `;
        document.getElementById( 'btnSetRepo' ).addEventListener( 'click', () => {
          const owner = document.getElementById( 'inpOwner' ).value.trim();
          const repo = document.getElementById( 'inpRepo' ).value.trim();
          if ( !owner || !repo ) return;
          CONFIG.owner = owner;
          CONFIG.repo = repo;
          localStorage.setItem( storageKey( 'repo' ), JSON.stringify( { owner, repo } ) );
          resolve();
        } );
      } );
    };

    /* ── 10. setHljsTheme ── */
    const setHljsTheme = ( isDark ) => {
      const link = document.getElementById( 'hljsTheme' );
      link.href = isDark
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    };

    /* ── 11. initAppearance ── */
    const initAppearance = () => {
      const stored = localStorage.getItem( storageKey( 'darkMode' ) );
      const isDark = stored === null
        ? window.matchMedia( '(prefers-color-scheme: dark)' ).matches
        : stored === 'true';
      if ( isDark ) {
        document.body.classList.add( 'dark-mode' );
        document.getElementById( 'btnDarkMode' ).textContent = '☀️';
      }
      setHljsTheme( isDark );

      const savedFontSize = localStorage.getItem( storageKey( 'fontSize' ) );
      if ( savedFontSize ) {
        document.documentElement.style.setProperty( '--font-size', savedFontSize );
      }

      const savedWidth = localStorage.getItem( storageKey( 'sidebarWidth' ) );
      if ( savedWidth ) {
        document.documentElement.style.setProperty( '--sidebar-width', savedWidth );
      } else if ( window.innerWidth <= 768 ) {
        // Narrow viewport, no saved preference → start at 25% of viewport
        document.documentElement.style.setProperty( '--sidebar-width', Math.round( window.innerWidth * 0.25 ) + 'px' );
      }
    };

    /* ── 11b. showTokenPanel — render the token form, optionally with a reason ── */
    const showTokenPanel = ( reasonHtml = '' ) => {
      const cb = document.getElementById( 'contentBody' );
      const contentArea = document.getElementById( 'contentArea' );
      const current = localStorage.getItem( 'githubToken' ) || '';
      const hasToken = current.length > 0;

      const existingHeader = contentArea.querySelector( '.panel-header.file-header' );
      const simpleHeader = document.createElement( 'div' );
      simpleHeader.className = 'panel-header file-header';
      simpleHeader.innerHTML = '<h3 id="contentTitle">GitHub Token</h3>';
      if ( existingHeader ) {
        existingHeader.replaceWith( simpleHeader );
      } else {
        contentArea.insertBefore( simpleHeader, cb );
      }

      cb.innerHTML = `
        ${ reasonHtml }
        <div class="repo-form">
          <p>${ escapeHTML( CONFIG.appName ) } reads the GitHub REST API to list and fetch repository contents. GitHub limits anonymous (un-authenticated) access to <strong>60 requests per hour per IP address</strong>. Once you exceed that limit you cannot read more files until the limit resets, unless you provide a Personal Access Token (PAT). With a token the limit rises to <strong>5,000 requests per hour</strong>, and you can also access private repositories the token has read scope for.</p>
          <p><strong>Where do I get a token?</strong></p>
          <ul>
            <li><strong>Public repositories:</strong> create a token at <a href="https://github.com/settings/tokens" target="_blank" rel="noopener">github.com/settings/tokens</a>. A classic token with no scopes is enough for read-only access, or use a fine-grained token.</li>
            <li><strong>Private repositories:</strong> ask the repository owner to issue a fine-grained personal access token scoped to that repository, with at minimum <em>Contents: Read</em> permission, and to share it with you securely.</li>
          </ul>
          <p>Your token is stored in this browser's <code>localStorage</code> only. It is never sent anywhere except <code>api.github.com</code>, and it is not shared with the developers of ${ escapeHTML( CONFIG.appName ) }.</p>
          <label for="inpToken">Token${ hasToken ? ' (currently set)' : '' }</label>
          <input id="inpToken" type="password" placeholder="${ hasToken ? '•••••••• (leave blank to keep)' : 'ghp_…' }" autocomplete="off" spellcheck="false">
          <label><input id="inpTokenShow" type="checkbox"> Show token</label>
          <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
            <button id="btnTokenSave" class="primary" title="Save token and reload">Save</button>
            <button id="btnTokenClear" class="secondary" title="Clear stored token">Clear</button>
          </div>
          <hr style="margin: 1rem 0; border: none; border-top: 1px solid var(--border-color);">
          <p style="font-size: 0.85rem; opacity: 0.8;">Wipe every preference, cached file, and the GitHub token from this browser. Useful when testing a fork or starting fresh.</p>
          <button id="btnResetAll" class="secondary" title="Wipe all ${ escapeHTML( CONFIG.appName ) } data from this browser">Reset all ${ escapeHTML( CONFIG.appName ) } data</button>
        </div>
      `;

      const inp = document.getElementById( 'inpToken' );
      inp.focus();

      document.getElementById( 'inpTokenShow' ).addEventListener( 'change', ( e ) => {
        inp.type = e.target.checked ? 'text' : 'password';
      } );

      const save = () => {
        const value = inp.value;
        if ( value === '' && hasToken ) return; // leave existing token untouched
        localStorage.setItem( 'githubToken', value );
        clearFileCache();
        location.reload();
      };

      document.getElementById( 'btnTokenSave' ).addEventListener( 'click', save );
      inp.addEventListener( 'keydown', ( e ) => { if ( e.key === 'Enter' ) save(); } );

      document.getElementById( 'btnTokenClear' ).addEventListener( 'click', () => {
        localStorage.removeItem( 'githubToken' );
        clearFileCache();
        location.reload();
      } );

      document.getElementById( 'btnResetAll' ).addEventListener( 'click', () => {
        if ( !window.confirm( `Wipe all ${ CONFIG.appName } preferences, cached files, and the GitHub token from this browser?` ) ) return;
        try {
          const prefix = `${ CONFIG.storagePrefix }:`;
          const toRemove = [];
          for ( let i = 0; i < localStorage.length; i++ ) {
            const k = localStorage.key( i );
            if ( k && k.startsWith( prefix ) ) toRemove.push( k );
          }
          for ( const k of toRemove ) localStorage.removeItem( k );
          localStorage.removeItem( 'githubToken' );
        } catch ( _ ) { /* storage disabled */ }
        location.reload();
      } );
    };

    const RATE_LIMIT_REASON_HTML = '<div class="error-panel">⚠️ <strong>GitHub API rate limit reached.</strong> You\'ve exceeded the anonymous request quota and cannot load more files until you add a token below or wait for the limit to reset.</div>';

    /* ── 12. setupListeners ── */
    const setupListeners = () => {
      const contentArea = document.getElementById( 'contentArea' );

      // Dark mode toggle
      document.getElementById( 'btnDarkMode' ).addEventListener( 'click', () => {
        const isDark = document.body.classList.toggle( 'dark-mode' );
        document.getElementById( 'btnDarkMode' ).textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem( storageKey( 'darkMode' ), isDark );
        setHljsTheme( isDark );
      } );

      // Font size
      const getFontSize = () => {
        const val = getComputedStyle( document.documentElement ).getPropertyValue( '--font-size' );
        return parseInt( val, 10 ) || 16;
      };

      document.getElementById( 'btnFontInc' ).addEventListener( 'click', () => {
        const sz = Math.min( getFontSize() + 2, 28 );
        document.documentElement.style.setProperty( '--font-size', sz + 'px' );
        localStorage.setItem( storageKey( 'fontSize' ), sz + 'px' );
      } );

      document.getElementById( 'btnFontDec' ).addEventListener( 'click', () => {
        const sz = Math.max( getFontSize() - 2, 10 );
        document.documentElement.style.setProperty( '--font-size', sz + 'px' );
        localStorage.setItem( storageKey( 'fontSize' ), sz + 'px' );
      } );

      // Help / About
      document.getElementById( 'btnHelp' ).addEventListener( 'click', async () => {
        const revised = document.querySelector( 'meta[name="revised"]' )?.content || 'unknown';
        const sourceUrl = CONFIG.sourceRepoUrl;
        const repoUrl = state.owner && state.repo
          ? `https://github.com/${ state.owner }/${ state.repo }`
          : sourceUrl;
        const token = getToken();

        let rateLimitInfo = 'Unable to fetch';
        try {
          const res = await fetch( 'https://api.github.com/rate_limit', { headers: getAuthHeaders() } );
          if ( res.ok ) {
            const data = await res.json();
            const core = data.resources.core;
            const reset = new Date( core.reset * 1000 ).toLocaleTimeString();
            rateLimitInfo = `${ core.remaining } / ${ core.limit } remaining (resets at ${ reset })`;
          }
        } catch ( _ ) { /* offline or blocked */ }

        const tokenStatus = token ? 'Set' : 'Not set (anonymous — 60 requests/hour)';
        const cb = document.getElementById( 'contentBody' );
        cb.innerHTML = `
          <h2>About ${ escapeHTML( CONFIG.appName ) }</h2>
          <p>A lightweight single-file GitHub repository browser.</p>
          <ul>
            <li><strong>Source code:</strong> <a href="${ escapeHTML( sourceUrl ) }" target="_blank" rel="noopener">${ escapeHTML( sourceUrl ) }</a></li>
            <li><strong>Repository:</strong> <a href="${ escapeHTML( repoUrl ) }" target="_blank" rel="noopener">${ escapeHTML( repoUrl ) }</a></li>
            <li><strong>Copyright:</strong> pushme-pullyou authors</li>
            <li><strong>License:</strong> MIT License</li>
            <li><strong>Built:</strong> ${ escapeHTML( revised ) }</li>
          </ul>
          <h3>GitHub API</h3>
          <ul>
            <li><strong>Repo visibility:</strong> Public (private repos require a token)</li>
            <li><strong>Token:</strong> ${ escapeHTML( tokenStatus ) }</li>
            <li><strong>Rate limit:</strong> ${ escapeHTML( rateLimitInfo ) }</li>
            <li><strong>GitHub Pages:</strong> Supported — auto-detects repos hosted on GitHub Pages</li>
          </ul>
          ${ ( () => {
            const stats = getRepoStats();
            if ( !stats ) return '<h3>Repository Statistics</h3><p>No tree data loaded yet.</p>';
            const typesHtml = stats.topTypes.map( ( [ ext, count ] ) =>
              `<li>${ escapeHTML( ext ) }: ${ count } file${ count !== 1 ? 's' : '' }</li>`
            ).join( '' );
            const largestHtml = stats.largest.map( ( f ) =>
              `<li>${ escapeHTML( f.path ) } — ${ formatFileSize( f.size ) }</li>`
            ).join( '' );
            return `<h3>Repository Statistics</h3>
              <ul>
                <li><strong>Files:</strong> ${ stats.fileCount }</li>
                <li><strong>Folders:</strong> ${ stats.folderCount }</li>
                <li><strong>Total size:</strong> ${ formatFileSize( stats.totalSize ) }</li>
              </ul>
              <h4>Top file types</h4>
              <ol>${ typesHtml }</ol>
              <h4>Largest files</h4>
              <ol>${ largestHtml }</ol>`;
          } )() }
          <h3>Tips</h3>
          <ul>
            <li>Use the filter input in the sidebar to search file names</li>
            <li>Click the title in the header to reload</li>
            <li>Use <strong>A−</strong> / <strong>A+</strong> to adjust font size — helpful on phones and small screens</li>
            <li>Click <strong>🌙</strong> to toggle dark mode — your choice is saved across visits</li>
          </ul>
        `;

        // Restore original panel header (selectFile replaces it with breadcrumbs)
        const contentArea = document.getElementById( 'contentArea' );
        const existingHeader = contentArea.querySelector( '.panel-header.file-header' );
        const simpleHeader = document.createElement( 'div' );
        simpleHeader.className = 'panel-header file-header';
        simpleHeader.innerHTML = '<h3 id="contentTitle">About</h3>';
        if ( existingHeader ) {
          existingHeader.replaceWith( simpleHeader );
        } else {
          contentArea.insertBefore( simpleHeader, document.getElementById( 'contentBody' ) );
        }
      } );

      // Token inline form
      document.getElementById( 'btnToken' ).addEventListener( 'click', () => showTokenPanel() );

      // Resizable sidebar
      const resizer = document.getElementById( 'resizer' );
      let isResizing = false;

      resizer.addEventListener( 'pointerdown', ( e ) => {
        isResizing = true;
        resizer.setPointerCapture( e.pointerId );
        resizer.classList.add( 'dragging' );
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
      } );

      resizer.addEventListener( 'pointermove', ( e ) => {
        if ( !resizer.hasPointerCapture( e.pointerId ) ) return;
        const newWidth = Math.min( Math.max( e.clientX, 100 ), window.innerWidth - 100 );
        document.documentElement.style.setProperty( '--sidebar-width', newWidth + 'px' );
      } );

      resizer.addEventListener( 'pointerup', ( e ) => {
        if ( !isResizing ) return;
        isResizing = false;
        resizer.releasePointerCapture( e.pointerId );
        resizer.classList.remove( 'dragging' );
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        const currentWidth = getComputedStyle( document.documentElement ).getPropertyValue( '--sidebar-width' ).trim();
        localStorage.setItem( storageKey( 'sidebarWidth' ), currentWidth );
      } );

      // Filter input (debounced)
      const debouncedFilter = debounce( runFilter, 150 );
      document.getElementById( 'treeFilter' ).addEventListener( 'input', debouncedFilter );

      document.getElementById( 'btnFilterClear' ).addEventListener( 'click', () => {
        document.getElementById( 'treeFilter' ).value = '';
        document.getElementById( 'btnFilterClear' ).style.display = 'none';
        runFilter();
        document.getElementById( 'treeFilter' ).focus();
      } );

      // Esc clears filter when focused; "/" focuses filter from anywhere
      document.getElementById( 'treeFilter' ).addEventListener( 'keydown', ( e ) => {
        if ( e.key === 'Escape' ) {
          e.target.value = '';
          document.getElementById( 'btnFilterClear' ).style.display = 'none';
          runFilter();
          e.target.blur();
        }
      } );

      // Back to top
      const btnBackToTop = document.getElementById( 'btnBackToTop' );

      contentArea.addEventListener( 'scroll', () => {
        btnBackToTop.style.display = contentArea.scrollTop > 400 ? 'flex' : 'none';
      } );

      btnBackToTop.addEventListener( 'click', () => {
        const reduce = window.matchMedia( '(prefers-reduced-motion: reduce)' ).matches;
        contentArea.scrollTo( { top: 0, behavior: reduce ? 'auto' : 'smooth' } );
      } );

      // Header title click — return to the *original* repo for this app
      // instance: clear the deep-link hash, the URL query overrides, the
      // cached repo, and the last-opened-file preference, then reload.
      document.getElementById( 'headerTitle' ).addEventListener( 'click', ( e ) => {
        e.preventDefault();
        clearCurrentFilePreference();
        try { localStorage.removeItem( storageKey( 'repo' ) ); } catch ( _ ) { /* storage disabled */ }
        const cleanUrl = location.pathname;
        if ( location.search || location.hash ) {
          location.replace( cleanUrl );
        } else {
          location.reload();
        }
      } );
    };

    /* ── 13. GitHub API helpers (Public API) ── */

    const getToken = () => localStorage.getItem( 'githubToken' ) || '';

    const getAuthHeaders = () => {
      const headers = { Accept: 'application/vnd.github+json' };
      const token = getToken();
      if ( token ) headers.Authorization = `token ${ token }`;
      return headers;
    };

    const updateRateBadge = ( response ) => {
      const remaining = response.headers.get( 'X-RateLimit-Remaining' );
      const limit = response.headers.get( 'X-RateLimit-Limit' );
      if ( remaining !== null && limit !== null ) {
        const badge = document.getElementById( 'rateBadge' );
        badge.style.display = 'inline';
        badge.textContent = `${ remaining }/${ limit }`;
        const n = parseInt( remaining, 10 );
        badge.classList.toggle( 'critical', n <= 10 );
        badge.classList.toggle( 'low', n > 10 && n <= 50 );
      }
    };

    let currentAbortController = null;

    /* ── 14. File type icons ── */
    const getFileIcon = ( fileName ) => {
      const ext = fileName.includes( '.' ) ? '.' + fileName.split( '.' ).pop().toLowerCase() : '';
      const iconMap = {
        '.md': '📝',
        '.js': '🟨', '.mjs': '🟨', '.cjs': '🟨',
        '.ts': '🟦', '.tsx': '🟦',
        '.py': '🐍',
        '.html': '🌐', '.htm': '🌐',
        '.css': '🎨', '.scss': '🎨', '.less': '🎨',
        '.png': '🖼️', '.jpg': '🖼️', '.jpeg': '🖼️', '.gif': '🖼️', '.webp': '🖼️', '.svg': '🖼️', '.ico': '🖼️',
        '.mp3': '🎵', '.wav': '🎵', '.ogg': '🎵',
        '.mp4': '🎬', '.webm': '🎬',
        '.pdf': '📕',
        '.xlsx': '📊', '.xls': '📊', '.csv': '📊', '.ods': '📊',
        '.yaml': '⚙️', '.yml': '⚙️', '.toml': '⚙️',
        '.zip': '📦', '.tar': '📦', '.gz': '📦', '.7z': '📦',
        '.json': '{ }',
      };
      return iconMap[ ext ] || '📄';
    };

    /* ── 15. File size formatting ── */
    const formatFileSize = ( bytes ) => {
      if ( bytes == null ) return '';
      if ( bytes < 1024 ) return `${ bytes } B`;
      if ( bytes < 1024 * 1024 ) return `${ ( bytes / 1024 ).toFixed( 1 ) } KB`;
      return `${ ( bytes / ( 1024 * 1024 ) ).toFixed( 1 ) } MB`;
    };

    /* ── 16. Repository statistics ── */
    const getRepoStats = () => {
      if ( !state.tree ) return null;
      const blobs = state.tree.filter( ( i ) => i.type === 'blob' );
      const trees = state.tree.filter( ( i ) => i.type === 'tree' );
      const totalSize = blobs.reduce( ( sum, i ) => sum + ( i.size || 0 ), 0 );

      // Count by extension
      const extCounts = {};
      for ( const b of blobs ) {
        const name = b.path.split( '/' ).pop();
        const ext = name.includes( '.' ) ? '.' + name.split( '.' ).pop().toLowerCase() : '(no ext)';
        extCounts[ ext ] = ( extCounts[ ext ] || 0 ) + 1;
      }
      const topTypes = Object.entries( extCounts )
        .sort( ( a, b ) => b[ 1 ] - a[ 1 ] )
        .slice( 0, 10 );

      // Largest files
      const largest = [ ...blobs ]
        .sort( ( a, b ) => ( b.size || 0 ) - ( a.size || 0 ) )
        .slice( 0, 5 );

      return { fileCount: blobs.length, folderCount: trees.length, totalSize, topTypes, largest };
    };

    /* ── 17. Build nested tree structure ── */
    const buildNestedTree = ( flatTree ) => {
      const root = { children: {} };
      for ( const item of flatTree ) {
        const parts = item.path.split( '/' );
        if ( parts.some( ( p ) => p.startsWith( '.' ) ) ) continue;
        let current = root;
        for ( let i = 0; i < parts.length; i++ ) {
          const part = parts[ i ];
          if ( !current.children[ part ] ) {
            current.children[ part ] = { children: {}, type: null, size: null, path: null };
          }
          if ( i === parts.length - 1 ) {
            current.children[ part ].type = item.type;
            current.children[ part ].size = item.size;
            current.children[ part ].path = item.path;
          }
          current = current.children[ part ];
        }
      }
      return root;
    };

    /* ── 18. Sort tree children: folders first, then alphabetical ── */
    const sortedEntries = ( children ) =>
      Object.entries( children ).sort( ( [ aName, aNode ], [ bName, bNode ] ) => {
        const aIsFolder = aNode.type === 'tree' || Object.keys( aNode.children ).length > 0;
        const bIsFolder = bNode.type === 'tree' || Object.keys( bNode.children ).length > 0;
        if ( aIsFolder && !bIsFolder ) return -1;
        if ( !aIsFolder && bIsFolder ) return 1;
        return aName.toLowerCase().localeCompare( bName.toLowerCase() );
      } );

    /* ── 19. Generate HTML for a tree node ── */
    const renderNode = ( name, node, parentPath ) => {
      const fullPath = parentPath ? `${ parentPath }/${ name }` : name;
      const isFolder = node.type === 'tree' || Object.keys( node.children ).length > 0;

      if ( isFolder ) {
        const childrenHtml = sortedEntries( node.children )
          .map( ( [ childName, childNode ] ) => renderNode( childName, childNode, fullPath ) )
          .join( '' );

        return `<details data-folder-path="${ escapeHTML( fullPath ) }">` +
          `<summary class="tree-folder" tabindex="0" title="${ escapeHTML( fullPath ) }">` +
          `📁 <span class="folder-name">${ escapeHTML( name ) }</span>` +
          `</summary>` +
          childrenHtml +
          `</details>`;
      }

      const icon = getFileIcon( name );
      const sizeStr = formatFileSize( node.size );
      const isReadme = /^readme/i.test( name );
      const nameHtml = isReadme
        ? `<strong>${ escapeHTML( name ) }</strong>`
        : escapeHTML( name );

      return `<div class="tree-item" tabindex="0" data-action="select-file" data-path="${ escapeHTML( fullPath ) }" title="${ escapeHTML( fullPath ) }">` +
        `<span class="tree-item-name">${ icon } ${ nameHtml }</span>` +
        `<span class="tree-item-size">${ sizeStr }</span>` +
        `</div>`;
    };

    /* ── 20. renderTree — batched rendering ── */
    const renderTree = ( treeArray ) => {
      const treeList = document.getElementById( 'treeList' );
      treeList.innerHTML = '';

      const nested = buildNestedTree( treeArray );
      const rootEntries = sortedEntries( nested.children );
      const batchSize = 120;
      const total = rootEntries.length;
      let rendered = 0;

      const statusEl = document.createElement( 'div' );
      statusEl.id = 'treeRenderStatus';
      statusEl.style.cssText = 'font-size: 0.85rem; color: var(--text-color); opacity: 0.7; padding: 0.3rem 0.5rem;';
      treeList.appendChild( statusEl );

      return new Promise( ( resolve ) => {
        const renderBatch = () => {
          const end = Math.min( rendered + batchSize, total );
          let html = '';
          for ( let i = rendered; i < end; i++ ) {
            const [ name, node ] = rootEntries[ i ];
            html += renderNode( name, node, '' );
          }
          const fragment = document.createElement( 'div' );
          fragment.innerHTML = html;
          while ( fragment.firstChild ) {
            treeList.insertBefore( fragment.firstChild, statusEl );
          }
          rendered = end;
          const pct = Math.round( ( rendered / total ) * 100 );
          statusEl.textContent = `${ pct }% rendered…`;
          if ( rendered < total ) {
            setTimeout( renderBatch, 0 );
          } else {
            statusEl.remove();
            resolve();
          }
        };

        if ( total === 0 ) {
          statusEl.remove();
          resolve();
        } else {
          renderBatch();
        }
      } );
    };

    /* ── 21. fetchTree ── */
    const fetchTree = async () => {
      if ( currentAbortController ) currentAbortController.abort();
      currentAbortController = new AbortController();
      const signal = currentAbortController.signal;

      const treeList = document.getElementById( 'treeList' );
      const headers = getAuthHeaders();

      try {
        if ( !state.branch ) {
          const repoRes = await fetch(
            `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }`,
            { headers, signal }
          );
          updateRateBadge( repoRes );
          if ( repoRes.status === 403 ) {
            treeList.innerHTML = `<p style="color: red;">${ escapeHTML( RATE_LIMIT_MESSAGE ) }</p>`;
            showTokenPanel( RATE_LIMIT_REASON_HTML );
            return;
          }
          if ( !repoRes.ok ) throw new Error( `Failed to fetch repo info: ${ repoRes.status }` );
          const repoData = await repoRes.json();
          state.branch = repoData.default_branch;
          localStorage.setItem( storageKey( 'repo' ), JSON.stringify( {
            owner: state.owner, repo: state.repo, branch: state.branch,
          } ) );
        }

        treeList.innerHTML = '<p>Loading tree…</p>';

        const treeRes = await fetch(
          `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/git/trees/${ encodeURIComponent( state.branch ) }?recursive=1`,
          { headers, signal }
        );
        updateRateBadge( treeRes );

        if ( treeRes.status === 403 ) {
          treeList.innerHTML = `<p style="color: red;">${ escapeHTML( RATE_LIMIT_MESSAGE ) }</p>`;
          showTokenPanel( RATE_LIMIT_REASON_HTML );
          return;
        }
        if ( !treeRes.ok ) throw new Error( `Failed to fetch tree: ${ treeRes.status }` );

        const treeData = await treeRes.json();

        state.tree = treeData.tree;
        await renderTree( state.tree );

        if ( treeData.truncated ) {
          const warning = document.createElement( 'div' );
          warning.style.cssText = 'background: #fff3cd; border: 1px solid #ffc107; padding: 0.5rem; border-radius: 4px; margin: 0 0.5rem 0.5rem 0.5rem; font-size: 0.85rem;';
          warning.textContent = '⚠️ Repository tree is truncated. Some files may not appear.';
          treeList.insertBefore( warning, treeList.firstChild );
        }

      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;
        treeList.innerHTML = `<p style="color: red;">${ escapeHTML( err.message ) }</p>`;
      }
    };

    /* ── 22. Filter logic ── */
    const runFilter = () => {
      const query = document.getElementById( 'treeFilter' ).value.trim().toLowerCase();
      const treeList = document.getElementById( 'treeList' );
      const btnFilterClear = document.getElementById( 'btnFilterClear' );

      btnFilterClear.style.display = query ? 'block' : 'none';

      const items = treeList.querySelectorAll( '.tree-item' );
      const folders = treeList.querySelectorAll( 'details' );

      if ( !query ) {
        items.forEach( ( el ) => { el.classList.remove( 'is-hidden' ); } );
        folders.forEach( ( el ) => { el.classList.remove( 'is-hidden' ); } );
        return;
      }

      items.forEach( ( el ) => {
        const path = ( el.dataset.path || '' ).toLowerCase();
        el.classList.toggle( 'is-hidden', !path.includes( query ) );
      } );

      const foldersArr = Array.from( folders ).reverse();
      foldersArr.forEach( ( details ) => {
        const hasVisible = details.querySelector( '.tree-item:not(.is-hidden)' );
        if ( hasVisible ) {
          details.classList.remove( 'is-hidden' );
          details.open = true;
        } else {
          details.classList.add( 'is-hidden' );
        }
      } );
    };

    /* ── 23. Debounce helper ── */
    const debounce = ( fn, ms ) => {
      let timer;
      return ( ...args ) => {
        clearTimeout( timer );
        timer = setTimeout( () => fn( ...args ), ms );
      };
    };

    /* ── 24. Expand All / Collapse All ── */
    const setupExpandAll = () => {
      const btn = document.getElementById( 'btnExpandAll' );
      let expanded = false;

      btn.addEventListener( 'click', () => {
        const allDetails = document.getElementById( 'treeList' ).querySelectorAll( 'details' );
        expanded = !expanded;
        allDetails.forEach( ( d ) => { d.open = expanded; } );
        btn.textContent = expanded ? 'Collapse All' : 'Expand All';
      } );
    };

    /* ── 25. File selection (event delegation) — calls selectFile ── */
    const setupFileSelection = () => {
      document.getElementById( 'treeList' ).addEventListener( 'click', ( e ) => {
        const target = e.target.closest( '[data-action="select-file"]' );
        if ( !target ) return;
        selectFile( target.dataset.path );
      } );
    };

    /* ── 26. Keyboard navigation ── */
    const getVisibleTreeItems = () => {
      const treeList = document.getElementById( 'treeList' );
      const all = treeList.querySelectorAll( '.tree-folder, .tree-item' );
      return Array.from( all ).filter( ( el ) => {
        if ( el.classList.contains( 'is-hidden' ) ) return false;

        if ( el.classList.contains( 'tree-folder' ) ) {
          const ownDetails = el.parentElement;
          if ( ownDetails && ownDetails.classList.contains( 'is-hidden' ) ) return false;
          let ancestor = ownDetails?.parentElement;
          while ( ancestor && ancestor !== treeList ) {
            if ( ancestor.tagName === 'DETAILS' ) {
              if ( !ancestor.open || ancestor.classList.contains( 'is-hidden' ) ) return false;
            }
            ancestor = ancestor.parentElement;
          }
          return true;
        }

        let ancestor = el.parentElement;
        while ( ancestor && ancestor !== treeList ) {
          if ( ancestor.tagName === 'DETAILS' ) {
            if ( !ancestor.open || ancestor.classList.contains( 'is-hidden' ) ) return false;
          }
          ancestor = ancestor.parentElement;
        }
        return true;
      } );
    };

    const selectFileItem = ( el ) => {
      if ( !el.classList.contains( 'tree-item' ) ) return;
      selectFile( el.dataset.path );
    };

    const setupKeyboardNav = () => {
      document.addEventListener( 'keydown', ( e ) => {
        const treeList = document.getElementById( 'treeList' );
        const active = document.activeElement;

        if ( e.key === '/' && active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' ) {
          e.preventDefault();
          document.getElementById( 'treeFilter' ).focus();
          return;
        }

        if ( !treeList.contains( active ) ) return;
        if ( !active.classList.contains( 'tree-folder' ) && !active.classList.contains( 'tree-item' ) ) return;

        const visible = getVisibleTreeItems();
        const idx = visible.indexOf( active );
        if ( idx === -1 ) return;

        switch ( e.key ) {
          case 'ArrowDown': {
            e.preventDefault();
            const next = visible[ idx + 1 ];
            if ( next ) { next.focus(); selectFileItem( next ); }
            break;
          }
          case 'ArrowUp': {
            e.preventDefault();
            const prev = visible[ idx - 1 ];
            if ( prev ) { prev.focus(); selectFileItem( prev ); }
            break;
          }
          case 'Enter':
          case ' ': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              active.parentElement.open = !active.parentElement.open;
            } else {
              selectFileItem( active );
            }
            break;
          }
          case 'ArrowRight': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              const details = active.parentElement;
              if ( !details.open ) {
                details.open = true;
              } else {
                const firstChild = details.querySelector( '.tree-folder, .tree-item' );
                if ( firstChild && firstChild !== active ) { firstChild.focus(); selectFileItem( firstChild ); }
              }
            }
            break;
          }
          case 'ArrowLeft': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              const details = active.parentElement;
              if ( details.open ) {
                details.open = false;
              } else {
                const parentDetails = details.parentElement?.closest( 'details' );
                if ( parentDetails ) {
                  const parentSummary = parentDetails.querySelector( ':scope > summary' );
                  if ( parentSummary ) parentSummary.focus();
                }
              }
            } else {
              const parentDetails = active.closest( 'details' );
              if ( parentDetails ) {
                const parentSummary = parentDetails.querySelector( ':scope > summary' );
                if ( parentSummary ) parentSummary.focus();
              }
            }
            break;
          }
        }
      } );
    };

    /* ── 27. Auto-select README ── */
    const autoSelectReadme = () => {
      if ( !state.tree ) return;

      // Only match a root-level README; otherwise fall back to the About page.
      // Accepts: README.md, README.markdown, README.mkd, README.mdown,
      // README.txt, and bare README (no extension). Case-insensitive.
      const readme = state.tree.find( ( item ) =>
        item.type === 'blob' && /^readme(\.(md|markdown|mkd|mdown|txt))?$/i.test( item.path )
      );

      if ( !readme ) {
        document.getElementById( 'btnHelp' ).click();
        return;
      }

      selectFile( readme.path, { skipHash: true } );
      const el = document.querySelector( `[data-action="select-file"][data-path="${ CSS.escape( readme.path ) }"]` );
      if ( el ) el.scrollIntoView( { block: 'center', behavior: 'smooth' } );
    };

    /* ── 28. scrollToTreeFolder ── */
    const scrollToTreeFolder = ( folderPath ) => {
      const target = document.querySelector( `details[data-folder-path="${ CSS.escape( folderPath ) }"]` );
      if ( !target ) return;

      let ancestor = target.parentElement?.closest( 'details' );
      while ( ancestor ) {
        ancestor.open = true;
        ancestor = ancestor.parentElement?.closest( 'details' );
      }
      target.open = true;
      target.scrollIntoView( { block: 'center', behavior: 'smooth' } );
    };

    /* ── 29. (resetToHome removed — was only called by the deprecated
       breadcrumb reset-home action; the top-header click now handles the
       "back to original repo" flow with a full reload.) ── */

    /* ── 30. Hash routing ── */
    const updateHash = ( path ) => {
      const newHash = '#' + encodeURIComponent( path );
      try {
        // First navigation pushes so browser Back exits the app;
        // subsequent clicks replace so the back stack doesn't accumulate.
        if ( location.hash ) {
          history.replaceState( null, '', newHash );
        } else {
          history.pushState( null, '', newHash );
        }
      } catch ( _ ) { /* file:// */ }
    };

    const handleHashChange = async () => {
      const hash = location.hash.slice( 1 );
      if ( !hash ) return;
      const path = decodeURIComponent( hash );
      if ( !state.tree ) {
        document.getElementById( 'contentBody' ).innerHTML = '<p>Loading tree…</p>';
        await fetchTree();
      }
      const found = state.tree?.find( ( item ) => item.path === path && item.type === 'blob' );
      if ( found ) {
        selectFile( path, { skipHash: true } );
      } else {
        document.getElementById( 'contentBody' ).innerHTML =
          '<p>File not found: <code>' + escapeHTML( path ) + '</code></p>';
      }
    };

    /* ── 31. getNewTabUrl — GitHub Pages or raw fallback ── */
    const getNewTabUrl = async ( path ) => {
      if ( state.pagesEnabled === null ) {
        try {
          const headers = getAuthHeaders();
          const res = await fetch(
            `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/pages`,
            { headers }
          );
          updateRateBadge( res );
          state.pagesEnabled = res.ok;
        } catch ( _ ) {
          state.pagesEnabled = false;
        }
      }

      if ( state.pagesEnabled ) {
        // GitHub Pages / Jekyll renders .md as HTML; README.md becomes the directory index.html
        const fileName = path.split( '/' ).pop();
        const isReadme = /^readme\.md$/i.test( fileName );
        const pagesPath = isReadme
          ? path.slice( 0, path.length - fileName.length )  // strip filename → directory URL
          : path.replace( /\.md$/i, '' );                   // strip .md extension
        const encodedPagesPath = encodePath( pagesPath );
        const isUserPage = state.repo.toLowerCase() === `${ state.owner.toLowerCase() }.github.io`;
        return isUserPage
          ? `https://${ state.owner }.github.io/${ encodedPagesPath }`
          : `https://${ state.owner }.github.io/${ state.repo }/${ encodedPagesPath }`;
      }

      return rawUrl( path );
    };

    /* ── 32. buildFileHeader — breadcrumbs + action buttons ── */
    const buildFileHeader = ( path, ext ) => {
      const segments = path.split( '/' );
      const fileName = segments.pop();

      const ownerUrl = `https://github.com/${ encodeURIComponent( state.owner ) }`;
      const repoUrl = `https://github.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }`;

      // Breadcrumbs identify the file fully: owner / repo @ branch / folder / file.
      // The owner, repo, and branch segments link out to GitHub (the top header
      // is the way back to the TooToo repo home for this app).
      let breadcrumbHtml =
        `<a class="breadcrumb-link" href="${ escapeHTML( ownerUrl ) }" target="_blank" rel="noopener" title="Open ${ escapeHTML( state.owner ) } on GitHub" aria-label="Open ${ escapeHTML( state.owner ) } on GitHub">${ escapeHTML( state.owner ) }</a>` +
        ` / <a class="breadcrumb-link" href="${ escapeHTML( repoUrl ) }" target="_blank" rel="noopener" title="Open ${ escapeHTML( state.repo ) } on GitHub" aria-label="Open ${ escapeHTML( state.repo ) } on GitHub">${ escapeHTML( state.repo ) }</a>`;
      if ( state.branch ) {
        const branchUrl = `${ repoUrl }/tree/${ encodeURIComponent( state.branch ) }`;
        breadcrumbHtml += ` @ <a class="breadcrumb-link" href="${ escapeHTML( branchUrl ) }" target="_blank" rel="noopener" title="Open the ${ escapeHTML( state.branch ) } branch on GitHub" aria-label="Open the ${ escapeHTML( state.branch ) } branch on GitHub">${ escapeHTML( state.branch ) }</a>`;
      }
      let folderPath = '';
      for ( const seg of segments ) {
        folderPath = folderPath ? `${ folderPath }/${ seg }` : seg;
        breadcrumbHtml += ` / <a class="breadcrumb-link" href="#" data-action="scroll-folder" data-folder="${ escapeHTML( folderPath ) }" title="${ escapeHTML( folderPath ) }" aria-label="Scroll to folder ${ escapeHTML( folderPath ) }">${ escapeHTML( seg ) }</a>`;
      }
      breadcrumbHtml += ` / <strong>${ escapeHTML( fileName ) }</strong>`;

      const githubUrl = `https://github.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/blob/${ encodeURIComponent( state.branch ) }/${ encodePath( path ) }`;

      const hasToggle = [ 'md', 'html', 'htm', 'svg' ].includes( ext );
      const hasCopy = !NO_COPY_EXTS.includes( ext );
      const preferredView = hasToggle ? getPreferredView( ext ) : 'rendered';

      let actionsHtml = '';
      if ( hasToggle ) {
        const renderedPressed = preferredView === 'rendered';
        const rawPressed = preferredView === 'raw';
        actionsHtml += `<button class="file-btn" data-action="view-rendered" title="Show rendered view" aria-pressed="${ renderedPressed }">Rendered</button>`;
        actionsHtml += `<button class="file-btn" data-action="view-raw" title="Show raw source" aria-pressed="${ rawPressed }">Raw</button>`;
      }
      if ( hasCopy ) {
        actionsHtml += `<button class="file-btn" data-action="copy-file" title="Copy file contents to clipboard" aria-label="Copy file contents to clipboard">📋 Copy</button>`;
      }
      actionsHtml += `<button class="file-btn" data-action="new-tab" data-path="${ escapeHTML( path ) }" title="Open in new tab" aria-label="Open in new tab">↗ New Tab</button>`;

      return `<div class="panel-header file-header">` +
        `<div class="file-title">` +
        `<a href="${ escapeHTML( githubUrl ) }" target="_blank" rel="noopener" title="View on GitHub" aria-label="View this file on GitHub">${ GITHUB_SVG_ICON }</a>` +
        `<span id="breadcrumbs">${ breadcrumbHtml }</span>` +
        `</div>` +
        `<div class="file-actions">${ actionsHtml }</div>` +
        `</div>`;
    };

    /* ── 33. Content rendering helpers ── */

    const renderMarkdown = async ( text, filePath, signal ) => {
      const ext = filePath.split( '.' ).pop().toLowerCase();
      const preferredView = getPreferredView( ext );
      let renderedHtml;
      let errorHtml = '';

      try {
        renderedHtml = DOMPurify.sanitize( marked.parse( text ) );
      } catch ( err ) {
        errorHtml = `<div class="md-error">⚠️ Markdown rendering failed: ${ escapeHTML( err.message ) }</div>`;
        renderedHtml = '';
      }

      const renderedDisplay = preferredView === 'rendered' ? '' : 'display:none';
      const rawDisplay = preferredView === 'raw' ? '' : 'display:none';

      document.getElementById( 'contentBody' ).innerHTML =
        errorHtml +
        `<div class="markdown-body" id="viewRendered" style="${ renderedDisplay }">${ renderedHtml }</div>` +
        `<pre id="viewRaw" style="${ rawDisplay }">${ escapeHTML( text ) }</pre>`;

      // Rewrite links inside .markdown-body
      const mdBody = document.getElementById( 'viewRendered' );
      if ( mdBody ) {
        const currentDir = filePath.includes( '/' ) ? filePath.substring( 0, filePath.lastIndexOf( '/' ) ) : '';

        mdBody.querySelectorAll( 'a[href]' ).forEach( ( a ) => {
          const href = a.getAttribute( 'href' );
          if ( !href ) return;

          // Anchor links — leave as-is
          if ( href.startsWith( '#' ) ) return;

          // Strip fragment before path resolution (in-page anchors not supported in this viewer)
          const fragIdx = href.indexOf( '#' );
          const hrefPath = fragIdx >= 0 ? href.slice( 0, fragIdx ) : href;
          if ( !hrefPath ) return;

          // GitHub blob links — rewrite only when owner/repo/branch all match the current view
          const blobMatch = hrefPath.match( /github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/ );
          if (
            blobMatch &&
            blobMatch[ 1 ] === state.owner &&
            blobMatch[ 2 ] === state.repo &&
            blobMatch[ 3 ] === state.branch
          ) {
            a.removeAttribute( 'href' );
            a.style.cursor = 'pointer';
            a.style.color = 'var(--highlight-color)';
            a.addEventListener( 'click', ( e ) => { e.preventDefault(); selectFile( blobMatch[ 4 ] ); } );
            return;
          }

          // External links
          if ( hrefPath.startsWith( 'http://' ) || hrefPath.startsWith( 'https://' ) || hrefPath.startsWith( '//' ) ) {
            a.setAttribute( 'target', '_blank' );
            a.setAttribute( 'rel', 'noopener' );
            return;
          }

          // Relative paths — root-relative ('/foo') resolves from repo root, not currentDir
          const normalized = resolveRepoPath( hrefPath, currentDir );

          a.removeAttribute( 'href' );
          a.style.cursor = 'pointer';
          a.style.color = 'var(--highlight-color)';
          a.addEventListener( 'click', ( e ) => { e.preventDefault(); selectFile( normalized ); } );
        } );

        const images = Array.from( mdBody.querySelectorAll( 'img[src]' ) );
        await Promise.all( images.map( async ( img ) => {
          const src = img.getAttribute( 'src' );
          if ( !src ) return;

          if (
            src.startsWith( 'http://' ) ||
            src.startsWith( 'https://' ) ||
            src.startsWith( '//' ) ||
            src.startsWith( 'data:' ) ||
            src.startsWith( 'blob:' )
          ) {
            return;
          }

          const fragIdx = src.indexOf( '#' );
          const srcPath = fragIdx >= 0 ? src.slice( 0, fragIdx ) : src;
          if ( !srcPath ) return;

          const normalized = resolveRepoPath( srcPath, currentDir );
          const resolvedSrc = await resolveMediaUrl( normalized, signal );
          img.setAttribute( 'src', resolvedSrc );
          img.setAttribute( 'loading', 'lazy' );
        } ) );
      }
    };

    const renderCode = ( text, ext ) => {
      const skipHighlight = text.length > 500 * 1024;
      const code = document.createElement( 'code' );
      code.textContent = text;
      if ( !skipHighlight ) {
        try { hljs.highlightElement( code ); } catch ( _ ) { /* fallback plain */ }
      }
      const pre = document.createElement( 'pre' );
      pre.appendChild( code );
      const body = document.getElementById( 'contentBody' );
      body.innerHTML = '';
      body.appendChild( pre );
    };

    const renderHtml = ( text, filePath, ext ) => {
      const preferredView = getPreferredView( ext );
      const blob = new Blob( [ text ], { type: 'text/html' } );
      const url = createBlobUrl( blob );

      const renderedDisplay = preferredView === 'rendered' ? '' : 'display:none';
      const rawDisplay = preferredView === 'raw' ? '' : 'display:none';

      document.getElementById( 'contentBody' ).innerHTML =
        `<div id="viewRendered" style="${ renderedDisplay }"><iframe class="iframe-content" sandbox src="${ escapeHTML( url ) }"></iframe></div>` +
        `<pre id="viewRaw" style="${ rawDisplay }">${ escapeHTML( text ) }</pre>`;
    };

    const renderImage = ( url, alt ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( alt ) }">`;
    };

    const renderSvg = ( text, fileName = 'SVG image' ) => {
      const preferredView = getPreferredView( 'svg' );
      const blob = new Blob( [ text ], { type: 'image/svg+xml' } );
      const url = createBlobUrl( blob );

      const renderedDisplay = preferredView === 'rendered' ? '' : 'display:none';
      const rawDisplay = preferredView === 'raw' ? '' : 'display:none';

      document.getElementById( 'contentBody' ).innerHTML =
        `<div id="viewRendered" style="${ renderedDisplay }"><img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( fileName ) }"></div>` +
        `<pre id="viewRaw" style="${ rawDisplay }">${ escapeHTML( text ) }</pre>`;
    };

    const renderAudio = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<audio controls class="media-content" src="${ escapeHTML( url ) }">Your browser does not support audio.</audio>`;
    };

    const renderVideo = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<video controls class="media-content" src="${ escapeHTML( url ) }">Your browser does not support video.</video>`;
    };

    const renderPdf = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<iframe class="iframe-content" src="${ escapeHTML( url ) }"></iframe>`;
    };

    const renderSpreadsheet = async ( data ) => {
      try {
        const workbook = XLSX.read( data, { type: 'array' } );
        let html = '';
        for ( const sheetName of workbook.SheetNames ) {
          const sheetHtml = XLSX.utils.sheet_to_html( workbook.Sheets[ sheetName ] );
          html += `<div class="xlsx-sheet"><h3>${ escapeHTML( sheetName ) }</h3>${ sheetHtml }</div>`;
        }
        document.getElementById( 'contentBody' ).innerHTML = DOMPurify.sanitize( html );
      } catch ( err ) {
        document.getElementById( 'contentBody' ).innerHTML =
          `<p style="color: red;">Failed to parse spreadsheet: ${ escapeHTML( err.message ) }</p>`;
      }
    };

    /* ── 33b. Local-first helpers ── */
    const localUrlFor = ( path ) => {
      if ( !state.localMode || state.localBase === null ) return null;
      return state.localBase + encodePath( path );
    };

    const probeLocalMode = async ( signal ) => {
      if ( !state.tree ) return;

      // Pick a small text-ish file to probe. Skip binaries to keep the test cheap.
      const probe = state.tree.find( ( item ) =>
        item.type === 'blob' &&
        item.size && item.size > 0 && item.size < 20000 &&
        /\.(md|txt|json|js|mjs|cjs|ts|tsx|html|htm|css|yml|yaml|toml|xml|csv)$/i.test( item.path )
      );
      if ( !probe ) return;

      const candidateBases = state.localBase !== null
        ? [ state.localBase ]
        : [ '', '../', '../../', '../../../', '../../../../' ];

      for ( const base of candidateBases ) {
        try {
          const url = base + encodePath( probe.path );
          const res = await fetch( url, { signal } );
          if ( !res.ok ) continue;
          const text = await res.text();
          if ( text.length > 0 ) {
            state.localBase = base;
            state.localMode = true;
            return;
          }
        } catch ( err ) {
          if ( err?.name === 'AbortError' ) return;
          /* try next */
        }
      }
    };

    /* ── 34. fetchFileText — text content fetch ── */
    const fetchFileText = async ( path, signal ) => {
      // Local-first: bypass cache so uncommitted edits show immediately
      const localUrl = localUrlFor( path );
      if ( localUrl ) {
        try {
          const res = await fetch( localUrl, { signal } );
          if ( res.ok ) return await res.text();
        } catch ( err ) {
          if ( err.name === 'AbortError' ) throw err;
          /* fall through to GitHub */
        }
      }

      const cached = getCachedFileText( path );
      if ( cached !== null ) return cached;

      let text;
      const token = getToken();

      if ( token ) {
        const headers = { ...getAuthHeaders(), Accept: 'application/vnd.github.raw+json' };
        const res = await fetch( contentsApiUrl( path ), { headers, signal } );
        updateRateBadge( res );
        if ( res.status === 403 ) throw new Error( RATE_LIMIT_MESSAGE );
        if ( !res.ok ) throw new Error( `Failed to fetch file: ${ res.status }` );
        text = await res.text();
      } else {
        const res = await fetch( rawUrl( path ), { signal } );
        if ( !res.ok ) throw new Error( `Failed to fetch file: ${ res.status }` );
        text = await res.text();
      }

      setCachedFileText( path, text );
      return text;
    };

    /* ── 35. fetchFileBlob — binary content fetch ── */
    const fetchFileBlob = async ( path, signal, mimeType ) => {
      // Local-first
      const localUrl = localUrlFor( path );
      if ( localUrl ) {
        try {
          const res = await fetch( localUrl, { signal } );
          if ( res.ok ) {
            let blob = await res.blob();
            if ( mimeType ) blob = new Blob( [ blob ], { type: mimeType } );
