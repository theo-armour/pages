            return createBlobUrl( blob );
          }
        } catch ( err ) {
          if ( err.name === 'AbortError' ) throw err;
          /* fall through to GitHub */
        }
      }

      const token = getToken();
      let blob;

      if ( token ) {
        const headers = { ...getAuthHeaders(), Accept: 'application/vnd.github.raw+json' };
        const res = await fetch( contentsApiUrl( path ), { headers, signal } );
        updateRateBadge( res );
        if ( res.status === 403 ) throw new Error( RATE_LIMIT_MESSAGE );
        if ( !res.ok ) throw new Error( `Failed to fetch file: ${ res.status }` );
        blob = await res.blob();
      } else {
        const res = await fetch( rawUrl( path ), { signal } );
        if ( !res.ok ) throw new Error( `Failed to fetch file: ${ res.status }` );
        blob = await res.blob();
      }

      if ( mimeType ) {
        blob = new Blob( [ blob ], { type: mimeType } );
      }

      return createBlobUrl( blob );
    };

    const resolveMediaUrl = async ( path, signal ) => {
      const localUrl = localUrlFor( path );
      if ( localUrl ) return localUrl;
      if ( getToken() ) return await fetchFileBlob( path, signal );
      return rawUrl( path );
    };

    /* ── 36. selectFile — main function ── */
    let lastRawText = '';

    const selectFile = async ( path, { skipHash = false } = {} ) => {
      // Abort in-flight
      if ( currentAbortController ) currentAbortController.abort();
      currentAbortController = new AbortController();
      const signal = currentAbortController.signal;

      // Revoke old blob URLs
      revokeAllBlobUrls();
      lastRawText = '';

      // Look up file in tree
      const treeItem = state.tree?.find( ( item ) => item.path === path && item.type === 'blob' );
      const fileSize = treeItem?.size || 0;
      const ext = path.includes( '.' ) ? path.split( '.' ).pop().toLowerCase() : '';
      const isStreamable = STREAMABLE_EXTS.includes( ext );

      // Large file protection
      if ( fileSize > LARGE_FILE_WARNING_BYTES && !isStreamable && !approvedLargeFiles.has( path ) ) {
        const sizeMB = ( fileSize / ( 1024 * 1024 ) ).toFixed( 1 );
        if ( !window.confirm( `This file is ${ sizeMB } MB. Load anyway?` ) ) return;
        approvedLargeFiles.add( path );
      }

      // Update active tree item — open parent folders, highlight, focus, scroll into view
      const prevActive = document.querySelector( '.tree-item.active' );
      if ( prevActive ) prevActive.classList.remove( 'active' );
      const treeEl = document.querySelector( `[data-action="select-file"][data-path="${ CSS.escape( path ) }"]` );
      if ( treeEl ) {
        // Open all ancestor <details> so the item is visible
        let ancestor = treeEl.closest( 'details' );
        while ( ancestor ) {
          ancestor.open = true;
          ancestor = ancestor.parentElement?.closest( 'details' );
        }
        treeEl.classList.add( 'active' );
        treeEl.scrollIntoView( { block: 'center', behavior: 'auto' } );
        treeEl.focus();
      }

      state.currentFilePath = path;

      // Build file header
      const contentArea = document.getElementById( 'contentArea' );
      const existingHeader = contentArea.querySelector( '.panel-header.file-header' );
      const newHeader = document.createElement( 'div' );
      newHeader.innerHTML = buildFileHeader( path, ext );
      const headerEl = newHeader.firstElementChild;
      if ( existingHeader ) {
        existingHeader.replaceWith( headerEl );
      } else {
        contentArea.insertBefore( headerEl, document.getElementById( 'contentBody' ) );
      }

      // Show loading
      document.getElementById( 'contentBody' ).innerHTML = '<p>Loading…</p>';

      try {
        // Render by type
        if ( ext === 'md' ) {
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          await renderMarkdown( text, path, signal );

        } else if ( ext === 'html' || ext === 'htm' ) {
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          renderHtml( text, path, ext );

        } else if ( ext === 'svg' ) {
          // Always blob-fetch for rendering, but also get text for raw toggle
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          renderSvg( text, path.split( '/' ).pop() );

        } else if ( IMAGE_EXTS.includes( ext ) && ext !== 'svg' ) {
          const url = await resolveMediaUrl( path, signal );
          renderImage( url, path.split( '/' ).pop() );

        } else if ( AUDIO_EXTS.includes( ext ) ) {
          const url = await resolveMediaUrl( path, signal );
          renderAudio( url );

        } else if ( VIDEO_EXTS.includes( ext ) ) {
          const url = await resolveMediaUrl( path, signal );
          renderVideo( url );

        } else if ( ext === 'pdf' ) {
          const url = await fetchFileBlob( path, signal, 'application/pdf' );
          renderPdf( url );

        } else if ( SHEET_EXTS.includes( ext ) ) {
          const blobUrl = await fetchFileBlob( path, signal );
          const res = await fetch( blobUrl );
          const arrayBuf = await res.arrayBuffer();
          await renderSpreadsheet( new Uint8Array( arrayBuf ) );

        } else {
          // Code / text / everything else
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          renderCode( text, ext );
        }
      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;
        if ( err.message === RATE_LIMIT_MESSAGE ) {
          showTokenPanel( RATE_LIMIT_REASON_HTML );
          return;
        }
        document.getElementById( 'contentBody' ).innerHTML =
          `<p style="color: red;">${ escapeHTML( err.message ) }</p>`;
      }

      // Update hash
      if ( !skipHash ) {
        updateHash( path );
      }

      // Save last file path
      localStorage.setItem( getCurrentFileKey(), path );
      try { localStorage.removeItem( storageKey( 'currentFile' ) ); } catch ( _ ) { /* storage disabled */ }

      // Scroll content area to top
      contentArea.scrollTo( { top: 0 } );
    };

    /* ── 37. setupContentActions — breadcrumb delegation, Copy, New Tab, view toggle ── */
    const setupContentActions = () => {
      const contentArea = document.getElementById( 'contentArea' );

      contentArea.addEventListener( 'click', async ( e ) => {
        // Breadcrumb: scroll to folder
        const folderLink = e.target.closest( '[data-action="scroll-folder"]' );
        if ( folderLink ) { e.preventDefault(); scrollToTreeFolder( folderLink.dataset.folder ); return; }

        // View toggle: rendered
        const renderedBtn = e.target.closest( '[data-action="view-rendered"]' );
        if ( renderedBtn ) {
          const viewRendered = document.getElementById( 'viewRendered' );
          const viewRaw = document.getElementById( 'viewRaw' );
          if ( viewRendered ) viewRendered.style.display = '';
          if ( viewRaw ) viewRaw.style.display = 'none';
          renderedBtn.setAttribute( 'aria-pressed', 'true' );
          const rawBtn = contentArea.querySelector( '[data-action="view-raw"]' );
          if ( rawBtn ) rawBtn.setAttribute( 'aria-pressed', 'false' );
          const ext = state.currentFilePath.split( '.' ).pop().toLowerCase();
          setPreferredView( ext, 'rendered' );
          return;
        }

        // View toggle: raw
        const rawBtn = e.target.closest( '[data-action="view-raw"]' );
        if ( rawBtn ) {
          const viewRendered = document.getElementById( 'viewRendered' );
          const viewRaw = document.getElementById( 'viewRaw' );
          if ( viewRendered ) viewRendered.style.display = 'none';
          if ( viewRaw ) viewRaw.style.display = '';
          rawBtn.setAttribute( 'aria-pressed', 'true' );
          const rendBtn = contentArea.querySelector( '[data-action="view-rendered"]' );
          if ( rendBtn ) rendBtn.setAttribute( 'aria-pressed', 'false' );
          const ext = state.currentFilePath.split( '.' ).pop().toLowerCase();
          setPreferredView( ext, 'raw' );
          return;
        }

        // Copy
        const copyBtn = e.target.closest( '[data-action="copy-file"]' );
        if ( copyBtn && lastRawText ) {
          try {
            await navigator.clipboard.writeText( lastRawText );
            const origText = copyBtn.textContent;
            copyBtn.textContent = '✓ Copied';
            setTimeout( () => { copyBtn.textContent = origText; }, 1500 );
          } catch ( _ ) { /* clipboard blocked */ }
          return;
        }

        // New Tab
        const newTabBtn = e.target.closest( '[data-action="new-tab"]' );
        if ( newTabBtn ) {
          const filePath = newTabBtn.dataset.path;
          const url = await getNewTabUrl( filePath );
          window.open( url, '_blank', 'noopener' );
          return;
        }
      } );
    };

    /* ── 38. Global error handlers ── */
    window.addEventListener( 'error', ( event ) => {
      const panel = document.createElement( 'div' );
      panel.className = 'error-panel';
      panel.innerHTML = `<p>⚠️ Error: ${ escapeHTML( event.message || 'Unknown error' ) }</p><button onclick="location.reload()" title="Reload page">Reload</button>`;
      document.body.appendChild( panel );
    } );

    window.addEventListener( 'unhandledrejection', ( event ) => {
      const panel = document.createElement( 'div' );
      panel.className = 'error-panel';
      panel.innerHTML = `<p>⚠️ Unhandled error: ${ escapeHTML( event.reason?.message || String( event.reason ) || 'Unknown' ) }</p><button onclick="location.reload()" title="Reload page">Reload</button>`;
      document.body.appendChild( panel );
    } );

    /* ── 39. init ── */
    const init = async () => {
      // Sync Files-panel tooltip with the meta revised marker
      const revised = document.querySelector( 'meta[name="revised"]' )?.content || 'unknown';
      document.getElementById( 'filesPanelHeader' ).title = `Last updated: ${ revised }`;

      // Migrate any legacy tootoo-lt:* keys before reading appearance/state
      migrateStorageKeys();

      // Brand the page from APP_ORIGIN (where this app instance is hosted).
      // Header is independent of which repo gets browsed, so do this once
      // up front and it stays correct for the whole session.
      await detectAppOrigin();
      updateHeaderFromConfig();

      initAppearance();
      setupListeners();
      setupExpandAll();
      setupKeyboardNav();
      setupFileSelection();
      setupContentActions();
      restoreFileCache();

      window.addEventListener( 'popstate', handleHashChange );
      window.addEventListener( 'hashchange', handleHashChange );

      await detectRepo();

      state.owner = CONFIG.owner;
      state.repo = CONFIG.repo;
      state.branch = CONFIG.branch;

      if ( state.owner && state.repo ) {
        updateHeaderFromConfig();
        document.getElementById( 'contentBody' ).innerHTML = '<p>Loading tree…</p>';
        await fetchTree();
        document.getElementById( 'btnExpandAll' ).style.display = '';

        // Probe for local file access; enables fetching uncommitted edits
        await probeLocalMode( currentAbortController?.signal );

        // File open priority
        if ( location.hash.length > 1 ) {
          await handleHashChange();
        } else {
          const currentFileKey = getCurrentFileKey();
          const lastPath = localStorage.getItem( currentFileKey );
          const lastPathExists = lastPath && state.tree?.some( ( item ) => item.path === lastPath && item.type === 'blob' );

          if ( lastPathExists ) {
            await selectFile( lastPath, { skipHash: false } );
          } else {
            if ( lastPath ) {
              try { localStorage.removeItem( currentFileKey ); } catch ( _ ) { /* storage disabled */ }
            }
            autoSelectReadme();
          }
        }

        // Fallback focus: if no file was selected, focus the first visible tree item
        if ( !document.querySelector( '.tree-item.active' ) ) {
          const first = document.querySelector( '#treeList .tree-item, #treeList .tree-folder' );
          if ( first ) first.focus();
        }
      }
    };

    init();
  </script>
</body>

</html>
