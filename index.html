        resizer.classList.add( 'dragging' );
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
      } );

      resizer.addEventListener( 'pointermove', ( e ) => {
        if ( !resizer.hasPointerCapture( e.pointerId ) ) return;
        const newWidth = Math.min( Math.max( e.clientX, 100 ), window.innerWidth - 100 );
        document.documentElement.style.setProperty( '--sidebar-width', newWidth + 'px' );
      } );

      resizer.addEventListener( 'pointerup', ( e ) => {
        if ( !isResizing ) return;
        isResizing = false;
        resizer.releasePointerCapture( e.pointerId );
        resizer.classList.remove( 'dragging' );
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        const currentWidth = getComputedStyle( document.documentElement ).getPropertyValue( '--sidebar-width' ).trim();
        localStorage.setItem( storageKey( 'sidebarWidth' ), currentWidth );
      } );

      // Filter input (debounced)
      const debouncedFilter = debounce( runFilter, 150 );
      document.getElementById( 'treeFilter' ).addEventListener( 'input', debouncedFilter );

      document.getElementById( 'btnFilterClear' ).addEventListener( 'click', () => {
        document.getElementById( 'treeFilter' ).value = '';
        document.getElementById( 'btnFilterClear' ).style.display = 'none';
        runFilter();
        document.getElementById( 'treeFilter' ).focus();
      } );

      // Esc clears filter when focused; "/" focuses filter from anywhere
      document.getElementById( 'treeFilter' ).addEventListener( 'keydown', ( e ) => {
        if ( e.key === 'Escape' ) {
          e.target.value = '';
          document.getElementById( 'btnFilterClear' ).style.display = 'none';
          runFilter();
          e.target.blur();
        }
      } );

      // Back to top
      const btnBackToTop = document.getElementById( 'btnBackToTop' );

      contentArea.addEventListener( 'scroll', () => {
        btnBackToTop.style.display = contentArea.scrollTop > 400 ? 'flex' : 'none';
      } );

      btnBackToTop.addEventListener( 'click', () => {
        const reduce = window.matchMedia( '(prefers-reduced-motion: reduce)' ).matches;
        contentArea.scrollTo( { top: 0, behavior: reduce ? 'auto' : 'smooth' } );
      } );

      // Sidebar footer: favicon doubles as a "scroll tree to top" button.
      const footerIcon = document.querySelector( '#btnScrollTreeTop img' );
      const faviconHref = document.querySelector( 'link[rel="icon"]' )?.href;
      if ( footerIcon && faviconHref ) footerIcon.src = faviconHref;

      document.getElementById( 'btnScrollTreeTop' ).addEventListener( 'click', () => {
        const reduce = window.matchMedia( '(prefers-reduced-motion: reduce)' ).matches;
        document.getElementById( 'treeList' ).scrollTo( { top: 0, behavior: reduce ? 'auto' : 'smooth' } );
      } );

      // Header title click — reset to the original repo: clear hash, query
      // overrides, cached repo, and last-file preference, then reload.
      document.getElementById( 'headerTitle' ).addEventListener( 'click', ( e ) => {
        e.preventDefault();
        clearCurrentFilePreference();
        try { localStorage.removeItem( storageKey( 'repo' ) ); } catch ( _ ) { /* storage disabled */ }
        const cleanUrl = location.pathname;
        if ( location.search || location.hash ) {
          location.replace( cleanUrl );
        } else {
          location.reload();
        }
      } );
    };

    /* ── 14. GitHub API helpers ── */

    const getToken = () => localStorage.getItem( tokenStorageKey() ) || '';

    const getAuthHeaders = () => {
      const headers = { Accept: 'application/vnd.github+json' };
      const token = getToken();
      if ( token ) headers.Authorization = `token ${ token }`;
      return headers;
    };

    const updateRateBadge = ( response ) => {
      const remaining = response.headers.get( 'X-RateLimit-Remaining' );
      const limit = response.headers.get( 'X-RateLimit-Limit' );
      if ( remaining !== null && limit !== null ) {
        const n = parseInt( remaining, 10 );
        // The live count lives in the ⚙️ button's tooltip; the standalone badge
        // only surfaces as a warning when the quota runs low (≤30) / critical (≤10).
        const tokenBtn = document.getElementById( 'btnToken' );
        if ( tokenBtn ) tokenBtn.title = `${ remaining }/${ limit } GitHub API requests left this hour — click to set a token`;
        const badge = document.getElementById( 'rateBadge' );
        badge.textContent = `${ remaining }/${ limit }`;
        badge.classList.toggle( 'critical', n <= 10 );
        badge.classList.toggle( 'low', n > 10 && n <= 30 );
        badge.style.display = n <= 30 ? 'inline' : 'none';
      }
    };

    let currentAbortController = null;

    /* ── 15. File type icons ── */
    const getFileIcon = ( fileName ) => {
      const ext = fileName.includes( '.' ) ? '.' + fileName.split( '.' ).pop().toLowerCase() : '';
      const iconMap = {
        '.md': '📝',
        '.js': '🟨', '.mjs': '🟨', '.cjs': '🟨',
        '.ts': '🟦', '.tsx': '🟦',
        '.py': '🐍',
        '.html': '🌐', '.htm': '🌐',
        '.css': '🎨', '.scss': '🎨', '.less': '🎨',
        '.png': '🖼️', '.jpg': '🖼️', '.jpeg': '🖼️', '.gif': '🖼️', '.webp': '🖼️', '.svg': '🖼️', '.ico': '🖼️',
        '.mp3': '🎵', '.wav': '🎵', '.ogg': '🎵',
        '.mp4': '🎬', '.webm': '🎬',
        '.pdf': '📕',
        '.xlsx': '📊', '.xls': '📊', '.csv': '📊', '.ods': '📊',
        '.yaml': '⚙️', '.yml': '⚙️', '.toml': '⚙️',
        '.zip': '📦', '.tar': '📦', '.gz': '📦', '.7z': '📦',
        '.json': '{ }',
      };
      return iconMap[ ext ] || '📄';
    };

    /* ── 16. File size formatting ── */
    const formatFileSize = ( bytes ) => {
      if ( bytes == null ) return '';
      if ( bytes < 1024 ) return `${ bytes } B`;
      if ( bytes < 1024 * 1024 ) return `${ ( bytes / 1024 ).toFixed( 1 ) } KB`;
      return `${ ( bytes / ( 1024 * 1024 ) ).toFixed( 1 ) } MB`;
    };

    /* ── 17. Repository statistics ── */
    const getRepoStats = () => {
      if ( !state.tree ) return null;
      const blobs = state.tree.filter( ( i ) => i.type === 'blob' );
      const trees = state.tree.filter( ( i ) => i.type === 'tree' );
      const totalSize = blobs.reduce( ( sum, i ) => sum + ( i.size || 0 ), 0 );

      // Count by extension
      const extCounts = {};
      for ( const b of blobs ) {
        const name = b.path.split( '/' ).pop();
        const ext = name.includes( '.' ) ? '.' + name.split( '.' ).pop().toLowerCase() : '(no ext)';
        extCounts[ ext ] = ( extCounts[ ext ] || 0 ) + 1;
      }
      const topTypes = Object.entries( extCounts )
        .sort( ( a, b ) => b[ 1 ] - a[ 1 ] )
        .slice( 0, 10 );

      // Largest files
      const largest = [ ...blobs ]
        .sort( ( a, b ) => ( b.size || 0 ) - ( a.size || 0 ) )
        .slice( 0, 5 );

      return { fileCount: blobs.length, folderCount: trees.length, totalSize, topTypes, largest };
    };

    /* ── 18. Build nested tree structure ── */
    const buildNestedTree = ( flatTree ) => {
      const root = { children: {} };
      const hidFolders = hiddenFolderSet();
      const hidFiles = hiddenFileSet();
      for ( const item of flatTree ) {
        if ( !isVisibleTreeItem( item, hidFolders, hidFiles ) ) continue;
        const parts = item.path.split( '/' );
        let current = root;
        for ( let i = 0; i < parts.length; i++ ) {
          const part = parts[ i ];
          if ( !current.children[ part ] ) {
            current.children[ part ] = { children: {}, type: null, size: null, path: null };
          }
          if ( i === parts.length - 1 ) {
            current.children[ part ].type = item.type;
            current.children[ part ].size = item.size;
            current.children[ part ].path = item.path;
          }
          current = current.children[ part ];
        }
      }
      return root;
    };

    /* ── 19. Sort tree children: folders first, then alphabetical ── */
    const sortedEntries = ( children ) =>
      Object.entries( children ).sort( ( [ aName, aNode ], [ bName, bNode ] ) => {
        const aIsFolder = aNode.type === 'tree' || Object.keys( aNode.children ).length > 0;
        const bIsFolder = bNode.type === 'tree' || Object.keys( bNode.children ).length > 0;
        if ( aIsFolder && !bIsFolder ) return -1;
        if ( !aIsFolder && bIsFolder ) return 1;
        return aName.toLowerCase().localeCompare( bName.toLowerCase() );
      } );

    /* ── 20. Generate HTML for a tree node ── */
    const renderNode = ( name, node, parentPath ) => {
      const fullPath = parentPath ? `${ parentPath }/${ name }` : name;
      const isFolder = node.type === 'tree' || Object.keys( node.children ).length > 0;
      const displayName = displayTreeName( name );

      if ( isFolder ) {
        const childrenHtml = sortedEntries( node.children )
          .map( ( [ childName, childNode ] ) => renderNode( childName, childNode, fullPath ) )
          .join( '' );

        return `<details data-folder-path="${ escapeHTML( fullPath ) }">` +
          `<summary class="tree-folder" tabindex="0" title="${ escapeHTML( fullPath ) }">` +
          `<span aria-hidden="true">📁</span> <span class="folder-name">${ escapeHTML( displayName ) }</span>` +
          `</summary>` +
          childrenHtml +
          `</details>`;
      }

      const icon = getFileIcon( name );
      const sizeStr = formatFileSize( node.size );
      const isReadme = /^readme/i.test( name );
      const nameHtml = isReadme
        ? `<strong>${ escapeHTML( displayName ) }</strong>`
        : escapeHTML( displayName );
      // Parent folder as a breadcrumb caption — shown only while filtering, so
      // the flat results list tells you where each matching file lives.
      const folderDisplay = parentPath
        ? parentPath.split( '/' ).map( displayTreeName ).join( ' / ' )
        : '';
      const folderHtml = folderDisplay
        ? `<span class="tree-item-folder">${ escapeHTML( folderDisplay ) }</span>`
        : '';

      return `<div class="tree-item" role="button" tabindex="0" data-action="select-file" data-path="${ escapeHTML( fullPath ) }" title="${ escapeHTML( fullPath ) }">` +
        `<span class="tree-item-name"><span aria-hidden="true">${ icon }</span> ${ nameHtml }</span>` +
        `<span class="tree-item-size">${ sizeStr }</span>` +
        folderHtml +
        `</div>`;
    };

    /* ── 21. renderTree — batched rendering ── */
    /* The ⊞/⊟ Expand-all button reflects the tree's current state. A fresh
       render collapses every folder, so renderTree resets it to ⊞ — otherwise
       the state would go stale after a branch switch and need a double-click. */
    const setExpandAllButton = ( expanded ) => {
      const btn = document.getElementById( 'btnExpandAll' );
      if ( !btn ) return;
      btn.textContent = expanded ? '⊟' : '⊞';
      const label = expanded ? 'Collapse all folders' : 'Expand all folders';
      btn.title = label;
      btn.setAttribute( 'aria-label', label );
    };

    const renderTree = ( treeArray ) => {
      const treeList = document.getElementById( 'treeList' );
      treeList.innerHTML = '';
      preFilterOpenState = null;
      setExpandAllButton( false );

      const nested = buildNestedTree( treeArray );
      const rootEntries = sortedEntries( nested.children );
      const batchSize = 120;
      const total = rootEntries.length;
      let rendered = 0;

      const statusEl = document.createElement( 'div' );
      statusEl.id = 'treeRenderStatus';
      statusEl.style.cssText = 'font-size: 0.85rem; color: var(--text-color); opacity: 0.7; padding: 0.3rem 0.5rem;';
      treeList.appendChild( statusEl );

      return new Promise( ( resolve ) => {
        const renderBatch = () => {
          const end = Math.min( rendered + batchSize, total );
          let html = '';
          for ( let i = rendered; i < end; i++ ) {
            const [ name, node ] = rootEntries[ i ];
            html += renderNode( name, node, '' );
          }
          const fragment = document.createElement( 'div' );
          fragment.innerHTML = html;
          while ( fragment.firstChild ) {
            treeList.insertBefore( fragment.firstChild, statusEl );
          }
          rendered = end;
          const pct = Math.round( ( rendered / total ) * 100 );
          statusEl.textContent = `${ pct }% rendered…`;
          if ( rendered < total ) {
            setTimeout( renderBatch, 0 );
          } else {
            statusEl.remove();
            refreshTreeCache();
            resolve();
          }
        };

        if ( total === 0 ) {
          statusEl.remove();
          refreshTreeCache();
          resolve();
        } else {
          renderBatch();
        }
      } );
    };

    /* ── 21b. Oversized-repo panel ── bail out (and link to github.com) for
       repos past CONFIG.maxRepoFiles or a truncated tree response. */
    const showOversizedRepoPanel = ( count, truncated ) => {
      const repoUrl = `https://github.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }`;
      const countLabel = truncated
        ? `over ${ count.toLocaleString() } files (GitHub truncated the tree response)`
        : `${ count.toLocaleString() } files`;

      document.getElementById( 'treeList' ).innerHTML =
        `<div style="padding: 0.6rem 0.5rem; font-size: 0.85rem; opacity: 0.8;">Repository too large to browse here.</div>`;

      const cb = document.getElementById( 'contentBody' );
      cb.innerHTML = `
        <div class="error-panel">
          <h3 style="margin-top: 0;">Repository too large for ${ escapeHTML( CONFIG.appName ) }</h3>
          <p><strong>${ escapeHTML( state.owner ) }/${ escapeHTML( state.repo ) }</strong> contains ${ escapeHTML( countLabel ) }. ${ escapeHTML( CONFIG.appName ) } is built for small-to-medium personal repositories; larger trees overwhelm the sidebar render and the per-keystroke filter.</p>
          <p><a href="${ escapeHTML( repoUrl ) }" target="_blank" rel="noopener">Browse this repository on github.com →</a></p>
          <p style="font-size: 0.85rem; opacity: 0.75; margin-bottom: 0;">If you maintain a fork, raise <code>CONFIG.maxRepoFiles</code> (currently ${ CONFIG.maxRepoFiles.toLocaleString() }) to override this cutoff. Truncated trees cannot be overridden — that is a GitHub API response limit.</p>
        </div>
      `;
    };

    /* ── 22. fetchTree ── */
    // Tree-load auth handler: on 403/404 show the token panel and return true
    // (caller bails); false otherwise so the caller proceeds.
    const handleTreeAuthError = ( res, treeList ) => {
      if ( res.status === 403 ) {
        treeList.innerHTML = `<p style="color: red;">${ escapeHTML( RATE_LIMIT_MESSAGE ) }</p>`;
        showTokenPanel( RATE_LIMIT_REASON_HTML );
        return true;
      }
      if ( res.status === 404 ) {
        treeList.innerHTML = `<p style="color: red;">${ escapeHTML( PRIVATE_REPO_MESSAGE ) }</p>`;
        showTokenPanel( privateRepoReasonHtml() );
        return true;
      }
      return false;
    };

    const fetchTree = async () => {
      if ( currentAbortController ) currentAbortController.abort();
      currentAbortController = new AbortController();
      const signal = currentAbortController.signal;

      const treeList = document.getElementById( 'treeList' );
      const headers = getAuthHeaders();

      try {
        if ( !state.branch ) {
          const repoRes = await fetch(
            `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }`,
            { headers, signal }
          );
          updateRateBadge( repoRes );
          if ( handleTreeAuthError( repoRes, treeList ) ) return;
          if ( !repoRes.ok ) throw new Error( `Failed to fetch repo info: ${ repoRes.status }` );
          const repoData = await repoRes.json();
          state.branch = repoData.default_branch;
          localStorage.setItem( storageKey( 'repo' ), JSON.stringify( {
            owner: state.owner, repo: state.repo, branch: state.branch,
          } ) );
        }

        updateBranchControl();

        treeList.innerHTML = '<p>Loading tree…</p>';

        const treeRes = await fetch(
          `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/git/trees/${ encodeURIComponent( state.branch ) }?recursive=1`,
          { headers, signal }
        );
        updateRateBadge( treeRes );

        if ( handleTreeAuthError( treeRes, treeList ) ) return;
        if ( !treeRes.ok ) throw new Error( `Failed to fetch tree: ${ treeRes.status }` );

        const treeData = await treeRes.json();
        const treeCount = treeData.tree?.length || 0;
        const tooLarge = treeData.truncated || treeCount > CONFIG.maxRepoFiles;

        if ( tooLarge ) {
          state.tree = null;
          state.oversized = true;
          showOversizedRepoPanel( treeCount, treeData.truncated );
          return;
        }

        state.tree = treeData.tree;
        await renderTree( state.tree );

        // Summarize the visible tree in the sidebar header: folders · files ·
        // total size, using the shared isVisibleTreeItem rule so the counts
        // always match what buildNestedTree actually renders.
        const hidFolders = hiddenFolderSet();
        const hidFiles = hiddenFileSet();
        const visibleItems = state.tree.filter( ( item ) => isVisibleTreeItem( item, hidFolders, hidFiles ) );
        const folderCount = visibleItems.filter( ( i ) => i.type === 'tree' ).length;
        const fileCount = visibleItems.filter( ( i ) => i.type === 'blob' ).length;
        const totalBytes = visibleItems.reduce( ( sum, i ) => sum + ( i.type === 'blob' ? ( i.size || 0 ) : 0 ), 0 );
        const countLabel = ( n, word ) => `${ n.toLocaleString() } ${ word }${ n === 1 ? '' : 's' }`;
        const hFilesEl = document.getElementById( 'hFiles' );
        // 📁 folders · 📄 files · size — icons keep the summary compact; the
        // tooltip still spells the counts out in words.
        hFilesEl.textContent = `📁 ${ folderCount.toLocaleString() } · 📄 ${ fileCount.toLocaleString() } · ${ formatFileSize( totalBytes ) }`;
        hFilesEl.title = `${ countLabel( folderCount, 'folder' ) }, ${ countLabel( fileCount, 'file' ) }, ${ formatFileSize( totalBytes ) } total`;
        treeSummaryText = hFilesEl.textContent; // restored when the filter clears

      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;
        treeList.innerHTML = `<p style="color: red;">${ escapeHTML( err.message ) }</p>`;
      }
    };

    /* ── 23. Filter logic ── */
    let preFilterOpenState = null;
    // The Files-header summary text, captured after each tree load so the filter
    // can swap in a match count and restore the summary when it clears.
    let treeSummaryText = '';
    // Cached after each renderTree(); reused by every filter keystroke.
    let cachedTreeItems = [];
    let cachedTreeFolders = [];

    const refreshTreeCache = () => {
      const treeList = document.getElementById( 'treeList' );
      cachedTreeItems = Array.from( treeList.querySelectorAll( '.tree-item' ) );
      cachedTreeFolders = Array.from( treeList.querySelectorAll( 'details' ) );
    };

    const runFilter = () => {
      const treeList = document.getElementById( 'treeList' );
      const query = document.getElementById( 'treeFilter' ).value.trim().toLowerCase();
      const btnFilterClear = document.getElementById( 'btnFilterClear' );
      const normalizedQuery = query.replace( /[-\s]+/g, ' ' );

      btnFilterClear.style.display = query ? 'block' : 'none';

      const items = cachedTreeItems;
      const folders = cachedTreeFolders;

      if ( !query ) {
        treeList.classList.remove( 'filtering' );
        if ( treeSummaryText ) document.getElementById( 'hFiles' ).textContent = treeSummaryText;
        items.forEach( ( el ) => { el.classList.remove( 'is-hidden' ); } );
        folders.forEach( ( el ) => { el.classList.remove( 'is-hidden' ); } );
        if ( preFilterOpenState ) {
          folders.forEach( ( details ) => {
            const key = details.dataset.folderPath;
            if ( preFilterOpenState.has( key ) ) {
              details.open = preFilterOpenState.get( key );
            }
          } );
          preFilterOpenState = null;
        }
        return;
      }

      if ( preFilterOpenState === null ) {
        preFilterOpenState = new Map();
        folders.forEach( ( details ) => {
          const key = details.dataset.folderPath;
          preFilterOpenState.set( key, details.open );
        } );
      }

      // Match the file name only (not the full path), so results are the files
      // a user is looking for — not every file that merely sits under a folder
      // whose name matches.
      let matchCount = 0;
      items.forEach( ( el ) => {
        const name = ( el.dataset.path || '' ).split( '/' ).pop().toLowerCase();
        const normalizedName = name.replace( /[-\s]+/g, ' ' );
        const matches = name.includes( query ) || normalizedName.includes( normalizedQuery );
        el.classList.toggle( 'is-hidden', !matches );
        if ( matches ) matchCount++;
      } );

      const foldersArr = folders.slice().reverse();
      foldersArr.forEach( ( details ) => {
        const hasVisible = details.querySelector( '.tree-item:not(.is-hidden)' );
        if ( hasVisible ) {
          details.classList.remove( 'is-hidden' );
          details.open = true;
        } else {
          details.classList.add( 'is-hidden' );
        }
      } );

      treeList.classList.add( 'filtering' );
      document.getElementById( 'hFiles' ).textContent =
        `${ matchCount.toLocaleString() } match${ matchCount === 1 ? '' : 'es' }`;
    };

    /* ── 24. Debounce helper ── */
    const debounce = ( fn, ms ) => {
      let timer;
      return ( ...args ) => {
        clearTimeout( timer );
        timer = setTimeout( () => fn( ...args ), ms );
      };
    };

    /* ── 25. Expand All / Collapse All ── */
    const setupExpandAll = () => {
      const btn = document.getElementById( 'btnExpandAll' );

      btn.addEventListener( 'click', () => {
        const allDetails = document.getElementById( 'treeList' ).querySelectorAll( 'details' );
        // Derive intent from the current glyph (⊞ expand / ⊟ collapse) rather
        // than a stored flag, which would go stale when renderTree rebuilds the
        // collapsed tree (e.g. after a branch switch). The icon-only toggle also
        // never wraps the way the old "Collapse All" label did on a narrow sidebar.
        const expand = btn.textContent.trim() !== '⊟';
        allDetails.forEach( ( d ) => { d.open = expand; } );
        setExpandAllButton( expand );
      } );
    };

    /* ── 26. File selection (event delegation) — calls selectFile ── */
    const setupFileSelection = () => {
      document.getElementById( 'treeList' ).addEventListener( 'click', ( e ) => {
        const target = e.target.closest( '[data-action="select-file"]' );
        if ( !target ) return;
        selectFile( target.dataset.path );
      } );
    };

    /* ── 27. Keyboard navigation ── */
    const getVisibleTreeItems = () => {
      const treeList = document.getElementById( 'treeList' );
      const all = treeList.querySelectorAll( '.tree-folder, .tree-item' );
      const filtering = treeList.classList.contains( 'filtering' );
      return Array.from( all ).filter( ( el ) => {
        if ( el.classList.contains( 'is-hidden' ) ) return false;
        // While filtering, the sidebar is a flat file list — folder rows are
        // hidden, so keyboard nav should skip them.
        if ( filtering && el.classList.contains( 'tree-folder' ) ) return false;

        if ( el.classList.contains( 'tree-folder' ) ) {
          const ownDetails = el.parentElement;
          if ( ownDetails && ownDetails.classList.contains( 'is-hidden' ) ) return false;
          let ancestor = ownDetails?.parentElement;
          while ( ancestor && ancestor !== treeList ) {
            if ( ancestor.tagName === 'DETAILS' ) {
              if ( !ancestor.open || ancestor.classList.contains( 'is-hidden' ) ) return false;
            }
            ancestor = ancestor.parentElement;
          }
          return true;
        }

        let ancestor = el.parentElement;
        while ( ancestor && ancestor !== treeList ) {
          if ( ancestor.tagName === 'DETAILS' ) {
            if ( !ancestor.open || ancestor.classList.contains( 'is-hidden' ) ) return false;
          }
          ancestor = ancestor.parentElement;
        }
        return true;
      } );
    };

    const selectFileItem = ( el ) => {
      if ( !el.classList.contains( 'tree-item' ) ) return;
      selectFile( el.dataset.path );
    };

    const setupKeyboardNav = () => {
      document.addEventListener( 'keydown', ( e ) => {
        const treeList = document.getElementById( 'treeList' );
        const active = document.activeElement;

        // Ctrl/Cmd+B toggles the sidebar from anywhere (VS Code convention).
        // Safe even in inputs — Ctrl+B does nothing in a plain text field — and
        // we preventDefault so Firefox doesn't open its bookmarks sidebar.
        if ( ( e.ctrlKey || e.metaKey ) && !e.altKey && ( e.key === 'b' || e.key === 'B' ) ) {
          e.preventDefault();
          toggleSidebar();
          return;
        }

        if ( e.key === '/' && active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' ) {
          e.preventDefault();
          document.getElementById( 'treeFilter' ).focus();
          return;
        }

        // `\` moves focus into the tree (current selection, else first visible).
        if ( e.key === '\\' && active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' ) {
          e.preventDefault();
          const visible = getVisibleTreeItems();
          if ( visible.length === 0 ) return;
          const activeItem = document.querySelector( '#treeList .tree-item.active' );
          const target = ( activeItem && visible.includes( activeItem ) ) ? activeItem : visible[ 0 ];
          target.focus();
          target.scrollIntoView( { block: 'nearest' } );
          return;
        }

        if ( !treeList.contains( active ) ) return;
        if ( !active.classList.contains( 'tree-folder' ) && !active.classList.contains( 'tree-item' ) ) return;

        const visible = getVisibleTreeItems();
        const idx = visible.indexOf( active );
        if ( idx === -1 ) return;

        switch ( e.key ) {
          case 'ArrowDown': {
            e.preventDefault();
            const next = visible[ idx + 1 ];
            if ( next ) { next.focus(); selectFileItem( next ); }
            break;
          }
          case 'ArrowUp': {
            e.preventDefault();
            const prev = visible[ idx - 1 ];
            if ( prev ) { prev.focus(); selectFileItem( prev ); }
            break;
          }
          case 'Home': {
            e.preventDefault();
            const first = visible[ 0 ];
            if ( first && first !== active ) { first.focus(); selectFileItem( first ); }
            break;
          }
          case 'End': {
            e.preventDefault();
            const last = visible[ visible.length - 1 ];
            if ( last && last !== active ) { last.focus(); selectFileItem( last ); }
            break;
          }
          case 'PageDown':
          case 'PageUp': {
            e.preventDefault();
            const itemHeight = active.getBoundingClientRect().height || 24;
            const pageSize = Math.max( 1, Math.floor( treeList.clientHeight / itemHeight ) - 1 );
            const dir = e.key === 'PageDown' ? 1 : -1;
            const newIdx = Math.max( 0, Math.min( idx + dir * pageSize, visible.length - 1 ) );
            const target = visible[ newIdx ];
            if ( target && target !== active ) { target.focus(); selectFileItem( target ); }
            break;
          }
          case 'Enter':
          case ' ': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              active.parentElement.open = !active.parentElement.open;
            } else {
              selectFileItem( active );
            }
            break;
          }
          case 'ArrowRight': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              const details = active.parentElement;
              if ( !details.open ) {
                details.open = true;
              } else {
                const firstChild = details.querySelector( '.tree-folder, .tree-item' );
                if ( firstChild && firstChild !== active ) { firstChild.focus(); selectFileItem( firstChild ); }
              }
            }
            break;
          }
          case 'ArrowLeft': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              const details = active.parentElement;
              if ( details.open ) {
                details.open = false;
              } else {
                const parentDetails = details.parentElement?.closest( 'details' );
                if ( parentDetails ) {
                  const parentSummary = parentDetails.querySelector( ':scope > summary' );
                  if ( parentSummary ) parentSummary.focus();
                }
              }
            } else {
              const parentDetails = active.closest( 'details' );
              if ( parentDetails ) {
                const parentSummary = parentDetails.querySelector( ':scope > summary' );
                if ( parentSummary ) parentSummary.focus();
              }
            }
            break;
          }
        }
      } );
    };

    /* ── 28. Auto-select README ── */
    const autoSelectReadme = () => {
      if ( !state.tree ) return;

      // Match a root-level README (.md/.markdown/.mkd/.mdown/.txt or bare);
      // otherwise fall back to the About page.
      const readme = state.tree.find( ( item ) =>
        item.type === 'blob' && /^readme(\.(md|markdown|mkd|mdown|txt))?$/i.test( item.path )
      );

      if ( !readme ) {
        document.getElementById( 'btnHelp' ).click();
        return;
      }

      selectFile( readme.path, { skipHash: true } );
      const el = document.querySelector( `[data-action="select-file"][data-path="${ CSS.escape( readme.path ) }"]` );
      if ( el ) el.scrollIntoView( { block: 'center', behavior: 'smooth' } );
    };

    /* ── 29. scrollToTreeFolder ── */
    const scrollToTreeFolder = ( folderPath ) => {
      const target = document.querySelector( `details[data-folder-path="${ CSS.escape( folderPath ) }"]` );
      if ( !target ) return;

      let ancestor = target.parentElement?.closest( 'details' );
      while ( ancestor ) {
        ancestor.open = true;
        ancestor = ancestor.parentElement?.closest( 'details' );
      }
      target.open = true;
      target.scrollIntoView( { block: 'center', behavior: 'smooth' } );
    };

    /* ── 30. Hash routing ── */
    const updateHash = ( path ) => {
      const newHash = '#' + encodePath( path );
      try {
        // First navigation pushes so browser Back exits the app;
        // subsequent clicks replace so the back stack doesn't accumulate.
        if ( location.hash ) {
          history.replaceState( null, '', newHash );
        } else {
          history.pushState( null, '', newHash );
        }
      } catch ( _ ) { /* file:// */ }
    };

    const handleHashChange = async () => {
      const hash = location.hash.slice( 1 );
      if ( !hash ) return;
      const path = decodeURIComponent( hash );
      if ( !state.tree && !state.oversized ) {
        document.getElementById( 'contentBody' ).innerHTML = '<p>Loading tree…</p>';
        await fetchTree();
      }
      if ( state.oversized ) return;  // panel already in place; don't overwrite
      const found = state.tree?.find( ( item ) => item.path === path && item.type === 'blob' );
      if ( found ) {
        selectFile( path, { skipHash: true } );
      } else {
        document.getElementById( 'contentBody' ).innerHTML =
          '<p>File not found: <code>' + escapeHTML( path ) + '</code></p>';
      }
    };

    /* ── 31. getNewTabUrl — local file, GitHub Pages, or raw fallback ── */
    const getNewTabUrl = async ( path ) => {
      const fileName = path.split( '/' ).pop();
      const ext = fileName.includes( '.' ) ? fileName.split( '.' ).pop().toLowerCase() : '';

      // Local mode (file://): prefer the on-disk file so New Tab reflects
      // uncommitted edits and HTML keeps its relative assets. Null when hosted.
      const localUrl = localUrlFor( path );
      if ( localUrl ) return localUrl;

      // Extensionless and download-prone (CSV, archives, Office) files go
      // straight to raw, which downloads them — the expected action.
      if ( isDownloadAction( ext ) ) {
        return rawUrl( path );
      }

      if ( state.pagesEnabled === null ) {
        try {
          const headers = getAuthHeaders();
          const res = await fetch(
            `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/pages`,
            { headers }
          );
          updateRateBadge( res );
          // Only cache a definitive answer (200 = on, 404 = off). A 403/network
          // error leaves pagesEnabled null so the next click re-probes.
          if ( res.status === 200 ) state.pagesEnabled = true;
          else if ( res.status === 404 ) state.pagesEnabled = false;
        } catch ( _ ) { /* network blip: leave null, re-probe next click */ }
      }

      if ( state.pagesEnabled ) {
        // Pages/Jekyll converts Markdown to HTML: a README.md becomes its
        // directory URL; other .md files drop their extension. (.txt/bare
        // README are served as-is, so they're excluded here.)
        const mdExtRe = /\.(md|markdown|mkdown|mkdn|mkd)$/i;
        const isReadme = /^readme\.(md|markdown|mkdown|mkdn|mkd)$/i.test( fileName );
        const pagesPath = isReadme
          ? path.slice( 0, path.length - fileName.length )  // strip filename → directory URL
          : path.replace( mdExtRe, '' );                    // strip Markdown extension
        const encodedPagesPath = encodePath( pagesPath );
        const isUserPage = state.repo.toLowerCase() === `${ state.owner.toLowerCase() }.github.io`;
        return isUserPage
          ? `https://${ state.owner }.github.io/${ encodedPagesPath }`
          : `https://${ state.owner }.github.io/${ state.repo }/${ encodedPagesPath }`;
      }

      // Pages off: raw serves HTML as text/plain (shows source), so route
      // .html/.htm through githack to render it; everything else uses raw.
      return ( ext === 'html' || ext === 'htm' ) ? githackUrl( path ) : rawUrl( path );
    };

    /* ── 32. buildFileHeader — breadcrumbs + action buttons ── */
    const buildFileHeader = ( path, ext ) => {
      const segments = path.split( '/' );
      const fileName = segments.pop();

      // Breadcrumb: in-repo path only — owner / repo @ branch already live in
      // the app header, so repeating them here just forced the bar to wrap.
      // Deep ancestor folders collapse to "… / <parent>" so the path stays on
      // one line; the file name always shows in full, full path in the tooltip.
      const folderLink = ( seg, fPath ) =>
        `<a class="breadcrumb-link" href="#" data-action="scroll-folder" data-folder="${ escapeHTML( fPath ) }" title="${ escapeHTML( fPath ) }" aria-label="Scroll to folder ${ escapeHTML( fPath ) }">${ escapeHTML( seg ) }</a>`;

      // Cumulative folder paths so each crumb links to its own folder.
      const cumulative = [];
      segments.forEach( ( seg ) => {
        const prev = cumulative[ cumulative.length - 1 ];
        cumulative.push( prev ? `${ prev }/${ seg }` : seg );
      } );

      let pathHtml = '';
      if ( segments.length > 2 ) {
        // … (hidden ancestors) / <immediate parent> /
        const last = segments.length - 1;
        pathHtml =
          `<span class="crumb-collapsed" title="${ escapeHTML( segments.slice( 0, last ).join( ' / ' ) ) }">…</span> / ` +
          folderLink( segments[ last ], cumulative[ last ] ) + ' / ';
      } else if ( segments.length > 0 ) {
        pathHtml = segments.map( ( seg, i ) => folderLink( seg, cumulative[ i ] ) ).join( ' / ' ) + ' / ';
      }

      const breadcrumbHtml =
        `<span class="crumb-path">${ pathHtml }</span>` +
        `<strong class="crumb-file">${ escapeHTML( fileName ) }</strong>`;

      const githubUrl = `https://github.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/blob/${ encodeURIComponent( state.branch ) }/${ encodePath( path ) }`;

      const hasToggle = [ 'md', 'html', 'htm', 'svg' ].includes( ext );
      // SVG is in NO_COPY_EXTS (it's an image), but we fetch its source as
      // text and offer a Raw view, so its text is copyable too.
      const hasCopy = !NO_COPY_EXTS.includes( ext ) || ext === 'svg';
      const preferredView = hasToggle ? getPreferredView( ext ) : 'rendered';

      // Action buttons are icon-only so the row fits on one line beside the
      // breadcrumb instead of taking its own band; the title/aria-label carry
      // the meaning on hover and for screen readers.
      let actionsHtml = '';
      if ( hasToggle ) {
        // Single toggle: the icon is the view you'll switch TO. </> = raw
        // source, 👁 = rendered. Kept in sync by the view-toggle handler.
        const showingRaw = preferredView === 'raw';
        const otherIcon = showingRaw ? '👁' : '&lt;/&gt;';
        const otherTitle = showingRaw ? 'Show rendered view' : 'Show raw source';
        actionsHtml += `<button class="file-btn" data-action="view-toggle" title="${ otherTitle }" aria-label="${ otherTitle }">${ otherIcon }</button>`;
      }
      if ( hasCopy ) {
        actionsHtml += `<button class="file-btn" data-action="copy-file" title="Copy file contents to clipboard" aria-label="Copy file contents to clipboard">📋</button>`;
      }
      actionsHtml += `<button class="file-btn" data-action="print" title="Print this file" aria-label="Print this file">🖨</button>`;
      // Icon matches the outcome: types the browser downloads (data/binary,
      // extensionless) get a ⬇ Download action; viewable types and text-as-plain
      // files get ↗ New Tab.
      const willDownload = isDownloadAction( ext ) && !isTextOpenAsPlain( ext );
      const newTabIcon = willDownload ? '⬇' : '↗';
      const newTabTitle = willDownload ? 'Download this file' : 'Open in new tab';
      actionsHtml += `<button class="file-btn" data-action="new-tab" data-path="${ escapeHTML( path ) }" title="${ newTabTitle }" aria-label="${ newTabTitle }">${ newTabIcon }</button>`;

      return `<div class="panel-header file-header">` +
        `<div class="file-title">` +
        `<a href="${ escapeHTML( githubUrl ) }" target="_blank" rel="noopener" title="View on GitHub" aria-label="View this file on GitHub">${ GITHUB_SVG_ICON }</a>` +
        `<h3 id="breadcrumbs" title="${ escapeHTML( path ) }">${ breadcrumbHtml }</h3>` +
        `</div>` +
        `<div class="file-actions">${ actionsHtml }</div>` +
        `</div>`;
    };

    /* ── 33. Content rendering helpers ── */

    // Rendered/raw toggle scaffold shared by the markdown, html, and svg views.
    // Starts on the user's last-chosen view for this ext. `prefix` precedes both
    // panes; `renderedClass` classes the rendered pane.
    const buildToggleHtml = ( ext, renderedHtml, rawText, { prefix = '', renderedClass = '' } = {} ) => {
      const preferredView = getPreferredView( ext );
      const renderedDisplay = preferredView === 'rendered' ? '' : 'display:none';
      const rawDisplay = preferredView === 'raw' ? '' : 'display:none';
      const classAttr = renderedClass ? ` class="${ renderedClass }"` : '';
      return prefix +
        `<div${ classAttr } id="viewRendered" style="${ renderedDisplay }">${ renderedHtml }</div>` +
        `<pre id="viewRaw" style="${ rawDisplay }">${ escapeHTML( rawText ) }</pre>`;
    };

    const renderMarkdown = async ( text, filePath, signal ) => {
      const ext = filePath.split( '.' ).pop().toLowerCase();
      let renderedHtml;
      let errorHtml = '';

      try {
        renderedHtml = DOMPurify.sanitize( marked.parse( text ) );
      } catch ( err ) {
        errorHtml = `<div class="md-error">⚠️ Markdown rendering failed: ${ escapeHTML( err.message ) }</div>`;
        renderedHtml = '';
      }

      document.getElementById( 'contentBody' ).innerHTML =
        buildToggleHtml( ext, renderedHtml, text, { prefix: errorHtml, renderedClass: 'markdown-body' } );

      // Rewrite links inside .markdown-body
      const mdBody = document.getElementById( 'viewRendered' );
      if ( mdBody ) {
        const currentDir = filePath.includes( '/' ) ? filePath.substring( 0, filePath.lastIndexOf( '/' ) ) : '';

        mdBody.querySelectorAll( 'a[href]' ).forEach( ( a ) => {
          const href = a.getAttribute( 'href' );
          if ( !href ) return;

          // Anchor links — leave as-is
          if ( href.startsWith( '#' ) ) return;

          // Strip fragment before path resolution (in-page anchors not supported in this viewer)
          const fragIdx = href.indexOf( '#' );
          const hrefPath = fragIdx >= 0 ? href.slice( 0, fragIdx ) : href;
          if ( !hrefPath ) return;

          // GitHub blob links — rewrite only when owner/repo/branch all match the current view
          const blobMatch = hrefPath.match( /github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)/ );
          if (
            blobMatch &&
            blobMatch[ 1 ] === state.owner &&
            blobMatch[ 2 ] === state.repo &&
            blobMatch[ 3 ] === state.branch
          ) {
            a.removeAttribute( 'href' );
            a.classList.add( 'internal-link' );
            a.addEventListener( 'click', ( e ) => { e.preventDefault(); selectFile( blobMatch[ 4 ], { skipFocus: true } ); } );
            return;
          }

          // External links
          if ( hrefPath.startsWith( 'http://' ) || hrefPath.startsWith( 'https://' ) || hrefPath.startsWith( '//' ) ) {
            a.setAttribute( 'target', '_blank' );
            a.setAttribute( 'rel', 'noopener' );
            return;
          }

          // Relative paths — root-relative ('/foo') resolves from repo root, not currentDir
          const normalized = resolveRepoPath( hrefPath, currentDir );

          a.removeAttribute( 'href' );
          a.classList.add( 'internal-link' );
          a.addEventListener( 'click', ( e ) => { e.preventDefault(); selectFile( normalized, { skipFocus: true } ); } );
        } );

        // Syntax-highlight fenced code blocks (marked doesn't); skip oversized
        // ones (hljs is slow on huge inputs).
        mdBody.querySelectorAll( 'pre code' ).forEach( ( el ) => {
          if ( el.textContent.length > 500 * 1024 ) return;
          try { hljs.highlightElement( el ); } catch ( _ ) { /* plain fallback */ }
        } );

        const images = Array.from( mdBody.querySelectorAll( 'img[src]' ) );
        const resolveOne = async ( img ) => {
          const src = img.getAttribute( 'src' );
          if ( !src ) return;

          if (
            src.startsWith( 'http://' ) ||
            src.startsWith( 'https://' ) ||
            src.startsWith( '//' ) ||
            src.startsWith( 'data:' ) ||
            src.startsWith( 'blob:' )
          ) {
            return;
          }

          const fragIdx = src.indexOf( '#' );
          const srcPath = fragIdx >= 0 ? src.slice( 0, fragIdx ) : src;
          if ( !srcPath ) return;

          const normalized = resolveRepoPath( srcPath, currentDir );
          try {
            const resolvedSrc = await resolveMediaUrl( normalized, signal );
            img.setAttribute( 'src', resolvedSrc );
            img.setAttribute( 'loading', 'lazy' );
          } catch ( err ) {
            // One image's failure must not discard the rendered README; only
            // re-throw aborts (user navigated away).
            if ( err?.name === 'AbortError' ) throw err;
          }
        };
        // Cap concurrency so image-heavy READMEs don't burst the rate limit.
        const IMAGE_CONCURRENCY = 4;
        for ( let i = 0; i < images.length; i += IMAGE_CONCURRENCY ) {
          await Promise.all( images.slice( i, i + IMAGE_CONCURRENCY ).map( resolveOne ) );
        }
      }
    };

    const renderCode = ( text, ext ) => {
      // Skip highlighting for extensionless files — hljs mis-colors prose.
      const skipHighlight = !ext || text.length > 500 * 1024;
      const code = document.createElement( 'code' );
      code.textContent = text;
      if ( !skipHighlight ) {
        try { hljs.highlightElement( code ); } catch ( _ ) { /* fallback plain */ }
      }
      const pre = document.createElement( 'pre' );
      pre.appendChild( code );
      const body = document.getElementById( 'contentBody' );
      body.innerHTML = '';
      body.appendChild( pre );
    };

    const renderHtml = ( text, filePath, ext ) => {
      const blob = new Blob( [ text ], { type: 'text/html' } );
      const url = createBlobUrl( blob );

      // The iframe is fully sandboxed from a blob: URL, so scripts/relative
      // assets won't load — tell the user; New Tab opens the live page.
      const previewNote =
        `<div class="md-error">ℹ️ Preview is sandboxed: scripts and relative assets (CSS, images, modules) are disabled. Use <strong>↗ New Tab</strong> to open the live page.</div>`;

      document.getElementById( 'contentBody' ).innerHTML =
        buildToggleHtml( ext, `${ previewNote }<iframe class="iframe-content" sandbox src="${ escapeHTML( url ) }"></iframe>`, text );
    };

    const renderImage = ( url, alt ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( alt ) }">`;
    };

    const renderSvg = ( text, fileName = 'SVG image' ) => {
      const blob = new Blob( [ text ], { type: 'image/svg+xml' } );
      const url = createBlobUrl( blob );

      document.getElementById( 'contentBody' ).innerHTML =
        buildToggleHtml( 'svg', `<img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( fileName ) }">`, text );
    };

    const renderAudio = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<audio controls class="media-content" src="${ escapeHTML( url ) }">Your browser does not support audio.</audio>`;
    };

    const renderVideo = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<video controls class="media-content" src="${ escapeHTML( url ) }">Your browser does not support video.</video>`;
    };

    const renderPdf = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<iframe class="iframe-content" src="${ escapeHTML( url ) }"></iframe>`;
    };

    // SheetJS (~700KB) is the heaviest dependency and only spreadsheets use it,
    // so it's injected on first use instead of loaded on every page. Cached as
    // a single in-flight promise; a load failure clears it so the next open retries.
    let xlsxLoader = null;
    const ensureXLSX = () => {
      if ( window.XLSX ) return Promise.resolve();
      if ( xlsxLoader ) return xlsxLoader;
      xlsxLoader = new Promise( ( resolve, reject ) => {
        const s = document.createElement( 'script' );
        s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
        s.onload = resolve;
        s.onerror = () => {
          xlsxLoader = null;
          reject( new Error( 'Failed to load the spreadsheet library (SheetJS).' ) );
        };
        document.head.appendChild( s );
      } );
      return xlsxLoader;
    };

    const renderSpreadsheet = async ( data ) => {
      try {
        await ensureXLSX();
        const workbook = XLSX.read( data, { type: 'array' } );
        let html = '';
        for ( const sheetName of workbook.SheetNames ) {
          const sheetHtml = XLSX.utils.sheet_to_html( workbook.Sheets[ sheetName ] );
          html += `<div class="xlsx-sheet"><h3>${ escapeHTML( sheetName ) }</h3>${ sheetHtml }</div>`;
        }
        document.getElementById( 'contentBody' ).innerHTML = DOMPurify.sanitize( html );
      } catch ( err ) {
        document.getElementById( 'contentBody' ).innerHTML =
          `<p style="color: red;">Failed to parse spreadsheet: ${ escapeHTML( err.message ) }</p>`;
      }
    };

    /* ── 34. Local-first helpers ── */
    const localUrlFor = ( path ) => {
      if ( location.protocol !== 'file:' ) return null;
      if ( !state.localMode || state.localBase === null ) return null;
      return state.localBase + encodePath( path );
    };

    const probeLocalMode = async ( signal ) => {
      if ( location.protocol !== 'file:' ) return;
      if ( !state.tree ) return;

      // Pick a small text-ish file to probe. Skip binaries to keep the test cheap.
      const probe = state.tree.find( ( item ) =>
        item.type === 'blob' &&
        item.size && item.size > 0 && item.size < 20000 &&
        /\.(md|txt|json|js|mjs|cjs|ts|tsx|html|htm|css|yml|yaml|toml|xml|csv)$/i.test( item.path )
      );
      if ( !probe ) return;

      const candidateBases = state.localBase !== null
        ? [ state.localBase ]
        : [ '', '../', '../../', '../../../', '../../../../' ];

      for ( const base of candidateBases ) {
        try {
          const url = base + encodePath( probe.path );
          const res = await fetch( url, { signal } );
          if ( !res.ok ) continue;
          const text = await res.text();
          if ( text.length > 0 ) {
            state.localBase = base;
            state.localMode = true;
            return;
          }
        } catch ( err ) {
          if ( err?.name === 'AbortError' ) return;
          /* try next */
        }
      }
    };

    /* ── 35. GitHub file fetch (shared core) ── */

    // Map GitHub statuses to sentinel errors (403 = rate limit, 404 = missing/
    // private) that callers special-case to pop the token panel.
    const assertGitHubOk = ( res ) => {
      if ( res.status === 403 || res.status === 429 ) {
        // A genuine rate-limit response carries X-RateLimit-Remaining: 0. Other
        // 403s (a token missing a scope, a blocked file) shouldn't claim the
        // hourly quota is gone. raw.githubusercontent.com sends no such header,
        // so a 403/429 there is treated as rate limiting (the usual cause).
        const remaining = res.headers.get( 'X-RateLimit-Remaining' );
        if ( res.status === 429 || remaining === null || remaining === '0' ) {
          throw new Error( RATE_LIMIT_MESSAGE );
        }
        throw new Error( `GitHub returned 403 (forbidden): ${ res.statusText || 'access denied' }` );
      }
      if ( res.status === 404 ) throw new Error( PRIVATE_REPO_MESSAGE );
      if ( !res.ok ) throw new Error( `Failed to fetch file: ${ res.status }` );
    };

    // Token-vs-anonymous fetch shared by the text and blob paths: token → the
    // contents API (rate headers tracked), anonymous → raw. Callers own caching.
    const githubFileResponse = async ( path, signal ) => {
      const token = getToken();
      if ( token ) {
        const headers = { ...getAuthHeaders(), Accept: 'application/vnd.github.raw+json' };
        const res = await fetch( contentsApiUrl( path ), { headers, signal } );
        updateRateBadge( res );
        assertGitHubOk( res );
        return res;
      }
      const res = await fetch( rawUrl( path ), { signal } );
      assertGitHubOk( res );
      return res;
    };

    const blobFromMime = ( blob, mimeType ) =>
      mimeType ? new Blob( [ blob ], { type: mimeType } ) : blob;

    const fetchFileText = async ( path, signal ) => {
      // Local-first: bypass cache so uncommitted edits show immediately
      const localUrl = localUrlFor( path );
      if ( localUrl ) {
        try {
          const res = await fetch( localUrl, { signal } );
          if ( res.ok ) return await res.text();
        } catch ( err ) {
          if ( err.name === 'AbortError' ) throw err;
          /* fall through to GitHub */
        }
      }

      const cached = getCachedFileText( path );
      if ( cached !== null ) return cached;

      const res = await githubFileResponse( path, signal );
      const text = await res.text();
      setCachedFileText( path, text );
      return text;
    };

    /* ── 36. fetchFileBlob — binary content fetch ── */
    const fetchFileBlob = async ( path, signal, mimeType ) => {
      // Local-first
      const localUrl = localUrlFor( path );
      if ( localUrl ) {
        try {
          const res = await fetch( localUrl, { signal } );
          if ( res.ok ) return createBlobUrl( blobFromMime( await res.blob(), mimeType ) );
        } catch ( err ) {
          if ( err.name === 'AbortError' ) throw err;
          /* fall through to GitHub */
        }
      }

      const res = await githubFileResponse( path, signal );
      return createBlobUrl( blobFromMime( await res.blob(), mimeType ) );
    };

    const resolveMediaUrl = async ( path, signal ) => {
      const localUrl = localUrlFor( path );
      if ( localUrl ) return localUrl;
      if ( getToken() ) return await fetchFileBlob( path, signal );
      return rawUrl( path );
    };

    /* ── 37. selectFile — main function ── */
    let lastRawText = '';

    const selectFile = async ( path, { skipHash = false, skipFocus = false } = {} ) => {
      // Opening a real file dismisses any About/Token panel toggle state.
      activePanel = null;
      updateInfoButtonState();

      // Abort in-flight
      if ( currentAbortController ) currentAbortController.abort();
      currentAbortController = new AbortController();
      const signal = currentAbortController.signal;

      // Revoke old blob URLs
      revokeAllBlobUrls();
      lastRawText = '';

      // Look up file in tree
      const treeItem = state.tree?.find( ( item ) => item.path === path && item.type === 'blob' );

      // Tree loaded but the path isn't in it (e.g. a broken relative link in a
      // README). Show a plain not-found message instead of fetching — a bare
      // fetch would 404 and misfire the "private repo, add a token" panel.
      if ( state.tree && !treeItem ) {
        state.currentFilePath = path;
        setContentHeader( makeSimpleHeader( path.split( '/' ).pop() ) );
        document.getElementById( 'contentBody' ).innerHTML =
          `<p>File not found: <code>${ escapeHTML( path ) }</code></p>`;
        if ( !skipHash ) updateHash( path );
        return;
      }

      const fileSize = treeItem?.size || 0;
      const ext = path.includes( '.' ) ? path.split( '.' ).pop().toLowerCase() : '';
      const isStreamable = STREAMABLE_EXTS.includes( ext );

      // Large-file confirm. Approval is scoped by owner/repo/branch/path so it
      // doesn't carry across repos switched without a reload.
      const approvalKey = getFileCacheKey( path );
      if ( fileSize > LARGE_FILE_WARNING_BYTES && !isStreamable && !approvedLargeFiles.has( approvalKey ) ) {
        const sizeMB = ( fileSize / ( 1024 * 1024 ) ).toFixed( 1 );
        if ( !window.confirm( `This file is ${ sizeMB } MB. Load anyway?` ) ) return;
        // Cap the set (evict oldest; re-approving just re-prompts).
        if ( approvedLargeFiles.size >= 100 ) {
          approvedLargeFiles.delete( approvedLargeFiles.values().next().value );
        }
        approvedLargeFiles.add( approvalKey );
      }

      // Update active tree item — open parent folders, highlight, focus, scroll into view
      const prevActive = document.querySelector( '.tree-item.active' );
      if ( prevActive ) prevActive.classList.remove( 'active' );
      const treeEl = document.querySelector( `[data-action="select-file"][data-path="${ CSS.escape( path ) }"]` );
      if ( treeEl ) {
        // Open all ancestor <details> so the item is visible
        let ancestor = treeEl.closest( 'details' );
        while ( ancestor ) {
          ancestor.open = true;
          ancestor = ancestor.parentElement?.closest( 'details' );
        }
        treeEl.classList.add( 'active' );
        treeEl.scrollIntoView( { block: 'center', behavior: 'auto' } );
        if ( !skipFocus ) treeEl.focus();
      }

      state.currentFilePath = path;
      setPrintTitle( path.split( '/' ).pop() ); // file name for the print-only title

      // Build file header
      const contentArea = document.getElementById( 'contentArea' );
      const newHeader = document.createElement( 'div' );
      newHeader.innerHTML = buildFileHeader( path, ext );
      setContentHeader( newHeader.firstElementChild );

      // Show loading
      document.getElementById( 'contentBody' ).innerHTML = '<p>Loading…</p>';

      try {
        // Render by type
        if ( ext === 'md' ) {
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          await renderMarkdown( text, path, signal );

        } else if ( ext === 'html' || ext === 'htm' ) {
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          renderHtml( text, path, ext );

        } else if ( ext === 'svg' ) {
          // Always blob-fetch for rendering, but also get text for raw toggle
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          renderSvg( text, path.split( '/' ).pop() );

        } else if ( IMAGE_EXTS.includes( ext ) && ext !== 'svg' ) {
          const url = await resolveMediaUrl( path, signal );
          renderImage( url, path.split( '/' ).pop() );

        } else if ( AUDIO_EXTS.includes( ext ) ) {
          const url = await resolveMediaUrl( path, signal );
          renderAudio( url );

        } else if ( VIDEO_EXTS.includes( ext ) ) {
          const url = await resolveMediaUrl( path, signal );
          renderVideo( url );

        } else if ( ext === 'pdf' ) {
          const url = await fetchFileBlob( path, signal, 'application/pdf' );
          renderPdf( url );

        } else if ( SHEET_EXTS.includes( ext ) ) {
          const blobUrl = await fetchFileBlob( path, signal );
          const res = await fetch( blobUrl );
          const arrayBuf = await res.arrayBuffer();
          await renderSpreadsheet( new Uint8Array( arrayBuf ) );

        } else {
          // Code / text / everything else
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          renderCode( text, ext );
        }
      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;
        if ( err.message === RATE_LIMIT_MESSAGE ) {
          showTokenPanel( RATE_LIMIT_REASON_HTML );
          return;
        }
        if ( err.message === PRIVATE_REPO_MESSAGE ) {
          showTokenPanel( privateRepoReasonHtml() );
          return;
        }
        document.getElementById( 'contentBody' ).innerHTML =
          `<p style="color: red;">${ escapeHTML( err.message ) }</p>`;
      }

      // Update hash
      if ( !skipHash ) {
        updateHash( path );
      }

      // Save last file path for this session only (sessionStorage).
      try { sessionStorage.setItem( getCurrentFileKey(), path ); } catch ( _ ) { /* storage disabled */ }

      // Scroll content area to top
      contentArea.scrollTo( { top: 0 } );
    };

    /* ── 38. setupContentActions — breadcrumb delegation, Copy, New Tab, view toggle ── */
    const setupContentActions = () => {
      const contentArea = document.getElementById( 'contentArea' );

      contentArea.addEventListener( 'click', async ( e ) => {
        // Breadcrumb: scroll to folder
        const folderLink = e.target.closest( '[data-action="scroll-folder"]' );
        if ( folderLink ) { e.preventDefault(); scrollToTreeFolder( folderLink.dataset.folder ); return; }

        // View toggle: flips rendered/raw and relabels to the next view.
        const toggleBtn = e.target.closest( '[data-action="view-toggle"]' );
        if ( toggleBtn ) {
          const viewRendered = document.getElementById( 'viewRendered' );
          const viewRaw = document.getElementById( 'viewRaw' );
          const ext = state.currentFilePath.split( '.' ).pop().toLowerCase();
          const goingToRaw = getPreferredView( ext ) === 'rendered';
          if ( viewRendered ) viewRendered.style.display = goingToRaw ? 'none' : '';
          if ( viewRaw ) viewRaw.style.display = goingToRaw ? '' : 'none';
          // Icon shows the view the next click switches TO: 👁 rendered, </> raw.
          toggleBtn.textContent = goingToRaw ? '👁' : '</>';
          const toggleTitle = goingToRaw ? 'Show rendered view' : 'Show raw source';
          toggleBtn.title = toggleTitle;
          toggleBtn.setAttribute( 'aria-label', toggleTitle );
          setPreferredView( ext, goingToRaw ? 'raw' : 'rendered' );
          return;
        }

        // Copy
        const copyBtn = e.target.closest( '[data-action="copy-file"]' );
        if ( copyBtn && lastRawText ) {
          try {
            await navigator.clipboard.writeText( lastRawText );
            const origText = copyBtn.textContent;
            copyBtn.textContent = '✓ Copied';
            setTimeout( () => { copyBtn.textContent = origText; }, 1500 );
          } catch ( _ ) { /* clipboard blocked */ }
          return;
        }

        // Print (native print; the @media print stylesheet hides all chrome)
        const printBtn = e.target.closest( '[data-action="print"]' );
        if ( printBtn ) { window.print(); return; }

        // New Tab / Download
        const newTabBtn = e.target.closest( '[data-action="new-tab"]' );
        if ( newTabBtn ) {
          const filePath = newTabBtn.dataset.path;
          const ext = filePath.includes( '.' ) ? filePath.split( '.' ).pop().toLowerCase() : '';

          // Text-like files in LOCAL mode: fetch as text/plain so they DISPLAY
          // in a new tab instead of downloading or navigating away. On GitHub
          // Pages, getNewTabUrl() already handles markdown, OBJ, STL, MTL, and
          // extensionless files correctly (Pages routes .md → directory or raw
          // serves them as text/plain).
          if ( isTextOpenAsPlain( ext ) && localUrlFor( filePath ) ) {
            try {
              const text = await fetchFileText( filePath );
              const url = createBlobUrl( new Blob( [ text ], { type: 'text/plain;charset=utf-8' } ) );
              window.open( url, '_blank', 'noopener' );
              return;
            } catch ( err ) {
              // Fall through to normal path if fetch fails
              console.error( 'Failed to fetch text file as blob:', err );
            }
          }

          // Normal path: all remote files, binaries, videos, PDFs, images, HTML, etc.
          const url = await getNewTabUrl( filePath );
          window.open( url, '_blank', 'noopener' );
          return;
        }
      } );
    };

    /* ── 39. Global error handlers ── */
    window.addEventListener( 'error', ( event ) => {
      const panel = document.createElement( 'div' );
      panel.className = 'error-panel';
      panel.innerHTML = `<p>⚠️ Error: ${ escapeHTML( event.message || 'Unknown error' ) }</p><button onclick="location.reload()" title="Reload page">Reload</button>`;
      document.body.appendChild( panel );
    } );

    window.addEventListener( 'unhandledrejection', ( event ) => {
      const panel = document.createElement( 'div' );
      panel.className = 'error-panel';
      panel.innerHTML = `<p>⚠️ Unhandled error: ${ escapeHTML( event.reason?.message || String( event.reason ) || 'Unknown' ) }</p><button onclick="location.reload()" title="Reload page">Reload</button>`;
      document.body.appendChild( panel );
    } );

    /* ── 40. init ── */
    const init = async () => {
      // Migrate any legacy tootoo-lt:* keys before reading appearance/state
      migrateStorageKeys();
      migrateTokenStorage();

      // Brand the page from APP_ORIGIN (independent of the browsed repo).
      await detectAppOrigin();
      updateHeaderFromConfig();
      applyFavicon();
      applyHeadingFont();

      initAppearance();
      setupListeners();
      setupExpandAll();
      setupKeyboardNav();
      setupFileSelection();
      setupContentActions();
      restoreFileCache();

      // hashchange covers back/forward and address-bar edits (popstate would
      // double-fire, so we listen to only one).
      window.addEventListener( 'hashchange', handleHashChange );

      await detectRepo();

      state.owner = CONFIG.owner;
      state.repo = CONFIG.repo;
      state.branch = CONFIG.branch;

      // Reject owner/repo outside GitHub's charset before they reach any URL or
      // host builder (a crafted value could otherwise redirect New Tab / window.open).
      if ( ( state.owner && !isValidGitHubName( state.owner ) ) ||
           ( state.repo && !isValidGitHubName( state.repo ) ) ) {
        document.getElementById( 'contentBody' ).innerHTML =
          '<div class="error-panel"><p>⚠️ <strong>Invalid repository reference.</strong> Owner and repository names may contain only letters, numbers, and <code>. _ -</code>.</p></div>';
        return;
      }

      migrateCurrentFileStorage();

      if ( state.owner && state.repo ) {
        updateHeaderFromConfig();
        document.getElementById( 'contentBody' ).innerHTML = '<p>Loading tree…</p>';
        await fetchTree();

        // Oversized-repo bail-out: panel is already in place; skip file-open
        // logic so deep links / sessionStorage paths don't fight the panel.
        if ( state.oversized ) return;

        document.getElementById( 'btnExpandAll' ).style.display = '';

        // Probe for local file access; enables fetching uncommitted edits
        await probeLocalMode( currentAbortController?.signal );

        // File open priority
        if ( location.hash.length > 1 ) {
          await handleHashChange();
        } else {
          const currentFileKey = getCurrentFileKey();
          const lastPath = sessionStorage.getItem( currentFileKey );
          const lastPathExists = lastPath && state.tree?.some( ( item ) => item.path === lastPath && item.type === 'blob' );

          if ( lastPathExists ) {
            await selectFile( lastPath, { skipHash: false } );
          } else {
            if ( lastPath ) {
              try { sessionStorage.removeItem( currentFileKey ); } catch ( _ ) { /* storage disabled */ }
            }
            autoSelectReadme();
          }
        }

        // Fallback focus: if no file was selected, focus the first visible tree item
        if ( !document.querySelector( '.tree-item.active' ) ) {
          const first = document.querySelector( '#treeList .tree-item, #treeList .tree-folder' );
          if ( first ) first.focus();
        }
      }
    };

    init();
  </script>
</body>

</html>
