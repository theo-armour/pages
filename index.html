      if ( ad && bd ) return ad !== bd ? bd.localeCompare( ad ) : aN.toLowerCase().localeCompare( bN.toLowerCase() );
      if ( ad ) return -1;          // dated posts above non-dated files + folders
      if ( bd ) return 1;
      return cmpDefault( [ aN, aNode ], [ bN, bNode ] );
    };
    const BLOG_CMP = { blogRoot: cmpBlogRoot, yearFolder: cmpYearFolder, monthFolder: cmpMonthFolder };

    /* Newest dated post in a blog subtree → the file to auto-open + the chain of
       year/month folders to pre-expand down to it (blog root itself stays collapsed). */
    const collectDatedPosts = ( node, path, out ) => {
      for ( const [ name, child ] of Object.entries( node.children ) ) {
        const childPath = path ? `${ path }/${ name }` : name;
        if ( isFolderNode( child ) ) collectDatedPosts( child, childPath, out );
        else if ( postDate( name ) ) out.push( { date: postDate( name ), name, path: childPath } );
      }
      return out;
    };
    const findLatestPost = ( blogNode, blogPath ) => {
      const posts = collectDatedPosts( blogNode, blogPath, [] );
      if ( !posts.length ) return { expandPaths: new Set(), postPath: '' };
      posts.sort( ( a, b ) => a.date !== b.date ? b.date.localeCompare( a.date ) : a.name.toLowerCase().localeCompare( b.name.toLowerCase() ) );
      const parts = posts[ 0 ].path.split( '/' );
      const depth = blogPath.split( '/' ).length;
      const expandPaths = new Set();
      for ( let i = depth + 1; i < parts.length; i++ ) expandPaths.add( parts.slice( 0, i ).join( '/' ) );
      return { expandPaths, postPath: posts[ 0 ].path };
    };

    /* ── sort entries; `mode` (blog context) picks the comparator, else default. ── */
    const sortedEntries = ( children, mode ) =>
      Object.entries( children ).sort( BLOG_CMP[ mode ] || cmpDefault );

    /* ── recursive folder contents (for the folder tooltip) ── */
    const folderStats = ( node ) => {
      let files = 0, folders = 0, bytes = 0;
      for ( const child of Object.values( node.children ) ) {
        const isFolder = child.type === 'tree' || Object.keys( child.children ).length > 0;
        if ( isFolder ) {
          folders++;
          const s = folderStats( child );
          files += s.files; folders += s.folders; bytes += s.bytes;
        } else {
          files++; bytes += ( child.size || 0 );
        }
      }
      return { files, folders, bytes };
    };

    /* ── one tree node -> HTML (recursive for folders) ──
       `blog` carries the blog context once we're inside a "blog" folder
       ({ expandPaths }), so descendant year/month folders sort reverse-chrono and the
       path to the latest post renders pre-expanded. */
    const renderNode = ( name, node, parentPath, blog ) => {
      const fullPath = parentPath ? `${ parentPath }/${ name }` : name;
      const isFolder = node.type === 'tree' || Object.keys( node.children ).length > 0;
      const displayName = displayTreeName( name );

      if ( isFolder ) {
        // Blog detection + per-folder sort mode. The "blog" folder itself becomes the
        // root; year/month folders beneath it get their own ordering.
        let childBlog = blog, mode = null, blogAttr = '';
        if ( !blog && name.toLowerCase() === 'blog' && hasMonthChild( node ) ) {
          const latest = findLatestPost( node, fullPath );
          childBlog = { expandPaths: latest.expandPaths };
          mode = 'blogRoot';
          blogAttr = ` data-blog-root data-blog-latest="${ escapeHTML( latest.postPath ) }"`;
        } else if ( blog ) {
          mode = yearNum( name ) >= 0 ? 'yearFolder' : monthNum( name ) >= 0 ? 'monthFolder' : null;
        }
        const open = ( blog && blog.expandPaths.has( fullPath ) ) ? ' open' : '';

        // Auto-open this folder's own README the first time it's expanded. Skipped for blog
        // roots (they open their latest post instead) and inside the blog subtree.
        let readmeAttr = '';
        if ( CONFIG.autoOpenFolderReadme !== false && !blog && !blogAttr ) {
          const readme = Object.entries( node.children ).find(
            ( [ n, c ] ) => c.type === 'blob' && README_RE.test( n ) );
          if ( readme ) readmeAttr = ` data-readme="${ escapeHTML( readme[ 1 ].path ) }"`;
        }

        const childrenHtml = sortedEntries( node.children, mode )
          .map( ( [ childName, childNode ] ) => renderNode( childName, childNode, fullPath, childBlog ) )
          .join( '' );
        // Tooltip: what's inside — recursive file/folder counts + total size.
        const s = folderStats( node );
        const tip = `${ fullPath } — ${ s.files } file${ s.files === 1 ? '' : 's' }` +
          ( s.folders ? ` · ${ s.folders } folder${ s.folders === 1 ? '' : 's' }` : '' ) +
          ` · ${ formatFileSize( s.bytes ) }`;
        return `<details${ open }${ blogAttr }${ readmeAttr } data-folder-path="${ escapeHTML( fullPath ) }">` +
          `<summary class="tree-folder" tabindex="0" title="${ escapeHTML( tip ) }">` +
          `<span aria-hidden="true">📁</span> <span class="folder-name">${ escapeHTML( displayName ) }</span>` +
          `</summary>` + childrenHtml + `</details>`;
      }

      const icon = getFileIcon( name );
      const isReadme = README_RE.test( name );
      const nameHtml = isReadme ? `<strong>${ escapeHTML( displayName ) }</strong>` : escapeHTML( displayName );
      const folderDisplay = parentPath ? parentPath.split( '/' ).map( displayTreeName ).join( ' / ' ) : '';
      const folderHtml = folderDisplay ? `<span class="tree-item-folder">${ escapeHTML( folderDisplay ) }</span>` : '';
      // Tooltip: path on line 1, then "Type · size" — the size now lives here, not on the row.
      const tip = `${ fullPath }\n${ getFileTypeLabel( name ) } · ${ formatFileSize( node.size || 0 ) }`;

      return `<div class="tree-item" role="button" tabindex="0" data-action="select-file" data-path="${ escapeHTML( fullPath ) }" title="${ escapeHTML( tip ) }">` +
        `<span class="tree-item-name"><span aria-hidden="true">${ icon }</span> ${ nameHtml }</span>` + folderHtml + `</div>`;
    };

    /* ── expand-all glyph state ── */
    const setExpandAllButton = ( expanded ) => {
      const btn = document.getElementById( 'btnExpandAll' );
      if ( !btn ) return;
      btn.textContent = expanded ? '⊟' : '⊞';
      const label = expanded ? 'Collapse all folders' : 'Expand all folders';
      btn.title = label;
      btn.setAttribute( 'aria-label', label );
    };

    /* ── auto-open on first manual expand. Bound to the summary click (a real gesture) so
       the filter / expand-all opening a folder programmatically doesn't hijack the content
       pane. A blog root opens its latest post; any other folder opens its own README. ── */
    const wireFirstOpen = ( selector, attr ) => {
      document.querySelectorAll( selector ).forEach( ( d ) => {
        const path = d.getAttribute( attr );
        const summary = d.querySelector( ':scope > summary' );
        if ( !path || !summary ) return;
        let opened = false;
        summary.addEventListener( 'click', () => {
          if ( opened ) return;
          // Let the native <details> toggle finish, then open the target if it expanded.
          setTimeout( () => {
            if ( d.open && typeof selectFile === 'function' ) { opened = true; selectFile( path ); }
          }, 0 );
        } );
      } );
    };
    const wireBlogAutoOpen = () => wireFirstOpen( 'details[data-blog-root]', 'data-blog-latest' );
    const wireFolderReadmeAutoOpen = () => wireFirstOpen( 'details[data-readme]', 'data-readme' );

    /* ── render the whole tree ── */
    const renderTree = ( treeArray ) => {
      const treeList = document.getElementById( 'treeList' );
      preFilterOpenState = null;
      setExpandAllButton( false );
      const nested = buildNestedTree( treeArray );
      const entries = sortedEntries( nested.children, null );
      treeList.innerHTML = entries.map( ( [ name, node ] ) => renderNode( name, node, '', null ) ).join( '' );
      refreshTreeCache();
      wireBlogAutoOpen();
      wireFolderReadmeAutoOpen();
    };

    /* ── filter (reference §23) ── */
    let preFilterOpenState = null;
    let treeSummaryText = '';
    let cachedTreeItems = [];
    let cachedTreeFolders = [];

    const refreshTreeCache = () => {
      const treeList = document.getElementById( 'treeList' );
      cachedTreeItems = Array.from( treeList.querySelectorAll( '.tree-item' ) );
      cachedTreeFolders = Array.from( treeList.querySelectorAll( 'details' ) );
    };

    const runFilter = () => {
      const treeList = document.getElementById( 'treeList' );
      const query = document.getElementById( 'treeFilter' ).value.trim().toLowerCase();
      const btnFilterClear = document.getElementById( 'btnFilterClear' );
      const normalizedQuery = query.replace( /[-\s]+/g, ' ' );
      btnFilterClear.style.display = query ? 'block' : 'none';

      const items = cachedTreeItems;
      const folders = cachedTreeFolders;

      if ( !query ) {
        treeList.classList.remove( 'filtering' );
        if ( treeSummaryText ) document.getElementById( 'hFiles' ).textContent = treeSummaryText;
        items.forEach( ( el ) => el.classList.remove( 'is-hidden' ) );
        folders.forEach( ( el ) => el.classList.remove( 'is-hidden' ) );
        if ( preFilterOpenState ) {
          folders.forEach( ( details ) => {
            const key = details.dataset.folderPath;
            if ( preFilterOpenState.has( key ) ) details.open = preFilterOpenState.get( key );
          } );
          preFilterOpenState = null;
        }
        return;
      }

      if ( preFilterOpenState === null ) {
        preFilterOpenState = new Map();
        folders.forEach( ( details ) => preFilterOpenState.set( details.dataset.folderPath, details.open ) );
      }

      let matchCount = 0;
      items.forEach( ( el ) => {
        const name = ( el.dataset.path || '' ).split( '/' ).pop().toLowerCase();
        const normalizedName = name.replace( /[-\s]+/g, ' ' );
        const matches = name.includes( query ) || normalizedName.includes( normalizedQuery );
        el.classList.toggle( 'is-hidden', !matches );
        if ( matches ) matchCount++;
      } );

      folders.slice().reverse().forEach( ( details ) => {
        const hasVisible = details.querySelector( '.tree-item:not(.is-hidden)' );
        if ( hasVisible ) { details.classList.remove( 'is-hidden' ); details.open = true; }
        else { details.classList.add( 'is-hidden' ); }
      } );

      treeList.classList.add( 'filtering' );
      document.getElementById( 'hFiles' ).textContent =
        `${ matchCount.toLocaleString() } match${ matchCount === 1 ? '' : 'es' }`;
    };

    /* ── debounce ── */
    const debounce = ( fn, ms ) => {
      let timer;
      return ( ...args ) => { clearTimeout( timer ); timer = setTimeout( () => fn( ...args ), ms ); };
    };

    /* ── expand/collapse all ── */
    const setupExpandAll = () => {
      const btn = document.getElementById( 'btnExpandAll' );
      btn.addEventListener( 'click', () => {
        const allDetails = document.getElementById( 'treeList' ).querySelectorAll( 'details' );
        const expand = btn.textContent.trim() !== '⊟';
        allDetails.forEach( ( d ) => { d.open = expand; } );
        setExpandAllButton( expand );
      } );
    };

    /* ── selection: hand off to Content (reference §26) ── */
    const setupFileSelection = () => {
      document.getElementById( 'treeList' ).addEventListener( 'click', ( e ) => {
        const target = e.target.closest( '[data-action="select-file"]' );
        if ( !target ) return;
        selectFile( target.dataset.path );   // Content owns currentFilePath
      } );
    };

    // Bail out for very large repositories (or truncated GitHub tree responses):
    // keep sidebar concise and show a clear explanation + link in the content pane.
    const showOversizedRepoPanel = ( count, truncated ) => {
      const repoUrl = `https://github.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }`;
      const countLabel = truncated
        ? `over ${ count.toLocaleString() } files (GitHub truncated the tree response)`
        : `${ count.toLocaleString() } files`;

      document.getElementById( 'treeList' ).innerHTML =
        '<div style="padding: 0.6rem 0.5rem; font-size: 0.85rem; opacity: 0.8;">Repository too large to browse here.</div>';

      const cb = document.getElementById( 'contentBody' );
      cb.innerHTML = `
        <div class="error-panel">
          <h3 style="margin-top: 0;">Repository too large for ${ escapeHTML( CONFIG.appName ) }</h3>
          <p><strong>${ escapeHTML( state.owner ) }/${ escapeHTML( state.repo ) }</strong> contains ${ escapeHTML( countLabel ) }. ${ escapeHTML( CONFIG.appName ) } is built for small-to-medium personal repositories; larger trees overwhelm the sidebar render and the per-keystroke filter.</p>
          <p><a href="${ escapeHTML( repoUrl ) }" target="_blank" rel="noopener">Browse this repository on github.com →</a></p>
          <p style="font-size: 0.85rem; opacity: 0.75; margin-bottom: 0;">If you maintain a fork, raise <code>CONFIG.maxRepoFiles</code> (currently ${ CONFIG.maxRepoFiles.toLocaleString() }) to override this cutoff. Truncated trees cannot be overridden — that is a GitHub API response limit.</p>
        </div>
      `;
    };

    /* ── fetchTree: load the repo tree from GitHub (writes state.tree) ── */
    const fetchTree = async () => {
      const signal = newAbort();
      const treeList = document.getElementById( 'treeList' );
      treeList.innerHTML = '<p style="padding:0.5rem;">Loading tree…</p>';
      try {
        if ( !state.branch ) state.branch = await getDefaultBranch( signal );
        cacheRepo();   // persist owner/repo/branch now that the branch is resolved
        setHeaderTimestamp();   // refresh the title tooltip with this repo's last-push date
        updateBranchControl();   // show the branch chip in the sidebar header
        const data = await ghApi( `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/git/trees/${ encodeURIComponent( state.branch ) }?recursive=1`, signal );
        const count = data.tree?.length || 0;
        if ( data.truncated || count > CONFIG.maxRepoFiles ) {
          state.tree = null;
          state.oversized = true;
          showOversizedRepoPanel( count, data.truncated );
          return;
        }
        state.oversized = false;
        state.tree = data.tree;
        renderTree( state.tree );

        // Sidebar summary: 📁 folders · 📄 files · size (matches what renders).
        const hidF = hiddenFolderSet(), hidf = hiddenFileSet();
        const vis = state.tree.filter( ( i ) => isVisibleTreeItem( i, hidF, hidf ) );
        const folders = vis.filter( ( i ) => i.type === 'tree' ).length;
        const files = vis.filter( ( i ) => i.type === 'blob' ).length;
        const bytes = vis.reduce( ( s, i ) => s + ( i.type === 'blob' ? ( i.size || 0 ) : 0 ), 0 );
        const h = document.getElementById( 'hFiles' );
        h.textContent = `${ files.toLocaleString() } file${ files === 1 ? '' : 's' } · ${ formatFileSize( bytes ) }`;
        // Spelled-out tooltip (includes the folder count + truncated summary on a narrow sidebar).
        h.title = `${ folders.toLocaleString() } folder${ folders === 1 ? '' : 's' }, ` +
          `${ files.toLocaleString() } file${ files === 1 ? '' : 's' }, ${ formatFileSize( bytes ) } total`;
        treeSummaryText = h.textContent;
      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;
        if ( err.status === 403 ) {
          treeList.innerHTML = `<p style="padding:0.5rem;color:red;">Rate limited. Add a GitHub token for higher limits.</p>`;
          showTokenPanel( RATE_LIMIT_REASON_HTML );
          return;
        }
        if ( err.status === 404 ) {
          treeList.innerHTML = `<p style="padding:0.5rem;color:red;">${ escapeHTML( PRIVATE_REPO_MESSAGE ) }</p>`;
          showTokenPanel( privateRepoReasonHtml() );
          return;
        }
        treeList.innerHTML = `<p style="padding:0.5rem;color:red;">${ escapeHTML( err.message ) }</p>`;
      }
    };

    /* ── pick the root README on first load ── */
    const autoSelectReadme = () => {
      if ( !state.tree ) return;
      const readme = state.tree.find( ( i ) => i.type === 'blob' && !i.path.includes( '/' ) && README_RE.test( i.path ) );
      if ( readme ) selectFile( readme.path );
    };

    /* ── keyboard navigation (reference §27) ── */
    const getVisibleTreeItems = () => {
      const treeList = document.getElementById( 'treeList' );
      const all = treeList.querySelectorAll( '.tree-folder, .tree-item' );
      const filtering = treeList.classList.contains( 'filtering' );
      return Array.from( all ).filter( ( el ) => {
        if ( el.classList.contains( 'is-hidden' ) ) return false;
        if ( filtering && el.classList.contains( 'tree-folder' ) ) return false;
        const start = el.classList.contains( 'tree-folder' ) ? el.parentElement : el;
        if ( el.classList.contains( 'tree-folder' ) && start?.classList.contains( 'is-hidden' ) ) return false;
        let ancestor = el.classList.contains( 'tree-folder' ) ? start?.parentElement : el.parentElement;
        while ( ancestor && ancestor !== treeList ) {
          if ( ancestor.tagName === 'DETAILS' && ( !ancestor.open || ancestor.classList.contains( 'is-hidden' ) ) ) return false;
          ancestor = ancestor.parentElement;
        }
        return true;
      } );
    };

    const selectFileItem = ( el ) => { if ( el.classList.contains( 'tree-item' ) ) selectFile( el.dataset.path ); };

    const setupKeyboardNav = () => {
      document.addEventListener( 'keydown', ( e ) => {
        const treeList = document.getElementById( 'treeList' );
        const active = document.activeElement;

        if ( ( e.ctrlKey || e.metaKey ) && !e.altKey && ( e.key === 'b' || e.key === 'B' ) ) {
          e.preventDefault();
          if ( typeof toggleSidebar === 'function' ) toggleSidebar();
          return;
        }
        if ( e.key === '/' && active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' ) {
          e.preventDefault(); document.getElementById( 'treeFilter' ).focus(); return;
        }
        // `\` focuses the tree. Allowed from the filter input too, so / and \ toggle
        // between filter and tree (in the filter we must preventDefault so it isn't typed).
        if ( e.key === '\\' && ( active.id === 'treeFilter' || ( active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' ) ) ) {
          e.preventDefault();
          const visible = getVisibleTreeItems();
          if ( !visible.length ) return;
          const activeItem = document.querySelector( '#treeList .tree-item.active' );
          const target = ( activeItem && visible.includes( activeItem ) ) ? activeItem : visible[ 0 ];
          target.focus(); target.scrollIntoView( { block: 'nearest' } );
          return;
        }

        if ( !treeList || !treeList.contains( active ) ) return;
        if ( !active.classList.contains( 'tree-folder' ) && !active.classList.contains( 'tree-item' ) ) return;
        const visible = getVisibleTreeItems();
        const idx = visible.indexOf( active );
        if ( idx === -1 ) return;

        switch ( e.key ) {
          case 'ArrowDown': { e.preventDefault(); const n = visible[ idx + 1 ]; if ( n ) { n.focus(); selectFileItem( n ); } break; }
          case 'ArrowUp': { e.preventDefault(); const p = visible[ idx - 1 ]; if ( p ) { p.focus(); selectFileItem( p ); } break; }
          case 'Home': { e.preventDefault(); const f = visible[ 0 ]; if ( f && f !== active ) { f.focus(); selectFileItem( f ); } break; }
          case 'End': { e.preventDefault(); const l = visible[ visible.length - 1 ]; if ( l && l !== active ) { l.focus(); selectFileItem( l ); } break; }
          case 'PageDown':
          case 'PageUp': {
            e.preventDefault();
            const h = active.getBoundingClientRect().height || 24;
            const page = Math.max( 1, Math.floor( treeList.clientHeight / h ) - 1 );
            const ni = Math.max( 0, Math.min( idx + ( e.key === 'PageDown' ? 1 : -1 ) * page, visible.length - 1 ) );
            const t = visible[ ni ]; if ( t && t !== active ) { t.focus(); selectFileItem( t ); }
            break;
          }
          case 'Enter':
          case ' ': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) active.parentElement.open = !active.parentElement.open;
            else selectFileItem( active );
            break;
          }
          case 'ArrowRight': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              const d = active.parentElement;
              if ( !d.open ) d.open = true;
              else { const c = d.querySelector( '.tree-folder, .tree-item' ); if ( c && c !== active ) { c.focus(); selectFileItem( c ); } }
            }
            break;
          }
          case 'ArrowLeft': {
            e.preventDefault();
            if ( active.classList.contains( 'tree-folder' ) ) {
              const d = active.parentElement;
              if ( d.open ) d.open = false;
              else { const ps = d.parentElement?.closest( 'details' )?.querySelector( ':scope > summary' ); if ( ps ) ps.focus(); }
            } else {
              const ps = active.closest( 'details' )?.querySelector( ':scope > summary' ); if ( ps ) ps.focus();
            }
            break;
          }
        }
      } );
    };

    /* ── branch switcher (reference §branch) — the chip lists the repo's branches
       and switches in place (re-fetch tree + re-open README, no reload). ── */
    let branchList = null;
    const updateBranchControl = () => {
      const btn = document.getElementById( 'btnBranch' );
      const name = document.getElementById( 'branchName' );
      if ( !btn || !name ) return;
      if ( !state.branch ) { btn.hidden = true; return; }
      name.textContent = state.branch;
      btn.title = `Branch: ${ state.branch } — click to switch`;
      btn.hidden = false;
    };
    const closeBranchMenu = () => {
      const menu = document.getElementById( 'branchMenu' );
      if ( menu ) menu.hidden = true;
      document.getElementById( 'btnBranch' )?.setAttribute( 'aria-expanded', 'false' );
    };
    const fetchBranchList = async () => {
      if ( branchList ) return branchList;
      const data = await ghApi( `https://api.github.com/repos/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/branches?per_page=100` );
      branchList = data.map( ( b ) => b.name );
      branchList.capped = data.length === 100;
      return branchList;
    };
    const openBranchMenu = async () => {
      const menu = document.getElementById( 'branchMenu' );
      const btn = document.getElementById( 'btnBranch' );
      if ( !menu || !btn ) return;
      menu.hidden = false;
      btn.setAttribute( 'aria-expanded', 'true' );
      menu.innerHTML = '<div class="branch-menu-loading">Loading branches…</div>';
      try {
        const branches = await fetchBranchList();
        menu.innerHTML = branches.map( ( b ) =>
          `<button type="button" role="option" class="branch-option${ b === state.branch ? ' is-current' : '' }" data-branch="${ escapeHTML( b ) }">${ b === state.branch ? '✓ ' : '' }${ escapeHTML( b ) }</button>`
        ).join( '' ) + ( branches.capped ? '<div class="branch-menu-error">Showing first 100 branches.</div>' : '' );
      } catch ( _ ) {
        menu.innerHTML = '<div class="branch-menu-error">Could not load branches.</div>';
      }
    };
    const toggleBranchMenu = () => {
      const menu = document.getElementById( 'branchMenu' );
      if ( menu && !menu.hidden ) closeBranchMenu(); else openBranchMenu();
    };
    const switchBranch = async ( branch ) => {
      closeBranchMenu();
      if ( !branch || branch === state.branch ) return;
      state.branch = branch;
      state.tree = null;
      branchList = null;          // re-list for the new branch context if reopened
      cacheRepo();
      clearFileCache();
      updateBranchControl();
      await fetchTree();
      autoSelectReadme();
    };

    /* ── init: render + wire ── */
    const initSidebar = () => {
      if ( state.tree ) renderTree( state.tree );
      treeSummaryText = document.getElementById( 'hFiles' ).textContent;
      const filter = document.getElementById( 'treeFilter' );
      filter.addEventListener( 'input', debounce( runFilter, 120 ) );
      filter.addEventListener( 'keydown', ( e ) => { if ( e.key === 'Escape' ) { filter.value = ''; runFilter(); } } );
      document.getElementById( 'btnFilterClear' ).addEventListener( 'click', () => {
        filter.value = ''; runFilter(); filter.focus();
      } );
      setupKeyboardNav();
      setupExpandAll();
      setupFileSelection();
      const exp = document.getElementById( 'btnExpandAll' );
      if ( exp ) exp.style.display = '';

      // Branch switcher chip + menu.
      document.getElementById( 'btnBranch' )?.addEventListener( 'click', toggleBranchMenu );
      document.getElementById( 'branchMenu' )?.addEventListener( 'click', ( e ) => {
        const opt = e.target.closest( '[data-branch]' );
        if ( opt ) switchBranch( opt.dataset.branch );
      } );
      document.addEventListener( 'click', ( e ) => {
        if ( !e.target.closest( '.branch-control' ) ) closeBranchMenu();
      } );

      // Sidebar footer scroll-to-top (its brand mark is static markup → favicon.ico).
      document.getElementById( 'btnScrollTreeTop' )?.addEventListener( 'click', () =>
        document.getElementById( 'treeList' ).scrollTo( { top: 0, behavior: 'smooth' } ) );

      // Resizer drag (real app does this in setupListeners; minimal version here).
      const resizer = document.getElementById( 'resizer' );
      if ( resizer ) {
        let dragging = false;
        resizer.addEventListener( 'pointerdown', ( e ) => { dragging = true; resizer.classList.add( 'dragging' ); resizer.setPointerCapture( e.pointerId ); } );
        resizer.addEventListener( 'pointermove', ( e ) => { if ( dragging ) document.documentElement.style.setProperty( '--sidebar-width', Math.min( window.innerWidth - 100, Math.max( 100, e.clientX ) ) + 'px' ); } );
        resizer.addEventListener( 'pointerup', () => {
          dragging = false; resizer.classList.remove( 'dragging' );
          const w = getComputedStyle( document.documentElement ).getPropertyValue( '--sidebar-width' ).trim();
          try { localStorage.setItem( storageKey( 'sidebarWidth' ), w ); } catch ( _ ) { /* storage off */ }
        } );
      }
    };
    /* TooToo — content.js  (the "show the file & act on it" component).
   Ported from reference §32, §33, §37, §38. Reads: state.owner/repo/branch,
   CONFIG. Writes: state.currentFilePath (Content owns this). Depends on core.js
   + marked/hljs/DOMPurify (CDN, same as the real app).

  DEV SIMPLIFICATIONS vs the real app:
   - selectFile reads `mockFiles` instead of fetching GitHub/local.
   - audio/video/pdf/spreadsheet renderers are omitted for now (need real blobs).
   - markdown image/relative-link resolution against the repo is dropped (mock). */

    let lastRawText = '';

    /* ── file-header: breadcrumbs + action buttons (reference §32) ── */
    const buildFileHeader = ( path, ext ) => {
      const segments = path.split( '/' );
      const fileName = segments.pop();

      const folderLink = ( seg, fPath ) =>
        `<a class="breadcrumb-link" href="#" data-action="scroll-folder" data-folder="${ escapeHTML( fPath ) }" title="${ escapeHTML( fPath ) }">${ escapeHTML( seg ) }</a>`;

      const cumulative = [];
      segments.forEach( ( seg ) => {
        const prev = cumulative[ cumulative.length - 1 ];
        cumulative.push( prev ? `${ prev }/${ seg }` : seg );
      } );

      let pathHtml = '';
      if ( segments.length > 2 ) {
        const last = segments.length - 1;
        pathHtml =
          `<span class="crumb-collapsed" title="${ escapeHTML( segments.slice( 0, last ).join( ' / ' ) ) }">…</span> / ` +
          folderLink( segments[ last ], cumulative[ last ] ) + ' / ';
      } else if ( segments.length > 0 ) {
        pathHtml = segments.map( ( seg, i ) => folderLink( seg, cumulative[ i ] ) ).join( ' / ' ) + ' / ';
      }

      const breadcrumbHtml =
        `<span class="crumb-path">${ pathHtml }</span>` +
        `<strong class="crumb-file">${ escapeHTML( fileName ) }</strong>`;

      const githubUrl = `https://github.com/${ encodeURIComponent( state.owner ) }/${ encodeURIComponent( state.repo ) }/blob/${ encodeURIComponent( state.branch ) }/${ encodePath( path ) }`;

      const hasToggle = [ 'md', 'html', 'htm', 'svg' ].includes( ext );
      const hasCopy = !NO_COPY_EXTS.includes( ext ) || ext === 'svg';
      const preferredView = hasToggle ? getPreferredView( ext ) : 'rendered';

      let actionsHtml = '';
      if ( hasToggle ) {
        const showingRaw = preferredView === 'raw';
        const otherIcon = showingRaw ? '👁' : '&lt;/&gt;';
        const otherTitle = showingRaw ? 'Show rendered view' : 'Show raw source';
        actionsHtml += `<button class="file-btn" data-action="view-toggle" title="${ otherTitle }" aria-label="${ otherTitle }">${ otherIcon }</button>`;
      }
      if ( hasCopy ) {
        actionsHtml += `<button class="file-btn" data-action="copy-file" title="Copy file contents to clipboard" aria-label="Copy file contents to clipboard">📋</button>`;
      }
      actionsHtml += `<button class="file-btn" data-action="print" title="Print this file" aria-label="Print this file">🖨</button>`;
      const willDownload = isDownloadAction( ext ) && !isTextOpenAsPlain( ext );
      const newTabIcon = willDownload ? '⬇' : '↗';
      const newTabTitle = willDownload ? 'Download this file' : 'Open in new tab';
      actionsHtml += `<button class="file-btn" data-action="new-tab" data-path="${ escapeHTML( path ) }" title="${ newTabTitle }" aria-label="${ newTabTitle }">${ newTabIcon }</button>`;

      return `<div class="panel-header file-header">` +
        `<div class="file-title">` +
        `<a href="${ escapeHTML( githubUrl ) }" target="_blank" rel="noopener" title="View on GitHub" aria-label="View this file on GitHub">${ GITHUB_SVG_ICON }</a>` +
        `<h3 id="breadcrumbs" title="${ escapeHTML( path ) }">${ breadcrumbHtml }</h3>` +
        `</div>` +
        `<div class="file-actions">${ actionsHtml }</div>` +
        `</div>`;
    };

    /* ── renderers (reference §33) ── */
    const buildToggleHtml = ( ext, renderedHtml, rawText, { prefix = '', renderedClass = '' } = {} ) => {
      const preferredView = getPreferredView( ext );
      const renderedDisplay = preferredView === 'rendered' ? '' : 'display:none';
      const rawDisplay = preferredView === 'raw' ? '' : 'display:none';
      const classAttr = renderedClass ? ` class="${ renderedClass }"` : '';
      return prefix +
        `<div${ classAttr } id="viewRendered" style="${ renderedDisplay }">${ renderedHtml }</div>` +
        `<pre id="viewRaw" style="${ rawDisplay }">${ escapeHTML( rawText ) }</pre>`;
    };

    const renderMarkdown = ( text, filePath ) => {
      let renderedHtml, errorHtml = '';
      try { renderedHtml = DOMPurify.sanitize( marked.parse( text ) ); }
      catch ( err ) { errorHtml = `<div class="md-error">⚠️ Markdown rendering failed: ${ escapeHTML( err.message ) }</div>`; renderedHtml = ''; }

      document.getElementById( 'contentBody' ).innerHTML =
        buildToggleHtml( 'md', renderedHtml, text, { prefix: errorHtml, renderedClass: 'markdown-body' } );

      const mdBody = document.getElementById( 'viewRendered' );
      if ( !mdBody ) return;
      const currentDir = filePath.includes( '/' ) ? filePath.slice( 0, filePath.lastIndexOf( '/' ) ) : '';

      // GitHub-style heading ids (marked v12 no longer generates them), so in-file
      // #anchor links and #path#anchor permalinks have something to scroll to.
      const slugCounts = {};
      mdBody.querySelectorAll( 'h1, h2, h3, h4, h5, h6' ).forEach( ( h ) => {
        if ( h.id ) return;
        let slug = h.textContent.trim().toLowerCase().replace( /[^\w\s-]/g, '' ).replace( /\s+/g, '-' );
        if ( !slug ) return;
        if ( slugCounts[ slug ] != null ) slug += '-' + ( ++slugCounts[ slug ] );
        else slugCounts[ slug ] = 0;
        h.id = slug;
      } );

      // Links: in-file #anchor → scroll + reflect in the routing hash (never let the
      // browser replace the file hash — that would be treated as a file path);
      // external → new tab; in-repo → resolve against currentDir + load via selectFile,
      // carrying any #fragment along as the anchor to scroll to.
      mdBody.querySelectorAll( 'a[href]' ).forEach( ( a ) => {
        const href = a.getAttribute( 'href' );
        if ( !href ) return;
        if ( href.startsWith( '#' ) ) {
          const anchor = safeDecode( href.slice( 1 ) );
          a.classList.add( 'internal-link' );
          a.addEventListener( 'click', ( e ) => {
            e.preventDefault();
            scrollToAnchor( anchor );
            updateHash( state.currentFilePath, anchor );
          } );
          return;
        }
        if ( /^https?:\/\//.test( href ) || href.startsWith( '//' ) ) { a.target = '_blank'; a.rel = 'noopener'; return; }
        const frag = href.indexOf( '#' );
        const clean = frag >= 0 ? href.slice( 0, frag ) : href;
        if ( !clean ) return;
        const repoPath = resolveRepoPath( clean, currentDir );
        const anchor = frag >= 0 ? safeDecode( href.slice( frag + 1 ) ) : '';
        a.removeAttribute( 'href' ); a.classList.add( 'internal-link' );
        a.addEventListener( 'click', ( e ) => { e.preventDefault(); selectFile( repoPath, anchor ); } );
      } );

      // Images: resolve repo-relative src against the current file's directory. The URL
      // resolves async (token → blob via the Contents API for private repos), so set it
      // when ready and leave the image broken if the fetch fails.
      mdBody.querySelectorAll( 'img[src]' ).forEach( async ( img ) => {
        const src = img.getAttribute( 'src' );
        if ( !src || /^(https?:)?\/\//.test( src ) || src.startsWith( 'data:' ) || src.startsWith( 'blob:' ) ) return;
        const frag = src.indexOf( '#' );
        const clean = frag >= 0 ? src.slice( 0, frag ) : src;
        if ( !clean ) return;
        img.setAttribute( 'loading', 'lazy' );
        try { img.setAttribute( 'src', await resolveMediaUrl( resolveRepoPath( clean, currentDir ) ) ); }
        catch ( _ ) { /* repo image missing or private fetch failed */ }
      } );

      mdBody.querySelectorAll( 'pre code' ).forEach( ( el ) => {
        try { hljs.highlightElement( el ); } catch ( _ ) { /* plain fallback */ }
      } );
    };

    const renderCode = ( text, ext ) => {
      const skipHighlight = !ext || text.length > 500 * 1024;
      const code = document.createElement( 'code' );
      code.textContent = text;
      if ( !skipHighlight ) { try { hljs.highlightElement( code ); } catch ( _ ) { /* plain */ } }
      const pre = document.createElement( 'pre' );
      pre.appendChild( code );
      const body = document.getElementById( 'contentBody' );
      body.innerHTML = '';
      body.appendChild( pre );
    };

    const renderHtml = ( text, ext ) => {
      const url = createBlobUrl( new Blob( [ text ], { type: 'text/html' } ) );
      const note = `<div class="md-error">ℹ️ Preview is sandboxed: scripts and relative assets are disabled.<br>Click <strong>&lt;/&gt;</strong> to show the raw source, or <strong>↗ New Tab</strong> to open the file directly (renders from a local copy; GitHub's raw host shows source).</div>`;
      document.getElementById( 'contentBody' ).innerHTML =
        buildToggleHtml( ext, `${ note }<iframe class="iframe-content" sandbox src="${ escapeHTML( url ) }"></iframe>`, text );
    };

    const renderSvg = ( text, fileName = 'SVG image' ) => {
      const url = createBlobUrl( new Blob( [ text ], { type: 'image/svg+xml' } ) );
      document.getElementById( 'contentBody' ).innerHTML =
        buildToggleHtml( 'svg', `<img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( fileName ) }">`, text );
    };

    const renderImage = ( url, alt ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<img class="media-content" src="${ escapeHTML( url ) }" alt="${ escapeHTML( alt ) }">`;
    };

    const renderAudio = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<audio controls class="media-content" src="${ escapeHTML( url ) }">Your browser does not support audio.</audio>`;
    };

    const renderVideo = ( url ) => {
      document.getElementById( 'contentBody' ).innerHTML =
        `<video controls class="media-content" src="${ escapeHTML( url ) }">Your browser does not support video.</video>`;
    };

    const renderPdf = ( url ) => {
      // iframe-pdf (vs the shared iframe-content) lets the CSS fill the pane's height
      // for PDFs while the HTML preview keeps its fixed 70vh.
      document.getElementById( 'contentBody' ).innerHTML =
        `<iframe class="iframe-content iframe-pdf" src="${ escapeHTML( url ) }"></iframe>`;
    };

    // SheetJS (~700KB) is injected on first spreadsheet open, not on every page.
    let xlsxLoader = null;
    const ensureXLSX = () => {
      if ( window.XLSX ) return Promise.resolve();
      if ( xlsxLoader ) return xlsxLoader;
      xlsxLoader = new Promise( ( resolve, reject ) => {
        const s = document.createElement( 'script' );
        s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
        s.onload = resolve;
        s.onerror = () => { xlsxLoader = null; reject( new Error( 'Failed to load the spreadsheet library (SheetJS).' ) ); };
        document.head.appendChild( s );
      } );
      return xlsxLoader;
    };

    const renderSpreadsheet = async ( data ) => {
      try {
        await ensureXLSX();
        const workbook = XLSX.read( data, { type: 'array' } );
        let html = '';
        for ( const sheetName of workbook.SheetNames ) {
          html += `<div class="xlsx-sheet"><h3>${ escapeHTML( sheetName ) }</h3>${ XLSX.utils.sheet_to_html( workbook.Sheets[ sheetName ] ) }</div>`;
        }
        document.getElementById( 'contentBody' ).innerHTML = DOMPurify.sanitize( html );
      } catch ( err ) {
        document.getElementById( 'contentBody' ).innerHTML =
          `<p style="color: red;">Failed to parse spreadsheet: ${ escapeHTML( err.message ) }</p>`;
      }
    };

    // A plain content header (no breadcrumbs/actions) — used by panels like the token form.
    const makeSimpleHeader = ( title ) => {
      const d = document.createElement( 'div' );
      d.className = 'panel-header file-header';
      d.innerHTML = `<div class="file-title"><h3 id="breadcrumbs">${ escapeHTML( title ) }</h3></div>`;
      return d;
    };

    /* ── swap the sticky file-header in place ── */
    const setContentHeader = ( el ) => {
      const area = document.getElementById( 'contentArea' );
      const existing = area.querySelector( '.file-header' );
      if ( existing ) existing.replaceWith( el ); else area.prepend( el );
    };

    /* ── scroll the rendered content to an in-file anchor (heading id / name) ── */
    const scrollToAnchor = ( anchor ) => {
      if ( !anchor ) return false;
      const body = document.getElementById( 'contentBody' );
      const el = body?.querySelector( `[id="${ CSS.escape( anchor ) }"], [name="${ CSS.escape( anchor ) }"]` );
      if ( el ) el.scrollIntoView( { block: 'start', behavior: 'auto' } );
      return !!el;
    };

    /* ── selectFile: build header, fetch, dispatch by type (reference §37).
       fetchFileText reads mockFiles on standalone pages, raw GitHub in the live
       build — so the same selectFile works offline and online. An optional anchor
       (from #path#anchor or a link's #fragment) is scrolled to after render. ── */
    const selectFile = async ( path, anchor = '' ) => {
      const ext = path.includes( '.' ) ? path.split( '.' ).pop().toLowerCase() : '';
      state.currentFilePath = path;               // Content owns this
      // Opening a real file dismisses any About/Token panel highlight (assembled build).
      if ( typeof updateInfoButtonState === 'function' ) { activePanel = null; updateInfoButtonState(); }
      const signal = newAbort();                  // cancel any in-flight load
      revokeAllBlobUrls();                         // free the previous file's blob URLs

      // Highlight the matching tree row, open its ancestor folders, scroll it in view.
      document.querySelectorAll( '.tree-item' ).forEach( ( el ) =>
        el.classList.toggle( 'active', el.dataset.path === path ) );
      const activeRow = document.querySelector( '.tree-item.active' );
      if ( activeRow ) {
        let ancestor = activeRow.closest( 'details' );
        while ( ancestor ) { ancestor.open = true; ancestor = ancestor.parentElement?.closest( 'details' ); }
        activeRow.scrollIntoView( { block: 'center', behavior: 'auto' } );
      }

      const hdr = document.createElement( 'div' );
      hdr.innerHTML = buildFileHeader( path, ext );
      setContentHeader( hdr.firstElementChild );
      const pt = document.getElementById( 'printTitle' );   // file name on the printout
      if ( pt ) pt.textContent = path.split( '/' ).pop();

      const body = document.getElementById( 'contentBody' );
      body.innerHTML = '<p>Loading…</p>';

      try {
        if ( IMAGE_EXTS.includes( ext ) && ext !== 'svg' ) {
          lastRawText = '';
          renderImage( await resolveMediaUrl( path, signal ), path.split( '/' ).pop() );
        } else if ( AUDIO_EXTS.includes( ext ) ) {
          lastRawText = '';
          renderAudio( await fetchFileBlob( path, MIME[ ext ], signal ) );
        } else if ( VIDEO_EXTS.includes( ext ) ) {
          lastRawText = '';
          renderVideo( await fetchFileBlob( path, MIME[ ext ], signal ) );
        } else if ( ext === 'pdf' ) {
          lastRawText = '';
          renderPdf( await fetchFileBlob( path, 'application/pdf', signal ) );
        } else if ( SHEET_EXTS.includes( ext ) ) {
          lastRawText = '';
          await renderSpreadsheet( await fetchFileArrayBuffer( path, signal ) );
        } else {
          const text = await fetchFileText( path, signal );
          lastRawText = text;
          if ( ext === 'md' ) renderMarkdown( text, path );
          else if ( ext === 'svg' ) renderSvg( text, path.split( '/' ).pop() );
          else if ( ext === 'html' || ext === 'htm' ) renderHtml( text, ext );
          else renderCode( text, ext );
        }
        updateHash( path, anchor );
        saveCurrentFile( path );   // remember last-opened file for this repo (sessionStorage)
      } catch ( err ) {
        if ( err.name === 'AbortError' ) return;   // superseded by a newer selection
        lastRawText = '';
        body.innerHTML = `<p style="color:red;">${ escapeHTML( err.message ) }</p>`;
      }
      // Land on the requested anchor when there is one; otherwise start at the top.
      if ( !( anchor && scrollToAnchor( anchor ) ) ) {
        document.getElementById( 'contentArea' ).scrollTo( { top: 0 } );
      }
    };

    /* ── content actions: view toggle, copy, print, new-tab (reference §38) ── */
    const setupContentActions = () => {
      document.getElementById( 'contentArea' ).addEventListener( 'click', async ( e ) => {
        // Breadcrumb folder link → open + scroll that folder in the sidebar.
        const folderLink = e.target.closest( '[data-action="scroll-folder"]' );
        if ( folderLink ) {
          e.preventDefault();
          const d = document.querySelector( `details[data-folder-path="${ CSS.escape( folderLink.dataset.folder ) }"]` );
          if ( d ) { let a = d; while ( a ) { a.open = true; a = a.parentElement?.closest( 'details' ); } d.scrollIntoView( { block: 'center', behavior: 'auto' } ); }
          return;
        }
        const toggleBtn = e.target.closest( '[data-action="view-toggle"]' );
        if ( toggleBtn ) {
          const viewRendered = document.getElementById( 'viewRendered' );
          const viewRaw = document.getElementById( 'viewRaw' );
          const ext = state.currentFilePath.split( '.' ).pop().toLowerCase();
          const goingToRaw = getPreferredView( ext ) === 'rendered';
          if ( viewRendered ) viewRendered.style.display = goingToRaw ? 'none' : '';
          if ( viewRaw ) viewRaw.style.display = goingToRaw ? '' : 'none';
          toggleBtn.textContent = goingToRaw ? '👁' : '</>';
          const t = goingToRaw ? 'Show rendered view' : 'Show raw source';
          toggleBtn.title = t; toggleBtn.setAttribute( 'aria-label', t );
          setPreferredView( ext, goingToRaw ? 'raw' : 'rendered' );
          return;
        }
        const copyBtn = e.target.closest( '[data-action="copy-file"]' );
        if ( copyBtn && lastRawText ) {
          try {
            await navigator.clipboard.writeText( lastRawText );
            const orig = copyBtn.textContent; copyBtn.textContent = '✓';
            setTimeout( () => { copyBtn.textContent = orig; }, 1200 );
          } catch ( _ ) { /* clipboard blocked */ }
          return;
        }
        const printBtn = e.target.closest( '[data-action="print"]' );
        if ( printBtn ) { window.print(); return; }

        const newTabBtn = e.target.closest( '[data-action="new-tab"]' );
        if ( newTabBtn ) {
          window.open( getNewTabUrl( newTabBtn.dataset.path ), '_blank', 'noopener' );
          return;
        }
      } );
    };

    /* ── self-test (reference §12b): render every visible file the way the viewer
       would — off-screen — and report pass/fail/skip. A pass means it loaded and
       parsed/decoded without throwing, not that it looks perfect. ── */
    const runSelfTest = async () => {
      const cb = document.getElementById( 'contentBody' );
      setContentHeader( makeSimpleHeader( 'Self-test' ) );
      if ( !state.tree ) { cb.innerHTML = '<div class="markdown-body"><p>No repository tree loaded yet.</p></div>'; return; }

      const files = state.tree.filter( ( i ) => i.type === 'blob' && isVisibleTreeItem( i, hiddenFolderSet(), hiddenFileSet() ) );
      const signal = newAbort();
      const total = files.length;
      const results = [];
      let done = 0, pass = 0, fail = 0, skip = 0;
      const LARGE_SKIP = 5 * 1024 * 1024;

      const render = () => {
        const rows = results.map( ( r ) => {
          const icon = r.status === 'pass' ? '✅' : r.status === 'fail' ? '❌' : '⏭';
          return `<tr class="st-${ r.status }"><td>${ icon }</td><td>${ escapeHTML( r.path ) }</td><td>${ escapeHTML( r.detail || '' ) }</td></tr>`;
        } ).join( '' );
        const heading = done < total ? `Testing… <strong>${ done }</strong> / ${ total }`
          : `<strong>${ fail ? 'Some failures' : 'All passed' }</strong> — ${ done } of ${ total } checked`;
        cb.innerHTML = '<div class="markdown-body"><h2>Self-test</h2>' +
          '<p>Renders every file the way the viewer would, off-screen, to confirm it displays.</p>' +
          `<p>${ heading } &middot; ✅ ${ pass } &middot; ❌ ${ fail } &middot; ⏭ ${ skip }</p>` +
          `<table class="selftest-table"><thead><tr><th></th><th>File</th><th>Result</th></tr></thead><tbody>${ rows }</tbody></table></div>`;
      };
      render();

      const decodeImage = ( url ) => new Promise( ( resolve, reject ) => {
        const img = new Image();
        const timer = setTimeout( () => { img.src = ''; reject( new Error( 'timed out' ) ); }, 15000 );
        img.onload = () => { clearTimeout( timer ); resolve(); };
        img.onerror = () => { clearTimeout( timer ); reject( new Error( 'failed to decode' ) ); };
        img.src = url;
      } );
      const revokeIfBlob = ( u ) => { if ( typeof u === 'string' && u.startsWith( 'blob:' ) ) URL.revokeObjectURL( u ); };

      const testFile = async ( item ) => {
        const path = item.path;
        const ext = path.includes( '.' ) ? path.split( '.' ).pop().toLowerCase() : '';
        if ( ( item.size || 0 ) > LARGE_SKIP ) return { path, status: 'skip', detail: `${ formatFileSize( item.size ) } — too large` };
        try {
          if ( ext === 'md' ) { DOMPurify.sanitize( marked.parse( await fetchFileText( path, signal ) ) ); return { path, status: 'pass', detail: 'markdown parsed' }; }
          if ( ext === 'svg' ) {
            const url = createBlobUrl( new Blob( [ await fetchFileText( path, signal ) ], { type: 'image/svg+xml' } ) );
            try { await decodeImage( url ); } finally { revokeIfBlob( url ); }
            return { path, status: 'pass', detail: 'svg decoded' };
          }
          if ( IMAGE_EXTS.includes( ext ) ) {
            const url = await resolveMediaUrl( path, signal );
            try { await decodeImage( url ); } finally { revokeIfBlob( url ); }
            return { path, status: 'pass', detail: 'image decoded' };
          }
          if ( SHEET_EXTS.includes( ext ) ) {
            await ensureXLSX();
            const wb = XLSX.read( await fetchFileArrayBuffer( path, signal ), { type: 'array' } );
            return { path, status: 'pass', detail: `${ wb.SheetNames.length } sheet${ wb.SheetNames.length === 1 ? '' : 's' }` };
          }
          if ( AUDIO_EXTS.includes( ext ) || VIDEO_EXTS.includes( ext ) || ext === 'pdf' ) {
            revokeIfBlob( await fetchFileBlob( path, MIME[ ext ], signal ) );   // confirm it downloads
            return { path, status: 'pass', detail: `${ ext } reachable` };
          }
          await fetchFileText( path, signal );   // text / code / html / json / other
          return { path, status: 'pass', detail: ext ? `${ ext } loaded` : 'loaded' };
        } catch ( err ) {
          if ( err?.name === 'AbortError' ) throw err;
          return { path, status: 'fail', detail: err?.message || 'error' };
        }
      };

      const CONCURRENCY = localMode ? 8 : 4;
      let cursor = 0;
      const worker = async () => {
        while ( cursor < files.length ) {
          const item = files[ cursor++ ];
          let res;
          try { res = await testFile( item ); }
          catch ( err ) { if ( err?.name === 'AbortError' ) return; res = { path: item.path, status: 'fail', detail: err?.message || 'error' }; }
          results.push( res );
          done++;
          if ( res.status === 'pass' ) pass++; else if ( res.status === 'fail' ) fail++; else skip++;
          if ( !signal.aborted && done % 5 === 0 ) render();
        }
      };
      await Promise.all( Array.from( { length: Math.max( 1, Math.min( CONCURRENCY, files.length ) ) }, worker ) );
      if ( !signal.aborted ) render();
    };

    const initContent = () => {
      setupContentActions();
      // Floating back-to-top: appears after scrolling, click returns the content to top.
      const area = document.getElementById( 'contentArea' );
      const toTop = document.getElementById( 'btnBackToTop' );
      if ( area && toTop ) {
        area.addEventListener( 'scroll', () => { toTop.style.display = area.scrollTop > 200 ? 'flex' : 'none'; } );
        toTop.addEventListener( 'click', () => area.scrollTo( { top: 0, behavior: 'smooth' } ) );
      }
    };
    /* TooToo — footer.js  (repo-owner copyright + license link).
   Left: favicon mark (static markup) + "© <year> <owner>", plus CONFIG.rightsText
   when the owner is in scope (see rightsOwners). Right: License link. */

    const renderFooter = () => {
      updateFooterCopyright();
    };

    /* Copyright by the repo owner, e.g. "© 2026 pushme-pullyou · No rights reserved".
       The rights phrase (CONFIG.rightsText) is appended only when CONFIG.rightsOwners
       covers this repo's owner — null = all owners, an array = just those, [] = none —
       so a fork asserts its rights on its own repos but stays blank on others. */
    const updateFooterCopyright = () => {
      const el = document.getElementById( 'footerCopyright' );
      if ( !el ) return;
      if ( !state.owner ) { el.textContent = ''; return; }
      const owns = !CONFIG.rightsOwners ||
        CONFIG.rightsOwners.some( ( o ) => o.toLowerCase() === state.owner.toLowerCase() );
      const rights = ( CONFIG.rightsText && owns ) ? ` · ${ CONFIG.rightsText }` : '';
      el.textContent = `© ${ new Date().getFullYear() } ${ state.owner }${ rights }.`;
    };

    /* Point the license link at the repo's own root LICENSE file (opened in-app via the
       hash) when present; otherwise fall back to the opensource.org license list. Call
       after the tree loads. */
    const updateFooterLicense = () => {
      const el = document.querySelector( '.app-footer-license' );
      if ( !el ) return;
      const lic = state.tree?.find( ( i ) =>
        i.type === 'blob' && /^(licen[sc]e|copying)(\.\w+)?$/i.test( i.path ) );
      if ( lic ) {
        el.href = '#' + encodeHash( lic.path );   // opens it in TooToo via hash routing
        el.removeAttribute( 'target' );
        el.removeAttribute( 'rel' );
        el.title = `View ${ lic.path }`;
      } else {
        el.href = 'https://opensource.org/licenses';
        el.target = '_blank';
        el.rel = 'noopener';
        el.title = 'Open source licenses (opensource.org)';
      }
    };
    /* TooToo — main.js  (init + wiring) for the ASSEMBLED live build.
   Init order per ARCHITECTURE.md: header → content → footer → detect repo →
   sidebar → fetch tree → route to a file (hash or README). Reference §40. */

    /* ── global error handlers (reference §39) ── */
    window.addEventListener( 'error', ( e ) => console.error( 'TooToo error:', e.message ) );
    window.addEventListener( 'unhandledrejection', ( e ) => console.error( 'TooToo unhandled rejection:', e.reason ) );

    const initApp = async () => {
      // Per-repo branding: tootoo.config.js (loaded in <head>, if present) sets
      // window.TOOTOO_CONFIG; merge it over the built-in + baked config so a dropped-in
      // repo can override theme/appName/hidden files (canonical's fork model).
      if ( window.TOOTOO_CONFIG && typeof window.TOOTOO_CONFIG === 'object' ) Object.assign( CONFIG, window.TOOTOO_CONFIG );

      initHeader();     // header.js  — branding + appearance controls
      initContent();    // content.js — wire Copy / view-toggle / etc.
      renderFooter();   // footer.js  — brand bar
      applyHeadingFont(); // core.js  — load + apply CONFIG.headingFont(Url) for headings/title

      await detectLocalMode();  // core.js — file:// drop-in: seed owner/repo, read files from disk
      // Can't read local files → explain, don't silently browse the baked default. But if a
      // repo is explicitly chosen — URL ?owner=… or a per-repo tootoo.config.js — browse it
      // over GitHub (https needs no flag) instead of showing the help.
      const haveExplicitRepo = new URLSearchParams( location.search ).get( 'owner' )
        || ( window.TOOTOO_CONFIG && window.TOOTOO_CONFIG.owner );
      if ( fileAccessBlocked && !haveExplicitRepo ) { showFileAccessHelp(); return; }
      await detectRepo();       // core.js — params → cache → Pages host → CONFIG → manual form
      updateHeaderFromConfig(); // header.js — repo now known, so refresh the title (owner / repo)
      updateFooterCopyright();  // footer.js — repo owner now known, set the © line
      initSidebar();    // sidebar.js — wire filter/expand/select (tree fills next)

      if ( !state.owner || !state.repo ) {
        document.getElementById( 'contentBody' ).innerHTML =
          '<p style="padding:1rem;">Add <code>?owner=…&amp;repo=…</code> to the URL to load a repository.</p>';
        return;
      }

      await fetchTree();                       // sidebar.js — GitHub tree → state.tree → render
      updateFooterLicense();                   // footer.js — link to the repo's own LICENSE (tree now loaded)

      if ( state.oversized ) return;

      // Back/forward + address-bar hash edits re-open the file (and/or scroll to the
      // in-file anchor after the first raw '#').
      window.addEventListener( 'hashchange', () => {
        const { path, anchor } = parseHash();
        if ( !path ) return;
        if ( path === state.currentFilePath ) { if ( anchor ) scrollToAnchor( anchor ); return; }
        selectFile( path, anchor );
      } );

      // File-open priority: URL hash → last-opened (this session) → README.
      const { path: hashPath, anchor: hashAnchor } = parseHash();
      if ( hashPath ) {
        selectFile( hashPath, hashAnchor );
      } else {
        let last = null;
        try { last = sessionStorage.getItem( getCurrentFileKey() ); } catch ( _ ) { /* storage off */ }
        if ( last && state.tree?.some( ( i ) => i.path === last && i.type === 'blob' ) ) selectFile( last );
        else autoSelectReadme();
      }
    };

    /* file:// + local reads blocked → tell the user how to enable the flag instead of
       silently browsing the configured default repo (which looks like a bug). */
    const showFileAccessHelp = () => {
      const cb = document.getElementById( 'contentBody' );
      if ( !cb ) return;
      cb.innerHTML = `
    <div style="padding:1rem; max-width:46rem; line-height:1.55;">
      <h2 style="margin-top:0;">Can't read local files</h2>
      <p>This page is running from <code>file://</code> inside what looks like a git
      repository, but the browser blocked reading local files — so TooToo can't tell
      which repo this is, and won't guess.</p>
      <p>To browse the local repo, Chrome needs the file-access flag:</p>
      <ol>
        <li><strong>Quit Chrome completely</strong> — every window. (Chrome reuses a
        running process and ignores new flags, which is the usual culprit.)</li>
        <li>Relaunch it with <code>--allow-file-access-from-files</code>.</li>
        <li>Confirm at <code>chrome://version</code> → “Command Line” that the flag is
        listed, then reopen this file.</li>
      </ol>
      <p style="opacity:0.7;">Or add <code>?owner=…&amp;repo=…</code> to the URL to browse a repo over the network.</p>
    </div>`;
    };

    initApp();
  </script>

</body>

</html>
